 let the iron reach max temperature (~5 min), then re-tin. Do this outside with a respirator and fan/fume extractor — it makes a lot of nasty smoke.", "notes": ""}]}], "relatedProcesses": ["p-glazing-assembly"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-measurement-reference", "title": "Leaded Glass Measurement Reference", "category": "intake", "subcategory": "", "status": "Draft", "summary": "Definitions and the check equation for sizing a leaded panel from on-site measurements.", "materials": [], "safety": "", "sections": [{"id": "sec337", "title": "Dimensions Taken On Site", "steps": [{"id": "s333", "title": "EOS", "description": "EOS — Exact Opening Size. Any panel dimension beyond this will not fit in the opening.", "notes": ""}, {"id": "s334", "title": "L2L", "description": "L2L — Light to Light. The dimensions of the viewable area.", "notes": ""}, {"id": "s335", "title": "RAB", "description": "RAB — Rabbet Dimension. The wooden recess (rabbet) the panel sits against.", "notes": ""}, {"id": "s336", "title": "Check Equation", "description": "Verification: EOS − L2L = RAB × 2. If the numbers don't add up, you need new measurements.", "notes": ""}]}, {"id": "sec340", "title": "Dimensions Determined in Studio", "steps": [{"id": "s338", "title": "Reveal", "description": "Reveal — the exposed border came visible between wood and glass, typically ⅛\"–¼\". Two reasons: it looks better to have a darkened metal line framing the glass, and on exterior installs the glazing system (putty, or wood stop with silicone) should connect to the metal border rather than the glass. Consider rabbet depth and desired reveal when choosing border came size and profile.", "notes": ""}, {"id": "s339", "title": "FPS", "description": "FPS — Finished Panel Size. The size to build the panel, generally about ⅛\" smaller in height and width than the EOS.", "notes": ""}]}], "relatedProcesses": ["p-onsite-measurement"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-reinforcement", "title": "Panel Reinforcement", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Selecting and applying reinforcement to prevent bowing and sagging — within-the-window and onto-the-window methods.", "materials": ["Reinforcing bar (1/8\" x 3/8\" or 1/2\", 6' lengths)", "Copper wire", "Thin brass fins / brass bar", "Steel bar (painted or galvanized)", "Solid zinc bar", "Morton Strong Line", "Rustoleum flat black", "Solder, flux, grinder"], "safety": "", "sections": [{"id": "sec344", "title": "Principle", "steps": [{"id": "s341", "title": "", "description": "Reinforcement should generally span the shortest dimension of the window.", "notes": ""}, {"id": "s342", "title": "", "description": "If geometric lines run perpendicular to the reinforcement line, run those cames continuous and long to carry stability from the bar into the rest of the window.", "notes": ""}, {"id": "s343", "title": "", "description": "Bar configuration is a judgment call based on where the window is vulnerable — learn the methods rather than relying on fixed rules.", "notes": ""}]}, {"id": "sec347", "title": "Testing", "steps": [{"id": "s345", "title": "", "description": "Leaded glass weighs ~2.5–5 lb per square foot. For an overhead panel, estimate the weight (e.g. a 3'×3' panel ≈ 45 lb max) and test whether your metal stock can support roughly double that suspended between two points (e.g. a bar on edge across two sawhorses with a water bucket hung at center). For small projects, torquing the metal by hand can be enough.", "notes": ""}, {"id": "s346", "title": "", "description": "For within-the-window methods, you often can't test destructively — but once a panel is assembled and cemented, you can sense its flexibility by picking it up or pushing the center between two verticals.", "notes": ""}]}, {"id": "sec352", "title": "Within the Window — Building for Strength", "steps": [{"id": "s348", "title": "", "description": "Glaze with zinc came instead of lead — far more rigid, though each cut needs a saw, so keep a small saw at your station.", "notes": ""}, {"id": "s349", "title": "", "description": "Weave the came to prevent hinge points: alternate lengths of lead at the straight lines of geometric designs to build a stable matrix.", "notes": ""}, {"id": "s350", "title": "", "description": "Morton Strong Line: thin metal strips inserted along the came heart against the glass; place strategically to offset flexibility at junctions.", "notes": ""}, {"id": "s351", "title": "", "description": "Steel-reinforced or brass-capped lead came: stronger, but wider face width and a higher/thicker heart; may require a power saw to cut.", "notes": ""}]}, {"id": "sec360", "title": "Onto the Window — Additional Reinforcement", "steps": [{"id": "s353", "title": "", "description": "Soften the cut edge of any bar on the grinder before affixing — it looks nicer and is safer.", "notes": ""}, {"id": "s354", "title": "", "description": "Traditionally bars go on the interior face (less rust, no dirt/critters along the exterior lines). Put them on the exterior when interior bars would be visible or cast unwanted shadows — e.g. at an eye-level or kitchen-sink window with overhead light. Consider roof overhang too.", "notes": ""}, {"id": "s355", "title": "", "description": "Copper wire: versatile (various gauges), can be annealed for flexibility — heat to a glow, then quench or air-cool. Clean off oxidation, flux, and it solders easily onto the panel.", "notes": ""}, {"id": "s356", "title": "", "description": "Thin brass fins: soldered on edge, add rigidity. Clean, flux, solder on.", "notes": ""}, {"id": "s357", "title": "", "description": "Solid zinc bar: easy to shape for complex bends; clean, flux, solder with a larger iron.", "notes": ""}, {"id": "s358", "title": "", "description": "Steel bar: needs surface treatment against rust — galvanize (hot dip) for large exterior projects, or paint with Rustoleum flat black for interior.", "notes": ""}, {"id": "s359", "title": "", "description": "Reinforcing bar for leaded glass: zinc-plated, sufficient for most windows; the coating is thin, so painting may be advisable. Brass bar: weaker than steel but doesn't rust and takes patina easily.", "notes": ""}]}, {"id": "sec364", "title": "Soldering Flat Bars", "steps": [{"id": "s361", "title": "", "description": "Remove oxidation with sandpaper, steel wool, or Scotch-Brite. Mark both flat sides where each joint will be, flux those areas, and apply solder 'pillows' — enough solder to reach and cover the panel metal. Favor long 1\"–1½\" connection joints.", "notes": ""}, {"id": "s362", "title": "", "description": "Once cool, set the bar on edge, clean the joints and the came contact area, and melt the pillow until it reaches the came. Hold the iron on the came just long enough for the solder to spread, taking care not to burn the lead.", "notes": ""}, {"id": "s363", "title": "", "description": "For zinc-plated and brass bars, patina the bar before soldering and then just touch up the joints. Painting and sealing with Rustoleum suits all bar types.", "notes": ""}]}], "relatedProcesses": ["p-rebar", "p-glazing-assembly"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}]};
const STARTER_CATEGORIES = [{"id": "intake", "name": "Intake & Measurement", "color": "#D4793A"}, {"id": "fabrication", "name": "Fabrication", "color": "#5C3D2E"}, {"id": "restoration", "name": "Restoration", "color": "#2A7A6E"}, {"id": "mosaic", "name": "Mosaic", "color": "#1B2838"}, {"id": "mirroring", "name": "Mirroring", "color": "#4A6D7C"}, {"id": "installation", "name": "Installation", "color": "#B8923E"}];

const KEY_LIB = 'ted-proc-library';
const KEY_CAT = 'ted-proc-categories';
const LS_URL = 'tpl_exec_url';
const LS_USER = 'tpl_user_name';
const POLL_MS = 10000;
const GRACE_MS = 25000;

const state = {
  view: 'list',
  execUrl: localStorage.getItem(LS_URL) || '',
  userName: localStorage.getItem(LS_USER) || '',
  library: [],
  categories: [],
  filter: 'all',
  query: '',
  currentId: null,
  draft: null,
  loaded: false,
};
const grace = {};       // key -> timestamp until which remote changes are ignored
const lastSeen = {};    // key -> updated_at last applied

const $ = (s,el=document)=>el.querySelector(s);
const uid = (p='id')=> p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const catById = id => state.categories.find(c=>c.id===id) || {name:'Uncategorized',color:'#9A8E7C'};

/* checklist check-state: per-device, resettable, not shared */
function checkKey(pid){return 'tpl_checks_'+pid;}
function getChecks(pid){try{return JSON.parse(localStorage.getItem(checkKey(pid))||'{}');}catch(e){return {};}}
function setCheck(pid,sid,on){const c=getChecks(pid);if(on)c[sid]=1;else delete c[sid];localStorage.setItem(checkKey(pid),JSON.stringify(c));}
function resetChecks(pid){localStorage.removeItem(checkKey(pid));}

/* ---------- backend ---------- */
function apiRead(){
  return new Promise((resolve,reject)=>{
    if(!state.execUrl) return reject('no url');
    const cb='__tpl_'+Math.random().toString(36).slice(2);
    const sc=document.createElement('script');
    const to=setTimeout(()=>{cleanup();reject('timeout');},12000);
    function cleanup(){clearTimeout(to);delete window[cb];sc.remove();}
    window[cb]=(res)=>{cleanup();resolve(res);};
    sc.onerror=()=>{cleanup();reject('network');};
    sc.src=state.execUrl+(state.execUrl.includes('?')?'&':'?')+'action=read&callback='+cb+'&_t='+Date.now();
    document.body.appendChild(sc);
  });
}
function apiWrite(key,valueObj){
  grace[key]=Date.now()+GRACE_MS;
  setSave('saving');
  const body=JSON.stringify({key,value:JSON.stringify(valueObj)});
  return fetch(state.execUrl+(state.execUrl.includes('?')?'&':'?')+'action=write',{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body
  }).then(()=>{setSave('saved');}).catch(()=>{setSave('failed');});
}
function setSave(s){
  const el=$('#saveStatus'); if(!el)return;
  el.className=s;
  el.querySelector('.lbl').textContent = s==='saving'?'Saving…':s==='saved'?'Saved':s==='failed'?'Save failed':'Synced';
  if(s==='saved') setTimeout(()=>{const e=$('#saveStatus');if(e&&e.className==='saved'){e.className='';e.querySelector('.lbl').textContent='Synced';}},2500);
}

/* ---------- load + sync ---------- */
function applyData(data){
  let changed=false;
  if(data[KEY_CAT] && Date.now()>=(grace[KEY_CAT]||0) && data[KEY_CAT].updated_at!==lastSeen[KEY_CAT]){
    try{ state.categories=JSON.parse(data[KEY_CAT].value)||[]; lastSeen[KEY_CAT]=data[KEY_CAT].updated_at; changed=true; }catch(e){}
  }
  if(data[KEY_LIB] && Date.now()>=(grace[KEY_LIB]||0) && data[KEY_LIB].updated_at!==lastSeen[KEY_LIB]){
    try{ const p=JSON.parse(data[KEY_LIB].value); state.library=p.processes||p||[]; lastSeen[KEY_LIB]=data[KEY_LIB].updated_at; changed=true; }catch(e){}
  }
  return changed;
}
async function loadAll(){
  try{
    const res=await apiRead();
    if(res&&res.ok){ applyData(res.data||{}); }
    state.loaded=true; render();
  }catch(e){ state.loaded=true; render(); }
}
async function poll(){
  if(!state.execUrl) return;
  try{
    const res=await apiRead();
    if(res&&res.ok){
      const changed=applyData(res.data||{});
      if(changed && (state.view==='list'||state.view==='detail'||state.view==='categories')) render();
    }
  }catch(e){}
}
setInterval(poll,POLL_MS);

function saveLibrary(){ return apiWrite(KEY_LIB,{processes:state.library}); }
function saveCategories(){ return apiWrite(KEY_CAT,state.categories); }

function loadStarter(){
  state.categories=JSON.parse(JSON.stringify(STARTER_CATEGORIES));
  state.library=JSON.parse(JSON.stringify(STARTER_LIBRARY.processes));
  saveCategories(); saveLibrary();
  toast('Starter library loaded — 14 processes added as drafts');
  state.view='list'; render();
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

/* ---------- navigation ---------- */
function go(view,id){ state.view=view; if(id!==undefined)state.currentId=id; window.scrollTo(0,0); render(); }

/* ============ RENDER ============ */
function render(){
  const root=$('#root');
  if(!state.execUrl){ root.innerHTML=setupHTML(); wireSetup(); return; }
  root.innerHTML='<div id="app">'+sidebarHTML()+'<main id="main">'+mainHTML()+'</main></div>';
  wireMain();
}

function sidebarHTML(){
  const item=(v,label,icon)=>`<button data-nav="${v}" class="${state.view===v?'active':''}"><span class="dot"></span>${icon} ${label}</button>`;
  return `<aside id="sidebar">
    <div class="brand"><div class="name">Theodore Ellison Designs</div><div class="sub">Technical Manual</div></div>
    <nav>
      ${item('list','All Processes','')}
      ${item('new','New Process','')}
      ${item('categories','Categories','')}
      ${item('settings','Settings','')}
    </nav>
    <div class="side-foot">
      <div id="saveStatus"><span class="led"></span><span class="lbl">Synced</span></div>
    </div>
  </aside>`;
}

function mainHTML(){
  switch(state.view){
    case 'detail': return detailHTML();
    case 'new': return formHTML(null);
    case 'edit': return formHTML(state.currentId);
    case 'categories': return categoriesHTML();
    case 'settings': return settingsHTML();
    default: return listHTML();
  }
}

/* ---- list ---- */
function listHTML(){
  if(!state.loaded) return `<div class="empty"><p>Loading…</p></div>`;
  if(state.library.length===0){
    return `<div class="page-head"><div><div class="eyebrow">Workshop Reference</div><h1>Technical Manual</h1></div></div>
    <div class="empty"><h3>Nothing here yet</h3>
    <p>Load the starter library to bring in the 14 processes from your Technical Manual, each imported as a draft for review. Or start a process from scratch.</p>
    <button class="btn primary" id="loadStarter">Load starter library (14 processes)</button>
    <div style="height:10px"></div>
    <button class="btn" data-nav="new">Start a blank process</button></div>`;
  }
  const q=state.query.trim().toLowerCase();
  const match=p=>{
    if(state.filter!=='all' && p.category!==state.filter) return false;
    if(!q) return true;
    const hay=[p.title,p.summary,catById(p.category).name,(p.materials||[]).join(' '),p.safety,
      (p.sections||[]).map(s=>s.title+' '+(s.steps||[]).map(st=>st.title+' '+st.description+' '+st.notes).join(' ')).join(' ')
    ].join(' ').toLowerCase();
    return hay.includes(q);
  };
  const list=state.library.filter(match);
  const chips=`<div class="chips">
    <button class="chip ${state.filter==='all'?'active':''}" data-filter="all" ${state.filter==='all'?'style="background:var(--muir)"':''}>All <span class="mono">${state.library.length}</span></button>
    ${state.categories.map(c=>{const n=state.library.filter(p=>p.category===c.id).length;const on=state.filter===c.id;
      return `<button class="chip ${on?'active':''}" data-filter="${c.id}" ${on?`style="background:${c.color}"`:''}><span class="cdot" style="background:${c.color}"></span>${esc(c.name)} <span class="mono">${n}</span></button>`}).join('')}
  </div>`;

  let body='';
  if(list.length===0){ body=`<div class="empty"><p>No processes match “${esc(state.query)}”.</p></div>`; }
  else if(state.filter==='all' && !q){
    body=state.categories.map(c=>{
      const items=list.filter(p=>p.category===c.id);
      if(!items.length) return '';
      return `<div class="cat-group"><h2><span class="cdot" style="background:${c.color}"></span>${esc(c.name)}</h2><div class="cards">${items.map(cardHTML).join('')}</div></div>`;
    }).join('');
    const orphan=list.filter(p=>!state.categories.find(c=>c.id===p.category));
    if(orphan.length) body+=`<div class="cat-group"><h2><span class="cdot" style="background:#9A8E7C"></span>Uncategorized</h2><div class="cards">${orphan.map(cardHTML).join('')}</div></div>`;
  } else {
    body=`<div class="cards">${list.map(cardHTML).join('')}</div>`;
  }

  return `<div class="page-head">
      <div><div class="eyebrow">Workshop Reference</div><h1>Technical Manual</h1>
      <div class="sub-line">${state.library.length} processes · ${state.categories.length} categories</div></div>
      <button class="btn primary" data-nav="new">+ New Process</button>
    </div>
    <div class="toolbar"><div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" placeholder="Search processes, materials, steps…" value="${esc(state.query)}">
    </div></div>
    ${chips}${body}`;
}
function cardHTML(p){
  const c=catById(p.category);
  const cl=p.type==='checklist';
  const n=(p.sections||[]).reduce((n,s)=>n+(s.steps||[]).filter(st=>st.description||st.title).length,0);
  return `<div class="card" data-open="${p.id}" style="border-left-color:${c.color}">
    <div class="ct">${cl?'<span class="type-tag">☑ Checklist</span> ':''}${esc(p.title||'Untitled')}</div>
    <div class="cs">${esc(p.summary||'No summary yet.')}</div>
    <div class="cmeta"><span class="badge ${p.status}">${p.status}</span><span class="mono">${n} ${cl?'item':'step'}${n===1?'':'s'}</span></div>
  </div>`;
}

/* ---- detail ---- */
function detailHTML(){
  const p=state.library.find(x=>x.id===state.currentId);

  const related=(p.relatedProcesses||[]).map(id=>state.library.find(x=>x.id===id)).filter(Boolean);
  const edited = p.lastEditedAt? new Date(p.lastEditedAt).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}):'';

    ${p.summary?`<p class="lede">${esc(p.summary)}</p>`:''}
    ${p.safety&&p.safety.trim()?`<div class="block"><div class="safety"><div class="sh">Safety</div>${esc(p.safety)}</div></div>`:''}

    ${p.type==='checklist'? checklistBody(p,sections) : processBody(sections)}

function processBody(sections){
  return `<div class="block"><h3 class="block-h">Procedure</h3>
      ${sections.map(s=>{
        const steps=(s.steps||[]).filter(st=>st.description||st.title);
        return `<div class="section-block">${s.title&&s.title.trim()?`<h4 class="section-title">${esc(s.title)}</h4>`:''}
          <ul class="steps">${steps.map(st=>`<li class="step"><div class="num"></div><div class="sbody">
            ${st.title&&st.title.trim()?`<div class="stitle">${esc(st.title)}</div>`:''}
            <div class="sdesc">${esc(st.description)||'<span style="color:#bbb">(empty — to be written)</span>'}</div>
            ${st.notes&&st.notes.trim()?`<div class="snote"><b>Note</b>${esc(st.notes)}</div>`:''}
          </div></li>`).join('')}</ul></div>`;
      }).join('')||'<p style="color:var(--muted)">No steps documented yet.</p>'}
    </div>`;
}
function checklistBody(p,sections){
  const checks=getChecks(p.id);
  const all=sections.flatMap(s=>(s.steps||[]).filter(st=>st.description||st.title));
  const total=all.length, done=all.filter(st=>checks[st.id]).length;
  const pct=total?Math.round(done/total*100):0;
  return `<div class="block">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px">
      <h3 class="block-h" style="margin:0;border:none;padding:0">Checklist</h3>
      <button class="btn sm ghost" id="resetChecks">Reset</button>
    </div>
    <div class="progress"><div class="bar"><i id="prgBar" style="width:${pct}%"></i></div><span class="pct" id="prgTxt">${done} / ${total}</span></div>
    ${sections.map(s=>{
      const items=(s.steps||[]).filter(st=>st.description||st.title);
      return `<div class="section-block">${s.title&&s.title.trim()?`<h4 class="section-title">${esc(s.title)}</h4>`:''}
        <div class="checklist">${items.map(st=>`<label class="check-item ${checks[st.id]?'done':''}" data-ci="${st.id}">
          <input type="checkbox" data-chk="${st.id}" ${checks[st.id]?'checked':''}>
          <span class="ci-body"><span class="ci-label">${esc(st.description)||esc(st.title)}</span>${st.notes&&st.notes.trim()?`<span class="ci-note">${esc(st.notes)}</span>`:''}</span>
        </label>`).join('')}</div></div>`;
    }).join('')||'<p style="color:var(--muted)">No items yet.</p>'}
  </div>`;
}

    </ol>

/* ============ WIRING ============ */
function wireSetup(){
  $('#setupConnect').onclick=async()=>{
    const url=$('#setupUrl').value.trim();
    const msg=$('#setupMsg');
    if(!/^https:\/\/script\.google\.com\/.*\/exec$/.test(url)){ msg.className='setup-msg err'; msg.textContent='That doesn\'t look like an Apps Script /exec URL.'; return; }
    msg.className='setup-msg'; msg.textContent='Connecting…';
    state.execUrl=url;
    try{
      const res=await apiRead();
      if(res&&res.ok){
        localStorage.setItem(LS_URL,url);
        msg.className='setup-msg ok'; msg.textContent='Connected.';
        applyData(res.data||{}); state.loaded=true;
        setTimeout(()=>{render();},400);
      } else { throw new Error('bad'); }
    }catch(e){ state.execUrl=''; msg.className='setup-msg err'; msg.textContent='Could not reach the backend. Check the URL and that access is set to “Anyone”.'; }
  };
}

function wireMain(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{ if(b.dataset.nav==='new'){state.draft=null;} go(b.dataset.nav); });
  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=(e)=>{e.preventDefault();go('detail',b.dataset.open);});
  const ls=$('#loadStarter')||$('#loadStarter2'); if(ls&&!ls.disabled) ls.onclick=loadStarter;

  if(state.view==='list'){
    const s=$('#search'); if(s){ s.oninput=()=>{ state.query=s.value; const pos=s.selectionStart; renderListOnly(); const ns=$('#search'); if(ns){ns.focus(); ns.setSelectionRange(pos,pos);} }; }
    document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render();});
  }
  if(state.view==='detail'){
    const p=state.currentId;
    const eb=$(`[data-edit="${p}"]`); if(eb) eb.onclick=()=>{state.draft=null;go('edit',p);};
    const pb=$(`[data-print="${p}"]`); if(pb) pb.onclick=()=>printProcess(p);
    const db=$(`[data-del="${p}"]`); if(db) db.onclick=()=>delProcess(p);
    document.querySelectorAll('[data-chk]').forEach(cb=>cb.onchange=()=>{
      const sid=cb.dataset.chk; setCheck(p,sid,cb.checked);
      cb.closest('.check-item').classList.toggle('done',cb.checked);
      const checks=getChecks(p); const boxes=[...document.querySelectorAll('[data-chk]')];
      const done=boxes.filter(b=>checks[b.dataset.chk]).length, total=boxes.length;
      const bar=$('#prgBar'), txt=$('#prgTxt');
      if(bar)bar.style.width=(total?Math.round(done/total*100):0)+'%';
      if(txt)txt.textContent=done+' / '+total;
    });
    const rc=$('#resetChecks'); if(rc) rc.onclick=()=>{ resetChecks(p); render(); };
  }
  if(state.view==='new'||state.view==='edit') wireForm();
  if(state.view==='categories') wireCategories();
  if(state.view==='settings') wireSettings();
}
function renderListOnly(){ $('#main').innerHTML=listHTML(); wireMain(); }

/* form wiring — read DOM into draft on each change so re-render keeps values */
function readForm(){
  const d=state.draft;
  const v=id=>{const el=$('#'+id);return el?el.value:'';};
  d.title=v('f-title'); d.category=v('f-cat'); d.status=v('f-status'); d.subcategory=v('f-sub'); d.summary=v('f-summary'); d.safety=v('f-safety');
  d.materials=[...document.querySelectorAll('[data-mat]')].map(e=>e.value);
  d.relatedProcesses=[...document.querySelectorAll('[data-rel]')].filter(e=>e.checked).map(e=>e.dataset.rel);
  d.sections.forEach((s,si)=>{
    const t=$(`[data-sectitle="${si}"]`); if(t)s.title=t.value;
    s.steps.forEach((st,sti)=>{
      const tt=$(`[data-steptitle="${si}-${sti}"]`); if(tt)st.title=tt.value;
      const dd=$(`[data-stepdesc="${si}-${sti}"]`); if(dd)st.description=dd.value;
      const nn=$(`[data-stepnotes="${si}-${sti}"]`); if(nn)st.notes=nn.value;
    });
  });
}
function reForm(){ const id=state.view==='edit'?state.currentId:null; $('#main').innerHTML=formHTML(id); wireForm(); }
function wireForm(){
  const d=state.draft;
  $('#addMat').onclick=()=>{readForm();d.materials.push('');reForm();};
  document.querySelectorAll('[data-delmat]').forEach(b=>b.onclick=()=>{readForm();d.materials.splice(+b.dataset.delmat,1);if(!d.materials.length)d.materials=[''];reForm();});
  $('#addSec').onclick=()=>{readForm();d.sections.push({id:uid('sec'),title:'',steps:[{id:uid('s'),title:'',description:'',notes:''}]});reForm();};
  document.querySelectorAll('[data-delsec]').forEach(b=>b.onclick=()=>{readForm();d.sections.splice(+b.dataset.delsec,1);if(!d.sections.length)d.sections=[{id:uid('sec'),title:'',steps:[{id:uid('s'),title:'',description:'',notes:''}]}];reForm();});
  document.querySelectorAll('[data-addstep]').forEach(b=>b.onclick=()=>{readForm();d.sections[+b.dataset.addstep].steps.push({id:uid('s'),title:'',description:'',notes:''});reForm();});
  document.querySelectorAll('[data-delstep]').forEach(b=>b.onclick=()=>{readForm();const[si,sti]=b.dataset.delstep.split('-').map(Number);d.sections[si].steps.splice(sti,1);if(!d.sections[si].steps.length)d.sections[si].steps=[{id:uid('s'),title:'',description:'',notes:''}];reForm();});
  document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{readForm();d.type=b.dataset.type;reForm();});
  const aci=$('#addCatInline'); if(aci) aci.onclick=()=>{
    const name=prompt('New category name:'); if(!name||!name.trim())return;
    readForm(); const nc={id:uid('cat'),name:name.trim(),color:'#5C3D2E'};
    state.categories.push(nc); saveCategories(); d.category=nc.id; reForm();
  };
  $('#saveProc').onclick=saveProc;
}
function saveProc(){
  readForm(); const d=state.draft;
  const kind=d.type==='checklist'?'checklist':'process';
  if(!d.title.trim()){ toast('Give the '+kind+' a title first'); $('#f-title').focus(); return; }
  d.materials=d.materials.map(m=>m.trim()).filter(Boolean);
  d.lastEditedBy=state.userName||d.lastEditedBy||''; d.lastEditedAt=new Date().toISOString();
  if(!d.author) d.author=state.userName||'';
  const idx=state.library.findIndex(p=>p.id===d.id);
  if(idx>=0) state.library[idx]=d; else state.library.unshift(d);
  saveLibrary();
  const id=d.id; state.draft=null; toast(idx>=0?'Changes saved':(kind==='checklist'?'Checklist created':'Process created')); go('detail',id);
}
function delProcess(id){
  const p=state.library.find(x=>x.id===id);
  if(!confirm(`Delete “${p?p.title:'this process'}”? This can't be undone.`)) return;
  state.library=state.library.filter(x=>x.id!==id);
  state.library.forEach(x=>{ if(x.relatedProcesses) x.relatedProcesses=x.relatedProcesses.filter(r=>r!==id); });
  saveLibrary(); toast('Process deleted'); go('list');
}

function wireCategories(){
  $('#addCat').onclick=()=>{ readCats(); state.categories.push({id:uid('cat'),name:'New Category',color:'#5C3D2E'}); $('#main').innerHTML=categoriesHTML(); wireCategories(); };
  document.querySelectorAll('[data-delcat]').forEach(b=>{ if(b.disabled)return; b.onclick=()=>{ readCats(); state.categories.splice(+b.dataset.delcat,1); $('#main').innerHTML=categoriesHTML(); wireCategories(); }; });
  $('#saveCats').onclick=()=>{ readCats(); saveCategories(); toast('Categories saved'); go('list'); };
}
function readCats(){
  document.querySelectorAll('[data-cat]').forEach(row=>{
    const i=+row.dataset.cat;
    const n=$(`[data-catname="${i}"]`), c=$(`[data-catcolor="${i}"]`);
    if(state.categories[i]){ if(n)state.categories[i].name=n.value; if(c)state.categories[i].color=c.value; }
  });
}

function wireSettings(){
  $('#saveSettings').onclick=()=>{
    state.userName=$('#f-username').value.trim(); localStorage.setItem(LS_USER,state.userName);
    const newUrl=$('#f-execurl').value.trim();
    if(newUrl && newUrl!==state.execUrl){ state.execUrl=newUrl; localStorage.setItem(LS_URL,newUrl); loadAll(); }
    toast('Settings saved'); render();
  };
}

/* ---- print ---- */
function printProcess(id){
  const p=state.library.find(x=>x.id===id); if(!p) return;
  const c=catById(p.category);
  const mats=(p.materials||[]).filter(m=>m&&m.trim());
  const sections=(p.sections||[]).filter(s=>(s.steps||[]).some(st=>st.description||st.title)||(s.title&&s.title.trim()));
  const w=window.open('','_blank');
  const css=`
    @page{margin:0.7in}
    body{font-family:'DM Sans',Arial,sans-serif;color:#1B2838;line-height:1.5;margin:0}
    .top{border-bottom:3px solid ${c.color};padding-bottom:12px;margin-bottom:20px}
    .cat{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${c.color}}
    h1{font-size:24px;margin:4px 0 6px}
    .org{font-size:11px;color:#6B6256;letter-spacing:1px;text-transform:uppercase}
    .lede{font-size:14px;color:#473d30;margin:0 0 18px}
    .safety{background:#FBF1EC;border-left:4px solid ${c.color};padding:10px 14px;font-size:12.5px;margin:0 0 18px;color:#7a4a2a}
    .h{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#6B6256;border-bottom:1px solid #ddd;padding-bottom:5px;margin:0 0 10px}
    .mats{margin:0 0 18px;padding-left:0;list-style:none;columns:2;font-size:12.5px}
    .mats li{margin-bottom:3px}
    .mats li:before{content:'· ';color:${c.color}}
    .sec{font-weight:700;font-size:14px;margin:16px 0 8px;color:${c.color}}
    ol.steps{padding-left:0;list-style:none;counter-reset:s;margin:0}
    ol.steps li{counter-increment:s;display:flex;gap:10px;padding:6px 0;page-break-inside:avoid;border-top:1px dotted #ddd}
    ol.steps li:before{content:counter(s);font-family:'DM Mono',monospace;font-size:11px;background:${c.color};color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 20px;margin-top:1px}
    .st b{display:block}
    .note{font-size:11px;color:#6B6256;background:#F3EFE7;border-left:2px solid #ccc;padding:4px 8px;margin-top:4px}
    ul.checks{list-style:none;padding:0;margin:0}
    ul.checks li{display:flex;gap:10px;padding:6px 0;page-break-inside:avoid;border-top:1px dotted #ddd;font-size:13px}
    ul.checks li:before{content:'';width:14px;height:14px;border:1.5px solid ${c.color};border-radius:3px;flex:0 0 14px;margin-top:2px}
    ul.checks .cn{font-size:11px;color:#6B6256;margin-left:6px}
    .sign{margin-top:30px;padding-top:14px;border-top:1px solid #ccc;display:flex;gap:40px;font-size:11px;color:#6B6256}
    .sign div{flex:1}
    .line{border-bottom:1px solid #999;height:24px;margin-top:18px}
    .foot{margin-top:24px;font-size:10px;color:#999;font-family:'DM Mono',monospace}
  `;
  const isCl=p.type==='checklist';
  const procHtml = isCl
    ? `<div class="h">Checklist</div>${sections.map(s=>{const items=(s.steps||[]).filter(st=>st.description||st.title);
        return `${s.title&&s.title.trim()?`<div class="sec">${esc(s.title)}</div>`:''}<ul class="checks">${items.map(st=>`<li><span>${esc(st.description)||esc(st.title)}${st.notes&&st.notes.trim()?`<span class="cn">— ${esc(st.notes)}</span>`:''}</span></li>`).join('')}</ul>`;
      }).join('')}`
    : `<div class="h">Procedure</div>${sections.map(s=>{const steps=(s.steps||[]).filter(st=>st.description||st.title);
        return `${s.title&&s.title.trim()?`<div class="sec">${esc(s.title)}</div>`:''}<ol class="steps">${steps.map(st=>`<li><div class="st">${st.title&&st.title.trim()?`<b>${esc(st.title)}</b>`:''}${esc(st.description)}${st.notes&&st.notes.trim()?`<div class="note">${esc(st.notes)}</div>`:''}</div></li>`).join('')}</ol>`;
      }).join('')}`;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(p.title)}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>${css}</style></head><body>
    <div class="top"><div class="cat">${esc(c.name)}${p.subcategory?' · '+esc(p.subcategory):''}</div>
      <h1>${esc(p.title)}</h1><div class="org">Theodore Ellison Designs · Technical Manual</div></div>
    ${p.summary?`<p class="lede">${esc(p.summary)}</p>`:''}
    ${p.safety&&p.safety.trim()?`<div class="safety"><b>Safety:</b> ${esc(p.safety)}</div>`:''}
    ${mats.length?`<div class="h">Materials &amp; Tools</div><ul class="mats">${mats.map(m=>`<li>${esc(m)}</li>`).join('')}</ul>`:''}
    ${procHtml}
    <div class="sign"><div>Reviewed by<div class="line"></div></div><div>Date<div class="line"></div></div></div>
    <div class="foot">${p.status} · printed ${new Date().toLocaleDateString()}</div>
    </body></html>`;
  w.document.write(html); w.document.close();
  setTimeout(()=>{w.focus();w.print();},500);
}

/* boot */
if(state.execUrl){ loadAll(); } else { render(); }
</script>
</body>
</html>
