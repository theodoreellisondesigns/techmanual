                  style={{ background: "none", border: "none", color: "#D4793A", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}
                >
                  See all →
                </button>
              }
            />
            {upcoming.length === 0 ? (
              <EmptyMsg>No reviews scheduled.</EmptyMsg>
            ) : (
              upcoming.map((s) => {
                const emp = employees.find((e) => e.id === s.employeeId);
                if (!emp) return null;
                return (
                  <ListRow key={s.id} onClick={() => navTo("employee", emp)}>
                    <Avatar name={emp.name} size={34} />
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{emp.name}</div>
                      <div style={styles.rowMeta}>{s.type} · {fmtDate(s.date)}</div>
                    </div>
                    <UrgencyBadge days={daysUntil(s.date)} />
                  </ListRow>
                );
              })
            )}
          </Card>
          <Card>
            <CardHeader title="Recent reviews" />
            {recent.length === 0 ? (
              <EmptyMsg>No reviews completed yet.</EmptyMsg>
            ) : (
              recent.map((r) => {
                const emp = employees.find((e) => e.id === r.employeeId);
                if (!emp) return null;
                const avg = avgRatings(r);
                return (
                  <ListRow key={r.id} onClick={() => navTo("reviewDetail", emp, r)}>
                    <Avatar name={emp.name} size={34} />
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{emp.name}</div>
                      <div style={styles.rowMeta}>{r.type} · {fmtDate(r.date)}</div>
                    </div>
                    {avg && (
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#D4793A" }}>
                        {avg}
                      </span>
                    )}
                  </ListRow>
                );
              })
            )}
          </Card>
        </div>
      </div>
    );
  };

  // ── View: Staff ──────────────────────────────────────────────────────────────
  const renderStaff = () => {
    const active = employees.filter((e) => e.status !== "terminated");
    const archived = employees.filter((e) => e.status === "terminated");
    const display = showArchived ? archived : active;

    const EmpCard = ({ emp }) => {
      const rl = empRevs(emp.id);
      const ns = empSched(emp.id)[0];
      const openGoals = rl.flatMap((r) => (r.goals || []).filter((g) => g.status === "open")).length;
      const isTerminated = emp.status === "terminated";
      return (
        <div
          key={emp.id}
          onClick={() => navTo("employee", emp)}
          style={{
            background: "var(--color-background-primary)",
            border: `0.5px solid ${isTerminated ? "#F09595" : "var(--color-border-tertiary)"}`,
            borderRadius: 12,
            padding: 20,
            cursor: "pointer",
            opacity: isTerminated ? 0.8 : 1,
            transition: "border-color .15s",
          }}
          onMouseOver={(e) => (e.currentTarget.style.borderColor = isTerminated ? "#E24B4A" : "#D4793A")}
          onMouseOut={(e) => (e.currentTarget.style.borderColor = isTerminated ? "#F09595" : "var(--color-border-tertiary)")}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
            <Avatar name={emp.name} size={48} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 16, fontWeight: 500, color: "var(--color-text-primary)" }}>{emp.name}</div>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: 2 }}>{emp.role || "—"}</div>
            </div>
            {isTerminated && (
              <span style={{ fontSize: 10, fontWeight: 700, color: "#A32D2D", background: "#FCEBEB", borderRadius: 4, padding: "3px 8px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                Archived
              </span>
            )}
          </div>
          <div style={{ display: "flex", gap: 16, marginBottom: ns && !isTerminated ? 12 : 0 }}>
            <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>📋 {rl.length} review{rl.length !== 1 ? "s" : ""}</span>
            <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>🎯 {openGoals} open goal{openGoals !== 1 ? "s" : ""}</span>
          </div>
          {isTerminated && emp.terminatedDate && (
            <div style={{ fontSize: 12, color: "#A32D2D", borderTop: "0.5px solid #F09595", paddingTop: 10, marginTop: 4 }}>
              {emp.terminationType} · {fmtDate(emp.terminatedDate)}
            </div>
          )}
          {!isTerminated && ns && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "0.5px solid var(--color-border-tertiary)", paddingTop: 12 }}>
              <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>Next review</span>
              <UrgencyBadge days={daysUntil(ns.date)} />
            </div>
          )}
        </div>
      );
    };

    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 16 }}>
            <h1 style={{ ...styles.pageTitle, margin: 0 }}>Staff</h1>
            {archived.length > 0 && (
              <button
                onClick={() => setShowArchived((p) => !p)}
                style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: showArchived ? "#D4793A" : "var(--color-text-secondary)", fontFamily: "'DM Sans', sans-serif", padding: 0 }}
              >
                {showArchived ? `← Active staff (${active.length})` : `${archived.length} archived`}
              </button>
            )}
          </div>
          {!showArchived && <Btn onClick={() => setModal("addEmp")}>+ Add staff member</Btn>}
        </div>

        {display.length === 0 ? (
          <Card style={{ textAlign: "center", padding: 48 }}>
            <p style={{ color: "var(--color-text-secondary)", marginBottom: 16, fontStyle: "italic" }}>
              {showArchived ? "No archived employees." : "No staff members yet."}
            </p>
            {!showArchived && <Btn onClick={() => setModal("addEmp")}>Add first staff member</Btn>}
          </Card>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
            {display.map((emp) => <EmpCard key={emp.id} emp={emp} />)}
          </div>
        )}
      </div>
    );
  };

  // ── View: Schedule ───────────────────────────────────────────────────────────
  const renderSchedule = () => {
    const completed = scheduled.filter((s) => s.completed).sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8);
    return (
      <div>
        <h1 style={styles.pageTitle}>Review schedule</h1>
        <Card>
          <CardHeader title="Upcoming" />
          {allUpcoming.length === 0 ? (
            <EmptyMsg>No reviews scheduled. Visit a staff member's profile to add one.</EmptyMsg>
          ) : (
            allUpcoming.map((s) => {
              const emp = employees.find((e) => e.id === s.employeeId);
              if (!emp) return null;
              return (
                <ListRow key={s.id}>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name}</div>
                    <div style={styles.rowMeta}>
                      {s.type} · {fmtDate(s.date)}
                      {s.notes ? ` · ${s.notes}` : ""}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <UrgencyBadge days={daysUntil(s.date)} />
                    <Btn variant="secondary" onClick={() => navTo("employee", emp)} style={{ fontSize: 12, padding: "5px 10px" }}>
                      Open →
                    </Btn>
                    <Btn
                      variant="secondary"
                      style={{ fontSize: 12, padding: "5px 10px", color: "#3B6D11", borderColor: "#97C459" }}
                      onClick={() =>
                        setScheduled((p) =>
                          p.map((x) => (x.id === s.id ? { ...x, completed: true } : x))
                        )
                      }
                    >
                      ✓ Done
                    </Btn>
                    <Btn
                      variant="danger"
                      style={{ fontSize: 12, padding: "5px 10px" }}
                      onClick={() => {
                        if (confirm("Remove this scheduled review?"))
                          setScheduled((p) => p.filter((x) => x.id !== s.id));
                      }}
                    >
                      ×
                    </Btn>
                  </div>
                </ListRow>
              );
            })
          )}
        </Card>
        {completed.length > 0 && (
          <Card>
            <CardHeader title="Completed" />
            {completed.map((s) => {
              const emp = employees.find((e) => e.id === s.employeeId);
              if (!emp) return null;
              return (
                <ListRow key={s.id} muted>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name}</div>
                    <div style={styles.rowMeta}>{s.type} · {fmtDate(s.date)} · Completed</div>
                  </div>
                </ListRow>
              );
            })}
          </Card>
        )}
      </div>
    );
  };

  // ── View: Employee ───────────────────────────────────────────────────────────
  const renderEmployee = () => {
    if (!selEmp) return null;
    const emp = employees.find((e) => e.id === selEmp.id) || selEmp; // always fresh
    const isTerminated = emp.status === "terminated";
    const rl = empRevs(emp.id);
    const ns = empSched(emp.id)[0];
    const openGoals = rl.flatMap((r) =>
      (r.goals || []).filter((g) => g.status === "open").map((g) => ({ ...g, revDate: r.date, revId: r.id }))
    );
    return (
      <div>
        <button
          onClick={() => navTo("staff")}
          style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0 }}
        >
          ← Back to staff
        </button>

        {/* Terminated banner */}
        {isTerminated && (
          <div style={{ display: "flex", alignItems: "center", gap: 16, background: "#FCEBEB", border: "0.5px solid #F09595", borderRadius: 8, padding: "12px 20px", marginBottom: 20, flexWrap: "wrap" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#A32D2D", marginBottom: 2 }}>
                Archived — {emp.terminationType}
              </div>
              <div style={{ fontSize: 12, color: "#993535" }}>
                {fmtDate(emp.terminatedDate)}{emp.terminationNotes ? ` · ${emp.terminationNotes}` : ""}
              </div>
            </div>
            <Btn variant="secondary" style={{ fontSize: 12, padding: "5px 12px", color: "#3B6D11", borderColor: "#97C459" }}
              onClick={() => { handleReactivate(emp.id); setSelEmp({ ...emp, status: "active" }); }}>
              Reactivate
            </Btn>
            <Btn variant="danger" style={{ fontSize: 12, padding: "5px 12px" }}
              onClick={() => handleDeletePermanently(emp.id)}>
              Delete permanently
            </Btn>
          </div>
        )}

        <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 24, flexWrap: "wrap" }}>
          <Avatar name={emp.name} size={64} />
          <div>
            <h1 style={{ ...styles.pageTitle, margin: "0 0 4px" }}>{emp.name}</h1>
            <div style={{ color: "var(--color-text-secondary)", fontSize: 15 }}>{emp.role || "—"}</div>
            {emp.startDate && (
              <div style={{ color: "var(--color-text-secondary)", fontSize: 13, marginTop: 2 }}>
                Since {fmtDate(emp.startDate)}
              </div>
            )}
            {emp.email && (
              <div style={{ color: "var(--color-text-secondary)", fontSize: 13, marginTop: 2 }}>
                {emp.email}
              </div>
            )}
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 10, flexWrap: "wrap" }}>
            <Btn variant="secondary" onClick={() => setModal("editEmp")} style={{ fontSize: 13 }}>Edit details</Btn>
            {!isTerminated && (<>
              <Btn variant="secondary" onClick={() => setModal("schedRev")}>Schedule review</Btn>
              {counselingUnlocked && (
                <Btn variant="secondary" onClick={() => setModal("newInc")} style={{ color: "#854F0B", borderColor: "#FAC775" }}>🔒 Add counseling record</Btn>
              )}
              <Btn onClick={() => setModal("newRev")}>+ Add review</Btn>
              <Btn variant="danger" onClick={() => setModal("terminate")} style={{ fontSize: 13 }}>Terminate</Btn>
            </>)}
          </div>
        </div>

        {emp.roleDescription && (
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--color-text-secondary)", marginBottom: 8 }}>Responsibilities</div>
            <div style={{ fontSize: 14, color: "var(--color-text-primary)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{emp.roleDescription}</div>
          </div>
        )}

        {(emp.hourlyRate != null || emp.lastRaiseDate) && (() => {
          // Compute time since last raise for context (e.g. "1 yr 3 mo ago")
          let timeSince = "";
          let overdueFlag = false;
          if (emp.lastRaiseDate) {
            const then = new Date(emp.lastRaiseDate + "T12:00:00");
            const now = new Date();
            const months = (now.getFullYear() - then.getFullYear()) * 12 + (now.getMonth() - then.getMonth()) - (now.getDate() < then.getDate() ? 1 : 0);
            if (months >= 0) {
              const yr = Math.floor(months / 12);
              const mo = months % 12;
              timeSince = (yr > 0 ? `${yr} yr${yr === 1 ? "" : "s"}` : "") + (yr > 0 && mo > 0 ? " " : "") + (mo > 0 ? `${mo} mo` : (yr === 0 ? "less than a month" : ""));
              timeSince += " ago";
              overdueFlag = months >= 18; // flag if it's been 18+ months
            }
          }
          return (
            <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--color-text-secondary)", marginBottom: 12 }}>Compensation</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Hourly rate</div>
                  <div style={{ fontSize: 22, fontWeight: 600, color: "#1B2838", letterSpacing: "-0.01em" }}>
                    {emp.hourlyRate != null ? `$${Number(emp.hourlyRate).toFixed(2)}` : "—"}
                  </div>
                </div>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Last pay increase</div>
                  <div style={{ fontSize: 14, color: "var(--color-text-primary)", fontWeight: 500 }}>
                    {emp.lastRaiseDate ? fmtDate(emp.lastRaiseDate) : "—"}
                  </div>
                  {timeSince && (
                    <div style={{ fontSize: 12, color: overdueFlag ? "#D4793A" : "var(--color-text-secondary)", marginTop: 2, fontStyle: overdueFlag ? "normal" : "italic", fontWeight: overdueFlag ? 600 : 400 }}>
                      {timeSince}{overdueFlag ? " — review due" : ""}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })()}
        {ns && (
          <div
            style={{
              background: "var(--color-background-primary)",
              border: "0.5px solid var(--color-border-tertiary)",
              borderLeft: "3px solid #D4793A",
              borderRadius: "0 8px 8px 0",
              padding: "12px 20px",
              display: "flex",
              gap: 14,
              alignItems: "center",
              marginBottom: 20,
              flexWrap: "wrap",
              fontSize: 14,
              color: "var(--color-text-primary)",
            }}
          >
            <span style={{ color: "var(--color-text-secondary)" }}>Next scheduled review:</span>
            <strong>{fmtDate(ns.date)}</strong>
            <span style={{ color: "var(--color-text-secondary)" }}>({ns.type})</span>
            <UrgencyBadge days={daysUntil(ns.date)} />
          </div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <Card>
            <CardHeader title="Open goals" />
            {openGoals.length === 0 ? (
              <EmptyMsg>No open goals. Goals set in reviews appear here.</EmptyMsg>
            ) : (
              openGoals.map((g) => (
                <div
                  key={g.id}
                  style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "11px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)" }}
                >
                  <button
                    title="Mark complete"
                    onClick={() =>
                      setReviews((p) =>
                        p.map((r) =>
                          r.id === g.revId
                            ? { ...r, goals: r.goals.map((gl) => (gl.id === g.id ? { ...gl, status: "complete", completedAt: todayStr() } : gl)) }
                            : r
                        )
                      )
                    }
                    style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "var(--color-border-secondary)", padding: 0, marginTop: 1 }}
                    onMouseOver={(e) => (e.target.style.color = "#5e8a64")}
                    onMouseOut={(e) => (e.target.style.color = "var(--color-border-secondary)")}
                  >
                    ○
                  </button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, color: "var(--color-text-primary)" }}>{g.text}</div>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>
                      Set {fmtDate(g.revDate)}
                    </div>
                  </div>
                </div>
              ))
            )}
          </Card>
          <Card>
            <CardHeader title="Review history" />
            {rl.length === 0 ? (
              <EmptyMsg>No reviews yet. Click "Add review" to record the first one.</EmptyMsg>
            ) : (
              rl.map((r) => {
                const avg = avgRatings(r);
                const cg = (r.goals || []).filter((g) => g.status === "complete").length;
                const tg = (r.goals || []).length;
                return (
                  <ListRow key={r.id} onClick={() => navTo("reviewDetail", emp, r)}>
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{r.type} · {fmtDate(r.date)}</div>
                      <div style={styles.rowMeta}>
                        {tg > 0 ? `${cg}/${tg} goals · ` : ""}
                        {(r.overallNotes || r.notes) ? (r.overallNotes || r.notes).slice(0, 55) + ((r.overallNotes || r.notes).length > 55 ? "…" : "") : "No notes"}
                      </div>
                    </div>
                    {avg && (
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#D4793A" }}>
                        {avg}
                      </span>
                    )}
                  </ListRow>
                );
              })
            )}
          </Card>
        </div>
        {/* Counseling records — only visible when log is unlocked */}
        {counselingUnlocked && (() => {
          const il = empIncs(emp.id);
          if (il.length === 0) return null;
          return (
            <Card style={{ marginTop: 16 }}>
              <CardHeader
                title="🔒 Counseling records"
                action={<span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{il.length} record{il.length !== 1 ? "s" : ""} — confidential</span>}
              />
              {il.map((inc) => {
                const sev = INC_SEVERITY.find((s) => s.key === inc.severity);
                const openAI = (inc.actionItems || []).filter((a) => a.status === "open").length;
                return (
                  <ListRow key={inc.id} onClick={() => navTo("incidentDetail", emp, null, inc)}>
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{inc.category} · {fmtDate(inc.date)}</div>
                      <div style={styles.rowMeta}>
                        {inc.reporter}{openAI > 0 ? ` · ${openAI} open action${openAI > 1 ? "s" : ""}` : ""}
                        {inc.followUpDate ? ` · Follow-up ${fmtDate(inc.followUpDate)}` : ""}
                      </div>
                    </div>
                    {sev && (
                      <span style={{ fontSize: 11, fontWeight: 600, color: sev.color, background: sev.bg, borderRadius: 4, padding: "3px 9px", whiteSpace: "nowrap" }}>
                        {sev.label}
                      </span>
                    )}
                  </ListRow>
                );
              })}
            </Card>
          );
        })()}

        {/* Danger zone — permanent delete (visible for active employees too, for testing/correction) */}
        {!isTerminated && (
          <div style={{ marginTop: 48, padding: 20, border: "0.5px dashed rgba(163,45,45,0.4)", borderRadius: 8, background: "rgba(252,235,235,0.4)" }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#A32D2D", marginBottom: 6 }}>Danger zone</div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
              <div style={{ fontSize: 13, color: "#6B6560", maxWidth: 540, lineHeight: 1.6 }}>
                Permanently deleting removes {emp.name}'s staff record and all linked reviews, counseling records, and scheduled reviews. Use <strong>Terminate</strong> instead if they're leaving the studio — that preserves their history.
              </div>
              <Btn variant="danger" onClick={() => handleDeletePermanently(emp.id)} style={{ fontSize: 12, padding: "6px 14px", whiteSpace: "nowrap" }}>
                Delete permanently
              </Btn>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── View: Review detail ──────────────────────────────────────────────────────
  const renderReviewDetail = () => {
    if (!selRev) return null;
    const r = selRev;
    const emp = employees.find((e) => e.id === r.employeeId);
    const avg = avgRatings(r);

    const GoalItem = ({ g, revId }) => (
      <div key={g.id} style={{ display: "flex", gap: 12, padding: "10px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)", alignItems: "flex-start" }}>
        <span style={{ fontSize: 16, color: g.status === "complete" ? "#5e8a64" : g.status === "carried" ? "var(--color-text-secondary)" : "var(--color-border-secondary)", marginTop: 1 }}>
          {g.status === "complete" ? "✓" : g.status === "carried" ? "↗" : "○"}
        </span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, textDecoration: g.status !== "open" ? "line-through" : "none", color: g.status === "open" ? "var(--color-text-primary)" : "var(--color-text-secondary)" }}>
            {g.text}
          </div>
          {g.completedAt && <div style={{ fontSize: 11, color: "#5e8a64", marginTop: 2 }}>Completed {fmtDate(g.completedAt)}</div>}
          {g.status === "carried" && <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>Carried to next review</div>}
        </div>
      </div>
    );

    return (
      <div className="review-detail-page" style={{ maxWidth: 860 }}>
        <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, gap: 12, flexWrap: "wrap" }}>
          <button onClick={() => navTo("employee", emp || selEmp)} style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, fontFamily: "'DM Sans', sans-serif", padding: 0 }}>
            ← Back
          </button>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Btn onClick={() => setModal("editRev")} style={{ fontSize: 13, padding: "7px 14px" }}>
              Edit review
            </Btn>
            <Btn variant="secondary" onClick={() => printReview(r, emp, formDef)} style={{ fontSize: 13, padding: "7px 14px" }}>
              Print full review
            </Btn>
            <Btn variant="secondary" onClick={() => printEmployeeCopy(r, emp, formDef)} style={{ fontSize: 13, padding: "7px 14px", borderColor: "#97C459", color: "#3B6D11" }}>
              Print employee copy
            </Btn>
            <Btn variant="secondary" onClick={() => downloadReviewText(r, emp, formDef)} style={{ fontSize: 13, padding: "7px 14px" }}>
              Download as text
            </Btn>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24, flexWrap: "wrap" }}>
          {emp && <Avatar name={emp.name} size={52} />}
          <div>
            <h1 style={{ ...styles.pageTitle, margin: "0 0 4px" }}>{r.type} review</h1>
            <div style={{ color: "var(--color-text-secondary)" }}>{emp?.name} · {fmtDate(r.date)}</div>
            {r.reviewer && <div style={{ color: "var(--color-text-secondary)", fontSize: 13, marginTop: 2 }}>Reviewer: {r.reviewer}{r.reviewPeriod ? ` · Period: ${r.reviewPeriod}` : ""}</div>}
            {r.lastEditedAt && (
              <div style={{ color: "#D4793A", fontSize: 12, marginTop: 4, fontStyle: "italic" }}>
                Last edited {new Date(r.lastEditedAt).toLocaleString()}{r.lastEditedBy && r.lastEditedBy !== r.reviewer ? ` by ${r.lastEditedBy}` : ""}
              </div>
            )}
          </div>
          {avg && (
            <div className="no-print" style={{ marginLeft: "auto", fontFamily: "'DM Sans', sans-serif", fontSize: 44, fontWeight: 700, color: "#D4793A" }}>
              {avg}<span style={{ fontSize: 14, fontWeight: 400, color: "var(--color-text-secondary)" }}> /5</span>
            </div>
          )}
        </div>

        {/* Form-driven format (new reviews) */}
        {r.responses && (() => {
          // Use the CURRENT form definition — structural edits (new sections,
          // renamed questions) apply to all reviews automatically. Answers stay
          // attached to their question IDs.
          const fd = formDef || r.formSnapshot;
          return fd.sections.map(sec => {
            const secPeers = (r.peerInputs || {})[sec.id] || [];
            const answered = sec.questions.filter(q => r.responses[q.id] !== undefined && r.responses[q.id] !== "" && r.responses[q.id] !== 0);
            const isEmpty = !answered.length && !secPeers.length;
            const ratingQs = sec.questions.filter(q => q.type === "rating" && r.responses[q.id] > 0);
            const secAvg = ratingQs.length ? (ratingQs.reduce((a,q)=>a+r.responses[q.id],0)/ratingQs.length).toFixed(1) : null;
            return (
              <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 16, overflow: "hidden" }}>
                <div style={{ padding: "12px 20px", background: sec.bg + "44", borderBottom: "0.5px solid var(--color-border-tertiary)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: sec.color }}>{sec.title}</span>
                  {secAvg && <span style={{ fontSize: 12, fontWeight: 600, color: "#fff", background: sec.color, borderRadius: 5, padding: "3px 11px" }}>{secAvg} avg</span>}
                </div>
                {isEmpty ? (
                  <div style={{ padding: "18px 20px", fontSize: 13, color: "var(--color-text-secondary)", fontStyle: "italic", lineHeight: 1.6 }}>
                    No responses recorded yet. Click <strong>Edit review</strong> above to fill in this section.
                  </div>
                ) : (
                  <div style={{ padding: "16px 20px 4px" }}>
                    {sec.questions.map(q => {
                      const val = r.responses[q.id];
                      if (val === undefined || val === "" || val === 0) return null;
                      return q.type === "rating" ? (
                        <QuestionRating key={q.id} q={q} value={val} readOnly />
                      ) : (
                        <div key={q.id} style={{ marginBottom: 16 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: q.title ? 2 : 4 }}>
                            <span style={{ color: "var(--color-text-secondary)", marginRight: 6, fontWeight: 400 }}>{q.num}.</span>{q.title || q.text}
                          </div>
                          {q.title && q.text && (
                            <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 6, lineHeight: 1.5, paddingLeft: 22 }}>{q.text}</div>
                          )}
                          <p style={{ fontSize: 14, lineHeight: 1.7, color: "var(--color-text-primary)", margin: 0, whiteSpace: "pre-wrap", paddingLeft: q.title ? 22 : 0 }}>{val}</p>
                        </div>
                      );
                    })}
                  </div>
                )}
                {secPeers.length > 0 && (
                  <div style={{ padding: "12px 20px", background: "var(--color-background-secondary)", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
                    <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.07em", color: sec.color, fontWeight: 600, marginBottom: 8 }}>Peer input</div>
                    {secPeers.map(pi => (
                      <div key={pi.id} style={{ background: "var(--color-background-primary)", border: `0.5px solid ${sec.color}33`, borderLeft: `3px solid ${sec.color}`, borderRadius: "0 8px 8px 0", padding: "9px 12px", marginBottom: 8 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: sec.color, marginBottom: 3 }}>{pi.source}</div>
                        <p style={{ fontSize: 13, color: "var(--color-text-primary)", margin: 0, lineHeight: 1.5 }}>{pi.note}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          });
        })()}

        {/* Legacy section+prompts format */}
        {!r.responses && r.sections && Object.entries(r.sections).map(([key, sd]) => {
          if (!sd) return null;
          const hasContent = sd.rating || (sd.checks || []).length || sd.notes;
          if (!hasContent) return null;
          return (
            <div key={key} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: "3px solid #888", borderRadius: "0 12px 12px 0", marginBottom: 16, overflow: "hidden" }}>
              <div style={{ padding: "11px 20px", background: "var(--color-background-secondary)", borderBottom: "0.5px solid var(--color-border-tertiary)", display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", textTransform: "capitalize" }}>{key.replace(/_/g, " ")}</span>
                {sd.rating > 0 && <span style={{ fontSize: 12, fontWeight: 600 }}>{sd.rating}/5</span>}
              </div>
              <div style={{ padding: "12px 20px" }}>
                {(sd.checks || []).map(c => <div key={c} style={{ fontSize: 13, marginBottom: 4 }}>✓ {c}</div>)}
                {sd.notes && <p style={{ fontSize: 14, lineHeight: 1.7, margin: "8px 0 0" }}>{sd.notes}</p>}
              </div>
            </div>
          );
        })}


        {/* Overall notes */}
        {(r.overallNotes || r.notes) && (
          <Card style={{ marginBottom: 16 }}>
            <CardHeader title="Overall notes" />
            <p style={{ fontSize: 14, lineHeight: 1.7, color: "var(--color-text-primary)", padding: "0 20px 20px", whiteSpace: "pre-wrap" }}>
              {r.overallNotes || r.notes}
            </p>
          </Card>
        )}

        {/* Goals */}
        <Card>
          <CardHeader title="Goals" />
          {(r.goals || []).length === 0 ? (
            <EmptyMsg>No goals were set in this review.</EmptyMsg>
          ) : (
            (r.goals || []).map((g) => <GoalItem key={g.id} g={g} revId={r.id} />)
          )}
        </Card>

        {/* Danger zone — delete this review */}
        <div className="no-print" style={{ marginTop: 48, padding: 20, border: "0.5px dashed rgba(163,45,45,0.4)", borderRadius: 8, background: "rgba(252,235,235,0.4)" }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#A32D2D", marginBottom: 6 }}>Danger zone</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
            <div style={{ fontSize: 13, color: "#6B6560", maxWidth: 540, lineHeight: 1.6 }}>
              Permanently delete this review and start over. All ratings, comments, staff input, and goals attached to this review will be removed. Use <strong>Edit review</strong> instead if you want to revise the existing version.
            </div>
            <Btn variant="danger" onClick={() => handleDeleteReview(r.id)} style={{ fontSize: 12, padding: "6px 14px", whiteSpace: "nowrap" }}>
              Delete review
            </Btn>
          </div>
        </div>
      </div>
    );
  };

  // ── View: Review detail ──────────────────────────────────────────────────────
  const renderCounselingLog = () => {
    // ── No PIN set yet — show setup view ─────────────────────────────────────
    if (!counselingPinHash) {
      return (
        <div style={{ maxWidth: 520 }}>
          <h1 style={styles.pageTitle}>Counseling log</h1>
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 28 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#D4793A", marginBottom: 10 }}>First-time setup</div>
            <h2 style={{ fontSize: 20, fontWeight: 500, color: "#1B2838", marginBottom: 10, letterSpacing: "-0.01em" }}>Set a PIN for this section</h2>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.7, marginBottom: 20 }}>
              The counseling log holds sensitive HR documentation. Set a 4–8 digit PIN that you'll share only with authorized leadership — Ted, Eric, and Jenna. Anyone without the PIN can use the rest of the app but cannot view or create counseling records.
            </p>
            <FL mt={0}>New PIN (4–8 digits)</FL>
            <FI type="password" inputMode="numeric" value={pinInput}
              onChange={(e) => { setPinInput(e.target.value.replace(/\D/g, "")); setPinError(""); }}
              placeholder="••••" maxLength={8} autoFocus />
            <FL>Confirm PIN</FL>
            <FI type="password" inputMode="numeric" value={pinConfirm}
              onChange={(e) => { setPinConfirm(e.target.value.replace(/\D/g, "")); setPinError(""); }}
              placeholder="••••" maxLength={8}
              onKeyDown={(e) => e.key === "Enter" && handleSetPin()} />
            {pinError && (
              <div style={{ marginTop: 12, padding: "8px 12px", background: "#FCEBEB", borderRadius: 6, fontSize: 13, color: "#A32D2D" }}>{pinError}</div>
            )}
            <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
              <Btn onClick={handleSetPin} disabled={!pinInput || !pinConfirm}>Set PIN and unlock</Btn>
            </div>
          </div>
        </div>
      );
    }

    // ── PIN set but not unlocked in this session — show entry view ───────────
    if (!counselingUnlocked) {
      return (
        <div style={{ maxWidth: 460 }}>
          <h1 style={styles.pageTitle}>Counseling log</h1>
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 28 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
              <span style={{ fontSize: 22 }}>🔒</span>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "#1B2838" }}>Locked</div>
                <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>Enter the PIN to access counseling records.</div>
              </div>
            </div>
            <FL mt={0}>PIN</FL>
            <FI type="password" inputMode="numeric" value={pinInput}
              onChange={(e) => { setPinInput(e.target.value.replace(/\D/g, "")); setPinError(""); }}
              placeholder="••••" maxLength={8} autoFocus
              onKeyDown={(e) => e.key === "Enter" && handleEnterPin()} />
            {pinError && (
              <div style={{ marginTop: 12, padding: "8px 12px", background: "#FCEBEB", borderRadius: 6, fontSize: 13, color: "#A32D2D" }}>{pinError}</div>
            )}
            <div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end" }}>
              <Btn onClick={handleEnterPin} disabled={!pinInput}>Unlock</Btn>
            </div>
            <p style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 16, lineHeight: 1.6 }}>
              Forgot the PIN? The owner can reset it in <strong>Settings</strong>, or by clearing the <code>ted-counseling-pin</code> row in the Google Sheet.
            </p>
          </div>
        </div>
      );
    }

    // ── Unlocked — show normal counseling log ────────────────────────────────
    const sorted = [...incidents].sort((a, b) => b.date.localeCompare(a.date));
    const openFollowUps = incidents.filter((i) => i.followUpDate && daysUntil(i.followUpDate) <= 14 && daysUntil(i.followUpDate) >= 0);
    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
          <h1 style={styles.pageTitle}>Counseling log</h1>
          <Btn variant="secondary" onClick={lockCounseling} style={{ fontSize: 12, padding: "5px 12px" }}>
            🔒 Lock
          </Btn>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#FAEEDA", border: "0.5px solid #FAC775", borderRadius: 8, padding: "9px 14px", marginBottom: 20 }}>
          <span style={{ fontSize: 15 }}>🔓</span>
          <span style={{ fontSize: 12, color: "#633806", fontWeight: 500 }}>Unlocked for this session — confidential. Lock when you're done.</span>
        </div>
        {openFollowUps.length > 0 && (
          <Card style={{ marginBottom: 20, borderLeft: "3px solid #D4793A", borderRadius: "0 12px 12px 0" }}>
            <CardHeader title="Follow-ups due soon" />
            {openFollowUps.map((i) => {
              const emp = employees.find((e) => e.id === i.employeeId);
              if (!emp) return null;
              return (
                <ListRow key={i.id} onClick={() => navTo("incidentDetail", emp, null, i)}>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name} — {i.category}</div>
                    <div style={styles.rowMeta}>Follow-up {fmtDate(i.followUpDate)} · {i.reporter}</div>
                  </div>
                  <UrgencyBadge days={daysUntil(i.followUpDate)} />
                </ListRow>
              );
            })}
          </Card>
        )}
        <Card>
          <CardHeader title="All records" action={
            <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{sorted.length} record{sorted.length !== 1 ? "s" : ""}</span>
          } />
          {sorted.length === 0 ? (
            <EmptyMsg>No counseling records. Open a staff member's profile to add one.</EmptyMsg>
          ) : (
            sorted.map((i) => {
              const emp = employees.find((e) => e.id === i.employeeId);
              if (!emp) return null;
              const sev = INC_SEVERITY.find((s) => s.key === i.severity);
              const openItems = (i.actionItems || []).filter((a) => a.status === "open").length;
              return (
                <ListRow key={i.id} onClick={() => navTo("incidentDetail", emp, null, i)}>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name} — {i.category}</div>
                    <div style={styles.rowMeta}>{fmtDate(i.date)} · {i.reporter}{openItems > 0 ? ` · ${openItems} open action${openItems > 1 ? "s" : ""}` : ""}</div>
                  </div>
                  {sev && (
                    <span style={{ fontSize: 11, fontWeight: 600, color: sev.color, background: sev.bg, borderRadius: 4, padding: "3px 9px", whiteSpace: "nowrap" }}>
                      {sev.label}
                    </span>
                  )}
                </ListRow>
              );
            })
          )}
        </Card>
      </div>
    );
  };

  // ── View: Incident detail ─────────────────────────────────────────────────────
  const renderIncidentDetail = () => {
    if (!selInc) return null;
    if (!counselingUnlocked) {
      // Don't show the counseling record if locked; bounce them to the gate
      return (
        <div style={{ maxWidth: 460 }}>
          <button onClick={() => navTo(selEmp ? "employee" : "dashboard", selEmp)}
            style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0 }}>← Back</button>
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 28 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 22 }}>🔒</span>
              <div style={{ fontSize: 15, fontWeight: 600, color: "#1B2838" }}>Counseling log is locked</div>
            </div>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.7, marginTop: 8 }}>
              Open the Counseling log from the sidebar to enter the PIN.
            </p>
          </div>
        </div>
      );
    }
    const i = selInc;
    const emp = employees.find((e) => e.id === i.employeeId) || selEmp;
    const sev = INC_SEVERITY.find((s) => s.key === i.severity);
    const openItems = (i.actionItems || []).filter((a) => a.status === "open").length;
    return (
      <div>
        <button
          onClick={() => navTo(selEmp ? "employee" : "counseling", selEmp)}
          style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0 }}
        >
          ← Back
        </button>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "flex-start", gap: 20, marginBottom: 24, flexWrap: "wrap" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6, flexWrap: "wrap" }}>
              <span style={{ fontSize: 16 }}>🔒</span>
              <h1 style={{ ...styles.pageTitle, margin: 0 }}>{i.category}</h1>
              {sev && (
                <span style={{ fontSize: 12, fontWeight: 600, color: sev.color, background: sev.bg, borderRadius: 4, padding: "4px 10px" }}>
                  {sev.label}
                </span>
              )}
            </div>
            <div style={{ color: "var(--color-text-secondary)", fontSize: 14 }}>
              {emp?.name} · {fmtDate(i.date)} · Documented by {i.reporter}
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="secondary" onClick={() => setModal("editInc")}>Edit record</Btn>
            <Btn variant="danger" onClick={() => {
              if (confirm("Permanently delete this record?")) {
                setIncidents((p) => p.filter((x) => x.id !== i.id));
                navTo(selEmp ? "employee" : "counseling", selEmp);
              }
            }}>Delete</Btn>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          {/* Left */}
          <div>
            <Card>
              <CardHeader title="Incident description" />
              <p style={{ fontSize: 14, lineHeight: 1.8, color: "var(--color-text-primary)", padding: "0 20px 20px", whiteSpace: "pre-wrap" }}>
                {i.description}
              </p>
            </Card>
            {i.priorDiscussions && (
              <Card>
                <CardHeader title="Prior discussions" />
                <p style={{ fontSize: 14, lineHeight: 1.8, color: "var(--color-text-primary)", padding: "0 20px 20px", whiteSpace: "pre-wrap" }}>
                  {i.priorDetail || "Previously discussed (no detail recorded)."}
                </p>
              </Card>
            )}
            {i.employeeResponse && (
              <Card>
                <CardHeader title="Employee response" />
                <p style={{ fontSize: 14, lineHeight: 1.8, color: "var(--color-text-primary)", padding: "0 20px 20px", whiteSpace: "pre-wrap" }}>
                  {i.employeeResponse}
                </p>
                {i.employeeAcknowledged && (
                  <div style={{ padding: "0 20px 16px", fontSize: 12, color: "#3B6D11" }}>
                    ✓ Employee was informed of this documentation
                  </div>
                )}
              </Card>
            )}
          </div>

          {/* Right */}
          <div>
            <Card>
              <CardHeader title={`Action items${openItems > 0 ? ` (${openItems} open)` : ""}`} />
              {(i.actionItems || []).length === 0 ? (
                <EmptyMsg>No action items were specified.</EmptyMsg>
              ) : (
                (i.actionItems || []).map((a) => (
                  <div key={a.id} style={{ display: "flex", gap: 12, padding: "10px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)", alignItems: "flex-start" }}>
                    <button
                      onClick={() => {
                        const updated = { ...i, actionItems: i.actionItems.map((x) => x.id === a.id ? { ...x, status: x.status === "open" ? "complete" : "open", completedAt: x.status === "open" ? todayStr() : undefined } : x) };
                        setIncidents((p) => p.map((x) => x.id === i.id ? updated : x));
                        setSelInc(updated);
                      }}
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: a.status === "complete" ? "#5e8a64" : "var(--color-border-secondary)", padding: 0, marginTop: 2 }}
                    >
                      {a.status === "complete" ? "✓" : "○"}
                    </button>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, textDecoration: a.status === "complete" ? "line-through" : "none", color: a.status === "complete" ? "var(--color-text-secondary)" : "var(--color-text-primary)" }}>
                        {a.text}
                      </div>
                      <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>
                        {a.dueDate ? `Due ${fmtDate(a.dueDate)}` : "No due date"}
                        {a.completedAt ? ` · Completed ${fmtDate(a.completedAt)}` : ""}
                      </div>
                    </div>
                  </div>
                ))
              )}
            </Card>

            {/* Meta card */}
            <Card>
              <CardHeader title="Record details" />
              <div style={{ padding: "0 20px" }}>
                {[
                  ["Employee", emp?.name || "—"],
                  ["Date", fmtDate(i.date)],
                  ["Category", i.category],
                  ["Level", sev?.label || "—"],
                  ["Reported by", i.reporter],
                  ["Follow-up date", i.followUpDate ? fmtDate(i.followUpDate) : "—"],
                  ["Prior discussions", i.priorDiscussions ? "Yes" : "No"],
                  ["Employee informed", i.employeeAcknowledged ? "Yes" : "No"],
                  ["Created", fmtDate(i.createdAt)],
                  ...(i.updatedAt && i.updatedAt !== i.createdAt ? [["Last edited", fmtDate(i.updatedAt)]] : []),
                ].map(([label, val]) => (
                  <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontSize: 13 }}>
                    <span style={{ color: "var(--color-text-secondary)" }}>{label}</span>
                    <span style={{ color: "var(--color-text-primary)", fontWeight: 500 }}>{val}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      </div>
    );
  };

  // ── App-level PIN handlers ──────────────────────────────────────────────────
  const handleAppUnlock = async () => {
    const h = await hashPin(appPinInput);
    if (h === appPinHash) {
      setAppUnlocked(true);
      try { sessionStorage.setItem("ted-app-unlocked", "true"); } catch(e) {}
      setAppPinInput("");
      setAppPinError("");
    } else {
      setAppPinError("Incorrect PIN. Try again.");
    }
  };
  const handleAppSetPin = async () => {
    if (!appPinInput || appPinInput.length < 4) { setAppPinError("PIN must be at least 4 digits."); return; }
    if (appPinInput !== appPinConfirm) { setAppPinError("PINs don't match."); return; }
    const h = await hashPin(appPinInput);
    setAppPinHash(h);
    setAppUnlocked(true);
    try { sessionStorage.setItem("ted-app-unlocked", "true"); } catch(e) {}
    setAppPinInput("");
    setAppPinConfirm("");
    setAppPinError("");
  };

  // ── View: Settings ───────────────────────────────────────────────────────────
  const renderSettings = () => {
    return (
      <div style={{ maxWidth: 560 }}>
        <h1 style={styles.pageTitle}>Settings</h1>

        {/* App PIN management */}
        <Card style={{ marginBottom: 16 }}>
          <CardHeader title="App access PIN" />
          <div style={{ padding: "16px 20px 20px" }}>
            <p style={{ fontSize: 14, color: "var(--color-text-secondary)", lineHeight: 1.7, marginBottom: 16 }}>
              The app PIN is required to open this app in any new browser session. To change your PIN, enter a new one below. To remove PIN protection entirely, clear the <code style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3 }}>ted-app-pin</code> row in your Google Sheet.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
              <div>
                <FL mt={0}>New PIN</FL>
                <FI type="password" inputMode="numeric" placeholder="Min 4 digits"
                  value={appPinInput} onChange={e => { setAppPinInput(e.target.value); setAppPinError(""); }} />
              </div>
              <div>
                <FL mt={0}>Confirm new PIN</FL>
                <FI type="password" inputMode="numeric" placeholder="Re-enter"
                  value={appPinConfirm} onChange={e => { setAppPinConfirm(e.target.value); setAppPinError(""); }} />
              </div>
            </div>
            {appPinError && <div style={{ color: "#A32D2D", fontSize: 13, marginBottom: 10 }}>{appPinError}</div>}
            <Btn onClick={handleAppSetPin} style={{ fontSize: 13, padding: "7px 16px" }}>
              Update app PIN
            </Btn>
          </div>
        </Card>

        <Card style={{ marginBottom: 16 }}>
          <CardHeader title="Team sharing" />
          <div style={{ padding: "16px 20px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#5e8a64", flexShrink: 0 }} />
              <span style={{ fontSize: 13, color: "#3B6D11", fontWeight: 500 }}>Shared storage active</span>
            </div>
            <p style={{ fontSize: 14, color: "var(--color-text-secondary)", lineHeight: 1.7, margin: "0 0 14px" }}>
              All data in this app is stored in shared mode — anyone you give access to this artifact sees the same employees, reviews, and records in real time.
            </p>
            <p style={{ fontSize: 14, color: "var(--color-text-secondary)", lineHeight: 1.7, margin: "0 0 14px" }}>
              To share with your team, add them to your Claude Project and share the artifact link. Jenna, Eric, and Max will open it and see the same data you do — no setup required on their end.
            </p>
            <div style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: "12px 16px", fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6 }}>
              <strong style={{ color: "var(--color-text-primary)" }}>Note on Google Sheets:</strong> Direct Sheets integration from within a Claude artifact is blocked by the sandbox. For exports and reports, use the data export below, which you can paste into a sheet manually or send to Jenna.
            </div>
          </div>
        </Card>

        <Card style={{ marginTop: 16 }}>
          <CardHeader title="Data storage" action={
            <button
              onClick={() => {
                const snapshot = {
                  exportedAt: new Date().toISOString(),
                  employees, reviews, scheduled, incidents,
                };
                const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = `ted-reviews-export-${todayStr()}.json`; a.click();
                URL.revokeObjectURL(url);
              }}
              style={{ background: "none", border: "none", color: "#D4793A", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}
            >
              Export JSON ↓
            </button>
          } />
          <div style={{ padding: "0 20px 4px" }}>
            {[
              ["Employees", employees.filter(e => e.status !== "terminated").length + " active, " + employees.filter(e => e.status === "terminated").length + " archived"],
              ["Reviews", reviews.length],
              ["Scheduled reviews", scheduled.filter(s => !s.completed).length + " upcoming"],
              ["Counseling records", incidents.length],
            ].map(([label, count]) => (
              <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontSize: 14 }}>
                <span style={{ color: "var(--color-text-secondary)" }}>{label}</span>
                <span style={{ fontWeight: 500, color: "var(--color-text-primary)" }}>{count}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    );
  };

  if (loading) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'DM Sans', sans-serif", color: "var(--color-text-secondary)" }}>
        Loading…
      </div>
    );
  }

  const sidebarNavActive = (v) => {
    if (["employee", "reviewDetail"].includes(view)) return v === "staff";
    if (view === "incidentDetail" && selEmp) return v === "staff";
    if (view === "incidentDetail" && !selEmp) return v === "counseling";
    return view === v;
  };

  // ── App PIN screen (shown when locked or no PIN set yet) ────────────────────
  // Hide the HTML loading spinner as soon as React mounts, regardless of
  // lock state. The spinner sits above React in the DOM and must be cleared
  // before the PIN screen (or the main app) can be seen.
  React.useEffect(() => {
    const l = document.getElementById("loading");
    if (l) l.style.display = "none";
  }, []);

  if (!appUnlocked) {
    const noPinSet = !appPinHash;
    return (
      <div style={{ minHeight: "100vh", background: "#FAF8F5", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif" }}>
        <div style={{ width: "100%", maxWidth: 400, padding: 40 }}>
          {/* Logo / wordmark */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.18em", color: "#5C3D2E", marginBottom: 8 }}>Theodore Ellison Designs</div>
            <div style={{ fontSize: 26, fontWeight: 500, color: "#1B2838", letterSpacing: "-0.01em" }}>Staff Reviews</div>
          </div>

          {noPinSet ? (
            <>
              <div style={{ fontSize: 14, color: "#6B6560", lineHeight: 1.7, marginBottom: 24 }}>
                Set an access PIN to protect this app. You'll need it each time you open a new browser session.
              </div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#6B6560", marginBottom: 6 }}>Create PIN</div>
              <input
                type="password" inputMode="numeric" placeholder="Enter PIN (min 4 digits)"
                value={appPinInput} onChange={e => { setAppPinInput(e.target.value); setAppPinError(""); }}
                onKeyDown={e => e.key === "Enter" && document.getElementById("app-pin-confirm").focus()}
                style={{ width: "100%", padding: "11px 14px", border: "1px solid rgba(27,40,56,0.2)", borderRadius: 8, fontSize: 16, letterSpacing: "0.2em", marginBottom: 10, boxSizing: "border-box", fontFamily: "'DM Mono', monospace", outline: "none", background: "#fff" }}
                autoFocus
              />
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#6B6560", marginBottom: 6 }}>Confirm PIN</div>
              <input
                id="app-pin-confirm"
                type="password" inputMode="numeric" placeholder="Re-enter PIN"
                value={appPinConfirm} onChange={e => { setAppPinConfirm(e.target.value); setAppPinError(""); }}
                onKeyDown={e => e.key === "Enter" && handleAppSetPin()}
                style={{ width: "100%", padding: "11px 14px", border: "1px solid rgba(27,40,56,0.2)", borderRadius: 8, fontSize: 16, letterSpacing: "0.2em", marginBottom: 16, boxSizing: "border-box", fontFamily: "'DM Mono', monospace", outline: "none", background: "#fff" }}
              />
              {appPinError && <div style={{ color: "#A32D2D", fontSize: 13, marginBottom: 12 }}>{appPinError}</div>}
              <button onClick={handleAppSetPin}
                style={{ width: "100%", padding: "13px", background: "#1B2838", color: "#FAF8F5", border: "none", borderRadius: 8, fontSize: 15, fontWeight: 500, cursor: "pointer" }}>
                Set PIN and enter →
              </button>
            </>
          ) : (
            <>
              <div style={{ fontSize: 14, color: "#6B6560", marginBottom: 24 }}>Enter your PIN to access the app.</div>
              <input
                type="password" inputMode="numeric" placeholder="PIN"
                value={appPinInput} onChange={e => { setAppPinInput(e.target.value); setAppPinError(""); }}
                onKeyDown={e => e.key === "Enter" && handleAppUnlock()}
                style={{ width: "100%", padding: "11px 14px", border: `1px solid ${appPinError ? "#A32D2D" : "rgba(27,40,56,0.2)"}`, borderRadius: 8, fontSize: 20, letterSpacing: "0.3em", marginBottom: 16, boxSizing: "border-box", fontFamily: "'DM Mono', monospace", outline: "none", background: "#fff", textAlign: "center" }}
                autoFocus
              />
              {appPinError && <div style={{ color: "#A32D2D", fontSize: 13, marginBottom: 12 }}>{appPinError}</div>}
              <button onClick={handleAppUnlock}
                style={{ width: "100%", padding: "13px", background: "#1B2838", color: "#FAF8F5", border: "none", borderRadius: 8, fontSize: 15, fontWeight: 500, cursor: "pointer" }}>
                Unlock →
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#FAF8F5", fontFamily: "'DM Sans', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
      `}</style>

      {/* Sidebar */}
      <nav
        style={{
          width: 190,
          background: "#1B2838",
          padding: 0,
          display: "flex",
          flexDirection: "column",
          flexShrink: 0,
          position: "fixed",
          top: 0,
          left: 0,
          height: "100vh",
          zIndex: 10,
        }}
      >
        <div
          style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 18,
            fontWeight: 500,
            color: "#FAF8F5",
            padding: "22px 20px",
            borderBottom: "1px solid rgba(255,255,255,0.08)",
            lineHeight: 1.2,
            letterSpacing: "-0.01em",
          }}
        >
          TED
          <span
            style={{
              display: "block",
              fontFamily: "'DM Mono', monospace",
              fontSize: 9,
              color: "rgba(232,223,208,0.5)",
              fontWeight: 400,
              letterSpacing: "0.14em",
              textTransform: "uppercase",
              marginTop: 4,
            }}
          >
            Staff Reviews
          </span>
        </div>
        <div
          style={{
            padding: "18px 20px 6px",
            fontFamily: "'DM Mono', monospace",
            fontSize: 9,
            color: "rgba(232,223,208,0.3)",
            textTransform: "uppercase",
            letterSpacing: "0.12em",
          }}
        >
          Menu
        </div>
        {[
          { id: "dashboard", label: "Dashboard" },
          { id: "staff", label: "Staff" },
          { id: "schedule", label: "Schedule" },
          { id: "formDesign", label: "Review form" },
        ].map((n) => (
          <button
            key={n.id}
            onClick={() => navTo(n.id)}
            style={{
              display: "block",
              padding: "10px 20px",
              color: sidebarNavActive(n.id) ? "#FAF8F5" : "rgba(232,223,208,0.65)",
              cursor: "pointer",
              fontSize: 13.5,
              border: "none",
              background: sidebarNavActive(n.id) ? "rgba(255,255,255,0.05)" : "none",
              textAlign: "left",
              width: "100%",
              borderLeft: `3px solid ${sidebarNavActive(n.id) ? "#D4793A" : "transparent"}`,
              fontFamily: "'DM Sans', sans-serif",
              fontWeight: sidebarNavActive(n.id) ? 500 : 400,
              transition: "all .15s",
            }}
          >
            {n.label}
          </button>
        ))}
        <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "10px 0" }} />
        <div style={{ padding: "10px 20px 6px", fontFamily: "'DM Mono', monospace", fontSize: 9, color: "rgba(232,223,208,0.3)", textTransform: "uppercase", letterSpacing: "0.12em" }}>
          Confidential
        </div>
        <button
          onClick={() => navTo("counseling")}
          style={{
            display: "block", padding: "10px 20px",
            color: sidebarNavActive("counseling") ? "#FAF8F5" : "rgba(232,223,208,0.65)",
            cursor: "pointer", fontSize: 13.5, border: "none",
            background: sidebarNavActive("counseling") ? "rgba(255,255,255,0.05)" : "none",
            textAlign: "left", width: "100%",
            borderLeft: `3px solid ${sidebarNavActive("counseling") ? "#D4793A" : "transparent"}`,
            fontFamily: "'DM Sans', sans-serif",
            fontWeight: sidebarNavActive("counseling") ? 500 : 400,
            transition: "all .15s",
          }}
        >
          🔒 Counseling log
        </button>
        <div style={{ height: 1, background: "rgba(255,255,255,0.07)", margin: "10px 0" }} />
        <button
          onClick={() => navTo("settings")}
          style={{
            display: "block", padding: "10px 20px",
            color: sidebarNavActive("settings") ? "#FAF8F5" : "rgba(232,223,208,0.45)",
            cursor: "pointer", fontSize: 13, border: "none",
            background: sidebarNavActive("settings") ? "rgba(255,255,255,0.05)" : "none",
            textAlign: "left", width: "100%",
            borderLeft: `3px solid ${sidebarNavActive("settings") ? "#D4793A" : "transparent"}`,
            fontFamily: "'DM Sans', sans-serif",
            fontWeight: sidebarNavActive("settings") ? 500 : 400,
            transition: "all .15s",
          }}
        >
          ⚙ Settings
        </button>

        {/* Lock app */}
        <button
          onClick={() => {
            setAppUnlocked(false);
            try { sessionStorage.removeItem("ted-app-unlocked"); } catch(e) {}
          }}
          style={{
            display: "block", padding: "10px 20px",
            color: "rgba(232,223,208,0.45)", cursor: "pointer", fontSize: 12,
            border: "none", background: "none", textAlign: "left", width: "100%",
            borderLeft: "3px solid transparent", fontFamily: "'DM Sans', sans-serif",
            marginTop: "auto", borderTop: "0.5px solid rgba(255,255,255,0.06)",
          }}
        >
          🔒 Lock app
        </button>
      </nav>

      {/* Main content */}
      <main className="app-content" style={{ marginLeft: 190, padding: "36px 40px", flex: 1, minHeight: "100vh" }}>
        {modal === "addEmp" ? (
          <AddEmployeeModal onClose={() => setModal(null)} onSave={handleSaveEmployee} />
        ) : modal === "editEmp" && selEmp ? (
          <AddEmployeeModal onClose={() => setModal(null)} onSave={handleSaveEmployee} existing={selEmp} />
        ) : modal === "schedRev" && selEmp ? (
          <ScheduleModal emp={selEmp} onClose={() => setModal(null)} onSave={handleSaveSchedule} />
        ) : modal === "newRev" && selEmp ? (
          <ReviewModal emp={selEmp} prevReviews={empRevs(selEmp.id)} onClose={() => setModal(null)} onSave={handleSaveReview} formDef={formDef} employees={employees} />
        ) : modal === "editRev" && selRev ? (
          <ReviewModal emp={employees.find(e => e.id === selRev.employeeId) || selEmp} prevReviews={empRevs(selRev.employeeId)} onClose={() => setModal(null)} onSave={handleSaveReview} formDef={formDef} employees={employees} existingReview={selRev} />
        ) : modal === "newInc" && selEmp ? (
          <CounselingModal emp={selEmp} onClose={() => setModal(null)} onSave={handleSaveIncident} />
        ) : modal === "editInc" && selEmp && selInc ? (
          <CounselingModal emp={selEmp} existing={selInc} onClose={() => setModal(null)} onSave={handleSaveIncident} />
        ) : modal === "terminate" && selEmp ? (
          <TerminateModal emp={selEmp} onClose={() => setModal(null)} onSave={handleTerminate} />
        ) : (
          <>
            {view === "dashboard" && renderDashboard()}
            {view === "staff" && renderStaff()}
            {view === "schedule" && renderSchedule()}
            {view === "formDesign" && renderFormDesign()}
            {view === "employee" && renderEmployee()}
            {view === "reviewDetail" && renderReviewDetail()}
            {view === "counseling" && renderCounselingLog()}
            {view === "incidentDetail" && renderIncidentDetail()}
            {view === "settings" && renderSettings()}
          </>
        )}
      </main>

      {/* Save status indicator — fixed bottom-right */}
      {saveStatus !== "idle" && (
        <div style={{
          position: "fixed", bottom: 20, right: 20, zIndex: 50,
          padding: "9px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500,
          fontFamily: "'DM Sans', sans-serif",
          background: saveStatus === "saving" ? "#FAEEDA" : saveStatus === "saved" ? "#EAF3DE" : "#FCEBEB",
          color: saveStatus === "saving" ? "#854F0B" : saveStatus === "saved" ? "#3B6D11" : "#A32D2D",
          border: `0.5px solid ${saveStatus === "saving" ? "#FAC775" : saveStatus === "saved" ? "#97C459" : "#F09595"}`,
          boxShadow: "0 4px 12px rgba(27,40,56,0.12)",
          display: "flex", alignItems: "center", gap: 8,
        }}>
          {saveStatus === "saving" && (<><span style={{ display: "inline-block", width: 10, height: 10, border: "1.5px solid #854F0B", borderTopColor: "transparent", borderRadius: "50%", animation: "tedspin 0.7s linear infinite" }} /><span>Saving…</span></>)}
          {saveStatus === "saved" && (<><span>✓</span><span>Saved</span></>)}
          {saveStatus === "error" && (<><span>!</span><span>Save failed — refresh and check the Sheet</span></>)}
          <style>{`@keyframes tedspin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}
    </div>
  );
}

const styles = {
  pageTitle: {
    fontFamily: "'DM Sans', sans-serif",
    fontSize: 26,
    fontWeight: 500,
    color: "#1B2838",
    marginBottom: 24,
    letterSpacing: "-0.01em",
  },
  eyebrow: {
    fontFamily: "'DM Mono', monospace",
    fontSize: 10,
    textTransform: "uppercase",
    letterSpacing: "0.12em",
    color: "var(--color-text-secondary)",
  },
  rowName: {
    fontSize: 14,
    fontWeight: 500,
    color: "var(--color-text-primary)",
    fontFamily: "'DM Sans', sans-serif",
  },
  rowMeta: {
    fontSize: 12,
    color: "var(--color-text-secondary)",
    marginTop: 2,
    fontFamily: "'DM Sans', sans-serif",
  },
};

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
}
</script>
</body>
</html>
