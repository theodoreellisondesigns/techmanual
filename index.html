// Hash a PIN for storage. The salt is fixed (not a secret) — purpose is to
// keep the stored value from being trivially reversible if someone glances at
// the sheet. Real security comes from access control on the sheet itself.
async function hashPin(pin) {
  const enc = new TextEncoder().encode(String(pin) + "::ted-counseling-2026");
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function buildPrintableHTML(r, emp, currentFormDef) {
  // Prefer the live form definition so the latest structure is always shown.
  const fd = currentFormDef || r.formSnapshot || {};
  const ratingLabels = ["", "Unsatisfactory", "Developing", "Meets Expectations", "Exceeds Expectations", "Outstanding"];
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

  let body = "";

  // Header
  body += `
    <header class="doc-header">
      <div class="brand">
        <div class="brand-name">Theodore Ellison Designs</div>
        <div class="brand-sub">Employee Performance Review</div>
      </div>
      <div class="meta-table">
        <div><span class="meta-label">Employee</span><span class="meta-value">${esc(emp?.name || "")}</span></div>
        ${emp?.role ? `<div><span class="meta-label">Role</span><span class="meta-value">${esc(emp.role)}</span></div>` : ""}
        <div><span class="meta-label">Review type</span><span class="meta-value">${esc(r.type || "")}</span></div>
        <div><span class="meta-label">Review date</span><span class="meta-value">${esc(fmtDate(r.date))}</span></div>
        ${r.reviewPeriod ? `<div><span class="meta-label">Period</span><span class="meta-value">${esc(r.reviewPeriod)}</span></div>` : ""}
        ${r.reviewer ? `<div><span class="meta-label">Reviewer</span><span class="meta-value">${esc(r.reviewer)}</span></div>` : ""}
      </div>
    </header>
  `;

  // Sections
  if (r.responses && fd.sections) {
    fd.sections.forEach((sec) => {
      body += `<section class="sec" style="border-left-color:${sec.color}">`;
      body += `<h2 class="sec-title" style="color:${sec.color}">${esc(sec.title)}</h2>`;

      sec.questions.forEach((q) => {
        const val = r.responses[q.id];
        if (val === undefined || val === "" || val === 0) return;
        body += `<div class="q">`;
        body += `<div class="q-head"><span class="q-num">${q.num}.</span>${esc(q.title || q.text)}</div>`;
        if (q.title && q.text) body += `<div class="q-desc">${esc(q.text)}</div>`;
        if (q.type === "rating") {
          body += `<div class="q-rating"><span class="rating-num">${val}</span><span class="rating-lbl">${ratingLabels[val]}</span></div>`;
        } else {
          body += `<div class="q-text">${esc(val).replace(/\n/g, "<br>")}</div>`;
        }
        body += `</div>`;
      });

      // Staff input
      const peers = (r.peerInputs || {})[sec.id] || [];
      if (peers.length > 0) {
        body += `<div class="peer-block"><div class="peer-label">Staff input</div>`;
        peers.forEach((pi) => {
          body += `<div class="peer-item">`;
          body += `<div class="peer-source" style="color:${sec.color}">${esc(pi.source)}</div>`;
          body += `<div class="peer-note">${esc(pi.note).replace(/\n/g, "<br>")}</div>`;
          body += `</div>`;
        });
        body += `</div>`;
      }
      body += `</section>`;
    });
  }

  // Overall
  if (r.overallRating) {
    body += `<section class="sec"><h2 class="sec-title">Overall Rating</h2><div class="overall">${esc(r.overallRating)}</div></section>`;
  }

  // Studio Support & Growth
  if (r.summaryNotes) {
    body += `<section class="sec"><h2 class="sec-title">Studio Support & Growth</h2><div class="closing">${esc(r.summaryNotes).replace(/\n/g, "<br>")}</div></section>`;
  }

  // Goals
  if ((r.goals || []).length > 0) {
    body += `<section class="sec"><h2 class="sec-title">Goals</h2><ul class="goals">`;
    r.goals.forEach((g) => {
      const marker = g.status === "complete" ? "✓" : g.status === "carried" ? "↗" : "○";
      body += `<li><span class="goal-marker">${marker}</span> ${esc(g.text)}</li>`;
    });
    body += `</ul></section>`;
  }

  // Signature block
  body += `
    <section class="signatures">
      <div class="sig-row">
        <div class="sig-line">
          <div class="sig-label">Reviewer signature</div>
          <div class="sig-blank"></div>
          <div class="sig-date">Date</div>
          <div class="sig-blank-short"></div>

          <div class="sig-label">Employee signature</div>
          <div class="sig-blank"></div>
          <div class="sig-date">Date</div>
          <div class="sig-blank-short"></div>
        </div>
      </div>
      <div class="ack">Both parties confirm this review has been discussed and received.</div>
    </section>
  `;

  body += `<footer class="doc-footer">Theodore Ellison Designs · 1248 International Blvd, Oakland, CA 94606 · inquiry@theodoreellisondesigns.com</footer>`;

  return `<!DOCTYPE html>

// Build a simplified employee-facing version: rating scale + just the rated

// Studio Support & Growth, and goals (those are reviewer/leadership material).
function buildEmployeeCopyHTML(r, emp, currentFormDef) {

  // Default rating scale labels if formDef doesn't have one set
  const scale = fd.ratingScale || [
    { n: 1, label: "Unsatisfactory",        description: "" },
    { n: 2, label: "Developing",            description: "" },
    { n: 3, label: "Meets Expectations",    description: "" },
    { n: 4, label: "Exceeds Expectations",  description: "" },
    { n: 5, label: "Outstanding",           description: "" },

  const scaleLabel = (n) => (scale.find(s => s.n === n) || { label: "" }).label;

  let body = `

      <div class="brand-name">Theodore Ellison Designs</div>
      <div class="brand-sub">Performance Review — Employee Copy</div>
      <div class="meta-table">
        <div><span class="meta-label">Employee</span><span class="meta-value">${esc(emp?.name || "")}</span></div>
        ${emp?.role ? `<div><span class="meta-label">Role</span><span class="meta-value">${esc(emp.role)}</span></div>` : ""}
        <div><span class="meta-label">Review type</span><span class="meta-value">${esc(r.type || "")}</span></div>
        <div><span class="meta-label">Review date</span><span class="meta-value">${esc(fmtDate(r.date))}</span></div>
        ${r.reviewPeriod ? `<div><span class="meta-label">Period</span><span class="meta-value">${esc(r.reviewPeriod)}</span></div>` : ""}
        ${r.reviewer ? `<div><span class="meta-label">Reviewer</span><span class="meta-value">${esc(r.reviewer)}</span></div>` : ""}
      </div>
    </header>

    <section class="intro">
      <p>This document summarizes the ratings from your review period. Full discussion and observations are reviewed with you in person.</p>
    </section>

    <section class="scale">
      <div class="scale-label">How to read these ratings</div>
      ${fd.ratingIntro ? `<p class="scale-intro">${esc(fd.ratingIntro)}</p>` : ""}

  if (r.responses && fd.sections) {

      body += `<section class="sec" style="border-left-color:${sec.color}">`;

        body += `<div class="q-rating"><span class="rating-num">${val}</span><span class="rating-lbl">${esc(scaleLabel(val))}</span></div>`;
        body += `</div>`;

      textAnswered.forEach((q) => {
        const val = r.responses[q.id];

        body += `<div class="q-text">${esc(val).replace(/\n/g, "<br>")}</div>`;

  `;

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

const fmtDate = (d) =>

        month: "short",
        day: "numeric",
        year: "numeric",
      })

// Build a plain-text version of a review for download
function buildReviewText(r, emp, currentFormDef) {
  const fd = currentFormDef || r.formSnapshot || {};
  const lines = [];
  const sep = "──────────────────────────────────────────────────────────";

  lines.push("THEODORE ELLISON DESIGNS");
  lines.push("Employee Performance Review");
  lines.push(sep);
  lines.push("");
  lines.push("Employee:       " + (emp?.name || ""));
  if (emp?.role) lines.push("Role:           " + emp.role);
  lines.push("Review type:    " + (r.type || ""));
  lines.push("Review date:    " + fmtDate(r.date));
  if (r.reviewPeriod) lines.push("Review period:  " + r.reviewPeriod);
  if (r.reviewer)     lines.push("Reviewer:       " + r.reviewer);
  lines.push("");
  lines.push(sep);
  lines.push("");

  const ratingLabels = ["", "Unsatisfactory", "Developing", "Meets Expectations", "Exceeds Expectations", "Outstanding"];

  // Sections
  if (r.responses && fd.sections) {
    fd.sections.forEach(sec => {
      lines.push(sec.title.toUpperCase());
      lines.push("");
      sec.questions.forEach(q => {
        const val = r.responses[q.id];
        if (val === undefined || val === "" || val === 0) return;
        if (q.type === "rating") {
          lines.push("  " + q.num + ". " + (q.title || q.text));
          if (q.title && q.text) lines.push("     " + q.text);
          lines.push("     Rating: " + val + " — " + ratingLabels[val]);
        } else {
          lines.push("  " + q.num + ". " + (q.title || q.text));
          if (q.title && q.text) lines.push("     " + q.text);
          lines.push("");
          String(val).split("\n").forEach(ln => lines.push("     " + ln));
        }
        lines.push("");
      });

      // Staff input for this section
      const peers = (r.peerInputs || {})[sec.id] || [];
      if (peers.length > 0) {
        lines.push("  STAFF INPUT");
        peers.forEach(pi => {
          lines.push("    " + pi.source + ":");
          String(pi.note).split("\n").forEach(ln => lines.push("      " + ln));
          lines.push("");
        });
      }
      lines.push(sep);
      lines.push("");
    });
  }

  // Overall
  if (r.overallRating) {
    lines.push("OVERALL RATING");
    lines.push("");
    lines.push("  " + r.overallRating);
    lines.push("");
    lines.push(sep);
    lines.push("");
  }

  // Studio Support & Growth / summary
  if (r.summaryNotes) {
    lines.push("STUDIO SUPPORT & GROWTH");
    lines.push("");
    String(r.summaryNotes).split("\n").forEach(ln => lines.push("  " + ln));
    lines.push("");
    lines.push(sep);
    lines.push("");
  }

  // Goals
  if ((r.goals || []).length > 0) {
    lines.push("GOALS");
    lines.push("");
    r.goals.forEach(g => {
      const marker = g.status === "complete" ? "[✓]" : g.status === "carried" ? "[↗]" : "[ ]";
      lines.push("  " + marker + " " + g.text);
    });
    lines.push("");
    lines.push(sep);
    lines.push("");
  }

  lines.push("Theodore Ellison Designs · 1248 International Blvd, Oakland, CA 94606");
  lines.push("inquiry@theodoreellison.com · www.theodoreellison.com");

  return lines.join("\n");
}

function downloadReviewText(r, emp, currentFormDef) {
  const text = buildReviewText(r, emp, currentFormDef);
  const empName = (emp?.name || "employee").replace(/[^a-zA-Z0-9]+/g, "-");
  const date = r.date || "";
  const filename = "TED-Review_" + empName + "_" + date + ".txt";
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

const avgRatings = (r) => {
  if (r.responses) { // new form-driven format
    const vals = Object.values(r.responses).filter(v => typeof v === "number" && v > 0);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  if (r.sections) { // previous section+prompts format
    const vals = Object.values(r.sections).map((s) => s.rating).filter(Boolean);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  const vals = Object.values(r.ratings || {}).filter(Boolean); // oldest format
  return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
};

// ── Google Sheets storage (via Apps Script) ──────────────────────────────────
function getGasUrl() { try { return localStorage.getItem("ted-gas-url") || ""; } catch(e){ return ""; } }
let _cache = {};
let _cacheReady = false;
function jsonpGet(url) {
  return new Promise((resolve, reject) => {
    const cb = "ted_cb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 15000);
    function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error("network")); };
    script.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "callback=" + cb;
    document.body.appendChild(script);
  });
}
async function refreshCache() {
  const GAS_URL = getGasUrl(); if (!GAS_URL) return false;
  try { const res = await jsonpGet(GAS_URL); if (res && res.ok && res.data) { _cache = res.data; _cacheReady = true; return true; } }
  catch (e) { console.error("[TED] refreshCache failed:", e); }
  return false;
}
async function storeGet(key) {
  if (!_cacheReady) await refreshCache();
  return (key in _cache) ? _cache[key] : null;
}
async function storeSet(key, val) {
  _cache[key] = val;
  const GAS_URL = getGasUrl(); if (!GAS_URL) return false;
  try {
    await fetch(GAS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ key, value: val }) });
    console.log("[TED] storeSet POST sent for", key, "size:", JSON.stringify(val).length, "bytes");
    return true;
  } catch (e) { console.error("[TED] storeSet failed for", key, e); return false; }
}
async function storeGetFresh(key) {
  const GAS_URL = getGasUrl(); if (!GAS_URL) return null;
  try { const res = await jsonpGet(GAS_URL); if (res && res.ok && res.data && key in res.data) return res.data[key]; }
  catch (e) { console.error("[TED] storeGetFresh failed:", e); }
  return null;
}
async function storePushAll() { return { ok: true }; }

const UrgencyBadge = ({ days }) => {
  const [bg, text, label] =
    days < 0
      ? ["#FCEBEB", "#A32D2D", `${Math.abs(days)}d overdue`]
      : days === 0
      ? ["#FCEBEB", "#A32D2D", "Today"]
      : days <= 7
      ? ["#FAEEDA", "#854F0B", `${days}d`]
      : days <= 30
      ? ["#EAF3DE", "#3B6D11", `${days}d`]
      : ["#E6F1FB", "#185FA5", `${days}d`];
  return (
    <span
      style={{
        fontSize: 11,
        fontWeight: 600,
        color: text,
        background: bg,
        borderRadius: 4,
        padding: "3px 8px",
        whiteSpace: "nowrap",
        fontFamily: "'DM Sans', sans-serif",
      }}
    >
      {label}
    </span>
  );
};

const Btn = ({ children, onClick, disabled, variant = "primary", style: extraStyle }) => {
  const styles = {
    primary: {
      background: disabled ? "var(--color-background-secondary)" : "#5C3D2E",
      color: disabled ? "var(--color-text-secondary)" : "#FAF8F5",
      border: "none",
    },
    secondary: {
      background: "transparent",
      color: "var(--color-text-primary)",
      border: "0.5px solid var(--color-border-secondary)",
    },
    danger: {
      background: "transparent",
      color: "#A32D2D",
      border: "0.5px solid #F09595",
    },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        ...styles[variant],
        borderRadius: 8,
        padding: "8px 16px",
        fontFamily: "'DM Sans', sans-serif",
        fontSize: 14,

            <FL mt={0}>Hourly rate</FL>
            <div style={{ position: "relative" }}>

// ── Reusable rating selector for form questions ───────────────────────────────
const RATING_LABELS = ["", "Unsatisfactory", "Developing", "Meets Expectations", "Exceeds Expectations", "Outstanding"];

const QuestionRating = ({ q, value, onChange, selfValue, readOnly }) => (
  <div style={{ marginBottom: 22 }}>
    {/* Title + description */}
    {q.title ? (
      <div style={{ marginBottom: 10 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", lineHeight: 1.4 }}>
          <span style={{ color: "var(--color-text-secondary)", marginRight: 6, fontWeight: 400 }}>{q.num}.</span>{q.title}
        </div>
        {q.text && (
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6, marginTop: 4, paddingLeft: 22 }}>
            {q.text}
          </div>
        )}
      </div>
    ) : (
      <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 8, lineHeight: 1.5 }}>
        <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
      </div>
    )}
    <div style={{ display: "flex", gap: 0, marginBottom: 0, paddingLeft: q.title ? 22 : 0 }}>
      {[1,2,3,4,5].map(n => (
        <button key={n} onClick={() => !readOnly && onChange && onChange(n === value ? 0 : n)}
          style={{ width: 52, padding: "9px 0", border: "0.5px solid var(--color-border-tertiary)", borderRight: n < 5 ? "none" : "0.5px solid var(--color-border-tertiary)", borderRadius: n === 1 ? "6px 0 0 6px" : n === 5 ? "0 6px 6px 0" : 0, background: value === n ? "var(--color-text-primary)" : "var(--color-background-secondary)", color: value === n ? "var(--color-background-primary)" : "var(--color-text-secondary)", fontSize: 15, fontWeight: value === n ? 700 : 400, cursor: readOnly ? "default" : "pointer", transition: "all .12s", fontFamily: "'DM Sans', sans-serif" }}>
          {n}
        </button>
      ))}
      {value > 0 && !readOnly && (
        <span style={{ marginLeft: 12, fontSize: 12, color: "var(--color-text-secondary)", alignSelf: "center" }}>
          {RATING_LABELS[value]}
        </span>
      )}
      {readOnly && value > 0 && (
        <span style={{ marginLeft: 12, fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", alignSelf: "center" }}>
          {value} — {RATING_LABELS[value]}
        </span>
      )}
    </div>
    {/* Employee self-assessment rating (read-only comparison) */}
    {selfValue !== undefined && selfValue > 0 && (
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8, marginLeft: q.title ? 22 : 0, padding: "6px 10px", background: "#E6F1FB", borderRadius: 6 }}>
        <span style={{ fontSize: 11, color: "#185FA5", fontWeight: 600 }}>Self-assessment:</span>
        <span style={{ fontSize: 12, color: "#185FA5" }}>{selfValue} — {RATING_LABELS[selfValue]}</span>
      </div>
    )}
  </div>
);

const ReviewModal = ({ emp, prevReviews, onClose, onSave, formDef, employees, existingReview }) => {
  // Always render with the CURRENT form definition so structural edits apply
  // everywhere — including reviews being edited. Existing responses stay
  // attached to their question IDs, so renaming a question keeps the answer;
  // removed questions hide their answer (still preserved in data); new
  // questions appear blank.
  const fd = formDef || (existingReview && existingReview.formSnapshot) || DEFAULT_FORM_DEF;
  const isEdit = !!existingReview;
  // All active staff + Ted (owner) as input sources — everyone's observations count
  const inputSources = [
    "Ted Ellison",
    ...(employees || [])
      .filter(e => e.status !== "terminated" && e.name !== "Ted Ellison")
      .map(e => e.name),
  ];
  const [date, setDate] = useState(existingReview?.date || todayStr());
  const [type, setType] = useState(existingReview?.type || "Quarterly");
  const [reviewer, setReviewer] = useState(existingReview?.reviewer || "Ted Ellison");
  const [reviewPeriod, setReviewPeriod] = useState(existingReview?.reviewPeriod || "");
  const [responses, setResponses] = useState(existingReview?.responses || {});
  // Ensure peerInputs has an entry for every CURRENT section, even if the
  // existing review was created before that section existed (e.g. you just
  // added a "Takeaways" section to the form).
  const [peerInputs, setPeerInputs] = useState(() => {
    const base = Object.fromEntries(fd.sections.map(s => [s.id, []]));
    return { ...base, ...(existingReview?.peerInputs || {}) };
  });
  const [addingPeer, setAddingPeer] = useState(null);
  const [overallRating, setOverallRating] = useState(existingReview?.overallRating || "");
  const [summaryNotes, setSummaryNotes] = useState(existingReview?.summaryNotes || "");
  const [newGoal, setNewGoal] = useState("");
  // When editing, split existing goals: ones that were on THIS review (keep editable),
  // exclude carried ones since those come from prev reviews
  const [goals, setGoals] = useState(
    existingReview ? (existingReview.goals || []).filter(g => !g.carriedFrom) : []
  );

  // Only show carry-forward options when creating new — not when editing
  const prevOpenGoals = isEdit ? [] : prevReviews.flatMap(r =>
    (r.goals || []).filter(g => g.status === "open").map(g => ({ ...g, sourceReviewId: r.id }))
  );
  const [carry, setCarry] = useState(Object.fromEntries(prevOpenGoals.map(g => [g.id, true])));

  const setResponse = (qId, val) => setResponses(p => ({ ...p, [qId]: val }));

  const savePeerInput = () => {
    if (!addingPeer?.source?.trim() || !addingPeer?.note?.trim()) return;
    const entry = { id: uid(), source: addingPeer.source.trim(), note: addingPeer.note.trim() };
    setPeerInputs(p => ({ ...p, [addingPeer.secId]: [...(p[addingPeer.secId] || []), entry] }));
    setAddingPeer(null);
  };
  const removePeerInput = (secId, id) =>
    setPeerInputs(p => ({ ...p, [secId]: (p[secId] || []).filter(x => x.id !== id) }));

  const addGoal = () => {
    if (!newGoal.trim()) return;
    setGoals(p => [...p, { id: uid(), text: newGoal.trim(), status: "open", createdAt: todayStr() }]);
    setNewGoal("");
  };

  const handleSave = () => {
    if (isEdit) {
      // Preserve original id, createdAt, and any carried goals from previous reviews.
      // NOTE: we deliberately drop the formSnapshot field. We used to save a full
      // copy of the form structure with each review, but now reviews render against
      // the current formDef everywhere, so the snapshot is dead weight and was
      // bloating save payloads.
      const carriedFromPrev = (existingReview.goals || []).filter(g => g.carriedFrom);
      const { formSnapshot, ...existingWithoutSnapshot } = existingReview;
      const review = {
        ...existingWithoutSnapshot,
        date, type, reviewer, reviewPeriod,
        responses, peerInputs, overallRating, summaryNotes,
        goals: [...carriedFromPrev, ...goals],
        lastEditedAt: new Date().toISOString(),
        lastEditedBy: reviewer,
      };
      onSave(review, [], [], true); // 4th arg flags edit mode
      return;
    }
    const carriedGoals = prevOpenGoals.filter(g => carry[g.id]).map(g => ({ ...g, status: "open", carriedFrom: g.sourceReviewId }));
    const review = {
      id: uid(), employeeId: emp.id, date, type, reviewer, reviewPeriod,
      responses, peerInputs, overallRating, summaryNotes,
      goals: [...carriedGoals, ...goals],
      createdAt: todayStr(),
    };
    const sourceIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.sourceReviewId);
    const carriedIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.id);
    onSave(review, sourceIds, carriedIds, false);
  };

  return (
    <div style={{ maxWidth: 820 }}>
      <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0, display: "block" }}>
        ← Cancel
      </button>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24 }}>
        <Avatar name={emp.name} size={48} />
        <div>
          <h2 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "var(--color-text-primary)", margin: 0 }}>
            {isEdit ? "Edit review" : "Performance review"} — {emp.name}
          </h2>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: 3 }}>
            {emp.role}{isEdit && existingReview.lastEditedAt ? ` · Last edited ${new Date(existingReview.lastEditedAt).toLocaleString()}` : ""}
          </div>
        </div>
      </div>

      {/* Header meta */}
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 24, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
        <div><FL mt={0}>Review date *</FL><FI type="date" value={date} onChange={e => setDate(e.target.value)} /></div>
        <div><FL mt={0}>Review type</FL><FSel value={type} onChange={e => setType(e.target.value)}>{REVIEW_TYPES.map(t => <option key={t}>{t}</option>)}</FSel></div>
        <div><FL mt={0}>Reviewer</FL><FI value={reviewer} onChange={e => setReviewer(e.target.value)} placeholder="Reviewer name" /></div>
        <div><FL mt={0}>Review period</FL><FI value={reviewPeriod} onChange={e => setReviewPeriod(e.target.value)} placeholder="e.g. Q1 2026" /></div>
      </div>

      {/* Rating scale guide */}
      {fd.ratingScale && (
        <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#5C3D2E", marginBottom: 10 }}>How to rate</div>
          <p style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6, marginBottom: 14 }}>
            {fd.ratingIntro || "Base your scores on consistent behaviors and outcomes, rather than isolated events."}
          </p>
          <div style={{ display: "grid", gap: 7 }}>
            {fd.ratingScale.map(r => (
              <div key={r.n} style={{ display: "flex", gap: 12, alignItems: "flex-start", fontSize: 12.5, lineHeight: 1.5 }}>
                <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 22, height: 22, borderRadius: "50%", background: "var(--color-background-secondary)", color: "var(--color-text-primary)", fontWeight: 600, fontSize: 12, flexShrink: 0 }}>{r.n}</span>
                <div>
                  <span style={{ fontWeight: 600, color: "var(--color-text-primary)" }}>{r.label}:</span>
                  <span style={{ color: "var(--color-text-secondary)" }}> {r.description}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Sections */}
      {fd.sections.map(sec => (
        <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 20, overflow: "hidden" }}>
          <div style={{ padding: "12px 20px", background: sec.bg + "55", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: sec.color }}>{sec.title}</div>
            <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2 }}>{sec.description}</div>
          </div>
          <div style={{ padding: "20px 20px 4px" }}>
            {sec.questions.map(q => q.type === "rating" ? (
              <QuestionRating key={q.id} q={q} value={responses[q.id] || 0} onChange={v => setResponse(q.id, v)} />
            ) : (
              <div key={q.id} style={{ marginBottom: 18 }}>
                {q.title ? (
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", lineHeight: 1.4 }}>
                      <span style={{ color: "var(--color-text-secondary)", marginRight: 6, fontWeight: 400 }}>{q.num}.</span>{q.title}
                    </div>
                    {q.text && (
                      <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6, marginTop: 4, paddingLeft: 22 }}>{q.text}</div>
                    )}
                  </div>
                ) : (
                  <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 6, lineHeight: 1.5 }}>
                    <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
                  </div>
                )}
                <div style={{ paddingLeft: q.title ? 22 : 0 }}>
                  <FTA value={responses[q.id] || ""} onChange={e => setResponse(q.id, e.target.value)} rows={3} placeholder={q.placeholder || "Optional comments…"} />
                </div>
              </div>
            ))}
          </div>

          {/* Staff input — visible, prominent, everyone included */}
          <div style={{ padding: "16px 20px 18px", background: "#E8DFD0", borderTop: `3px solid ${sec.color}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: sec.color, marginBottom: 3 }}>
                  Staff input {(peerInputs[sec.id] || []).length > 0 && `(${(peerInputs[sec.id] || []).length})`}
                </div>
                <div style={{ fontSize: 12, color: "#5C3D2E" }}>
                  Record observations from anyone on the team — your own notes go here too.
                </div>
              </div>
              {addingPeer?.secId !== sec.id && (
                <button
                  onClick={() => setAddingPeer({ secId: sec.id, source: "Ted Ellison", note: "" })}
                  style={{ background: "#5C3D2E", border: "none", color: "#FAF8F5", borderRadius: 6, padding: "7px 16px", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", whiteSpace: "nowrap", flexShrink: 0, marginLeft: 16 }}>
                  + Add input
                </button>
              )}
            </div>

            {(peerInputs[sec.id] || []).map(pi => (
              <div key={pi.id} style={{ background: "#FAF8F5", border: `0.5px solid ${sec.color}44`, borderLeft: `3px solid ${sec.color}`, borderRadius: "0 8px 8px 0", padding: "10px 14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: sec.color, marginBottom: 4 }}>{pi.source}</div>
                  <p style={{ fontSize: 13, color: "#1B2838", margin: 0, lineHeight: 1.6 }}>{pi.note}</p>
                </div>
                <button onClick={() => removePeerInput(sec.id, pi.id)}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#5C3D2E", opacity: 0.4, padding: "0 2px", lineHeight: 1 }}>×</button>
              </div>
            ))}

            {addingPeer?.secId === sec.id && (
              <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 8, padding: 16, marginTop: 8 }}>
                <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 14, marginBottom: 12 }}>
                  <div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 6 }}>Input from</div>
                    <FSel value={addingPeer.source} onChange={e => setAddingPeer(p => ({ ...p, source: e.target.value }))}>
                      {inputSources.map(name => (
                        <option key={name} value={name}>{name}</option>
                      ))}
                    </FSel>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 6 }}>Observation</div>
                    <FTA
                      value={addingPeer.note}
                      onChange={e => setAddingPeer(p => ({ ...p, note: e.target.value }))}
                      placeholder="What did they observe about this person in this area?"
                      rows={3}
                    />
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                  <Btn variant="secondary" onClick={() => setAddingPeer(null)} style={{ fontSize: 12, padding: "5px 12px" }}>Cancel</Btn>
                  <Btn onClick={savePeerInput} disabled={!addingPeer.note?.trim()} style={{ fontSize: 12, padding: "5px 14px" }}>Save input</Btn>
                </div>
              </div>

// ── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [loading, setLoading] = useState(true);
  const [employees, setEmployees] = useState([]);
  const [reviews, setReviews] = useState([]);
  const [scheduled, setScheduled] = useState([]);
  const [incidents, setIncidents] = useState([]);
  const [formDef, setFormDef] = useState(DEFAULT_FORM_DEF);
  const [formEditMode, setFormEditMode] = useState(false);
  const [editingQ, setEditingQ] = useState(null); // { secId, qId }
  const [showArchived, setShowArchived] = useState(false);
  const [view, setView] = useState("dashboard");
  const [selEmp, setSelEmp] = useState(null);
  const [selRev, setSelRev] = useState(null);
  const [selInc, setSelInc] = useState(null);
  const [modal, setModal] = useState(null);

  // Counseling log access control
  const [counselingPinHash, setCounselingPinHash] = useState("");
  const [counselingUnlocked, setCounselingUnlocked] = useState(() => {
    try { return sessionStorage.getItem("ted-counseling-unlocked") === "true"; }
    catch (e) { return false; }
  });
  const [pinInput, setPinInput] = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinError, setPinError] = useState("");

  // App-level PIN state
  const [appPinHash, setAppPinHash] = useState("");
  const [appUnlocked, setAppUnlocked] = useState(() => {
    try { return sessionStorage.getItem("ted-app-unlocked") === "true"; }
    catch (e) { return false; }
  });
  const [appPinInput, setAppPinInput] = useState("");
  const [appPinConfirm, setAppPinConfirm] = useState("");
  const [appPinError, setAppPinError] = useState("");

  // Save status indicator. Values: "idle" | "saving" | "saved" | "error"
  const [saveStatus, setSaveStatus] = useState("idle");
  const saveStatusTimer = React.useRef(null);

  const unlockCounseling = () => {
    setCounselingUnlocked(true);
    try { sessionStorage.setItem("ted-counseling-unlocked", "true"); } catch (e) {}
    setPinInput(""); setPinConfirm(""); setPinError("");
  };
  const lockCounseling = () => {
    setCounselingUnlocked(false);
    try { sessionStorage.removeItem("ted-counseling-unlocked"); } catch (e) {}
  };

  const handleSetPin = async () => {
    if (!/^\d{4,8}$/.test(pinInput)) { setPinError("PIN must be 4–8 digits."); return; }
    if (pinInput !== pinConfirm) { setPinError("PINs don't match."); return; }
    const hash = await hashPin(pinInput);
    setCounselingPinHash(hash);
    unlockCounseling();
  };

  const handleEnterPin = async () => {
    const hash = await hashPin(pinInput);
    if (hash === counselingPinHash) {
      unlockCounseling();
    } else {
      setPinError("Incorrect PIN.");
      setPinInput("");
    }
  };

  const handleChangePin = async (currentPin, newPin) => {
    const currentHash = await hashPin(currentPin);
    if (currentHash !== counselingPinHash) return { ok: false, error: "Current PIN is incorrect." };
    if (!/^\d{4,8}$/.test(newPin)) return { ok: false, error: "New PIN must be 4–8 digits." };
    const newHash = await hashPin(newPin);
    setCounselingPinHash(newHash);
    return { ok: true };
  };

  // ── Sync layer ──
  const fromPoll = React.useRef(false);
  const lastSaved = React.useRef({});
  const lastLocalSave = React.useRef({});
  const SAVE_GRACE_MS = 25000;
  const saveStatusRef = React.useRef("idle");

  // Helper: write to Sheet without triggering React re-renders.
  // Updates saveStatus via ref + a single batched setState at the end.
  const doSave = React.useCallback(async (key, val) => {
    const str = JSON.stringify(val);
    if (str === lastSaved.current[key]) return; // no change
    lastSaved.current[key] = str;
    lastLocalSave.current[key] = Date.now();
    saveStatusRef.current = "saving";
    setSaveStatus("saving");
    const sent = await storeSet(key, val);
    if (!sent) {
      saveStatusRef.current = "error";
      setSaveStatus("error");
      setTimeout(() => setSaveStatus("idle"), 10000);
      return;
    }
    // Verify after 4s
    setTimeout(async () => {
      try {
        const fresh = await storeGetFresh(key);
        if (JSON.stringify(fresh ?? null) === str) {
          console.log("[TED] Save verified for", key);
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus("idle"), 3000);
        } else {
          console.error("[TED] Save NOT verified for", key);
          setSaveStatus("error");
          setTimeout(() => setSaveStatus("idle"), 15000);
        }
      } catch (e) {
        console.error("[TED] Verify error:", e);
        setSaveStatus("error");
        setTimeout(() => setSaveStatus("idle"), 15000);
      }
    }, 4000);
  }, []);

  const applyData = React.useCallback((data, isInitial) => {
    fromPoll.current = true;
    const now = Date.now();
    const setIfChanged = (key, incoming, setter, fallback) => {
      if (!isInitial && lastLocalSave.current[key] && (now - lastLocalSave.current[key]) < SAVE_GRACE_MS) return;
      const incomingStr = JSON.stringify(incoming ?? fallback);
      if (incomingStr !== lastSaved.current[key]) { lastSaved.current[key] = incomingStr; setter(incoming ?? fallback); }
    };
    setIfChanged(KEYS.emps, data[KEYS.emps], setEmployees, DEFAULT_EMPLOYEES);
    setIfChanged(KEYS.revs, data[KEYS.revs], setReviews, []);
    setIfChanged(KEYS.sched, data[KEYS.sched], setScheduled, []);
    setIfChanged(KEYS.incs, data[KEYS.incs], setIncidents, []);
    if (data[KEYS.form]) setIfChanged(KEYS.form, data[KEYS.form], setFormDef, DEFAULT_FORM_DEF);
    if (data[KEYS.pin]) setIfChanged(KEYS.pin, data[KEYS.pin], setCounselingPinHash, "");
    if (data[KEYS.appPin]) setIfChanged(KEYS.appPin, data[KEYS.appPin], setAppPinHash, "");
    if (isInitial) setLoading(false);
    // Reset fromPoll after React has flushed these state updates
    setTimeout(() => { fromPoll.current = false; }, 50);
  }, []);

  // Initial load
  useEffect(() => { (async () => { await refreshCache(); applyData(_cache, true); })(); }, [applyData]);

  // Polling
  useEffect(() => {
    const id = setInterval(async () => { const ok = await refreshCache(); if (ok) applyData(_cache, false); }, 10000);
    return () => clearInterval(id);
  }, [applyData]);

  // ── Single consolidated save effect ──
  // Instead of one effect per key, use a single effect that checks all keys.
  // This avoids cascading setSaveStatus calls across multiple effects.
  const prevData = React.useRef(null);
  useEffect(() => {
    if (loading || fromPoll.current) return;
    // Build a snapshot of current data
    const snap = {
      [KEYS.emps]: employees,
      [KEYS.revs]: reviews,
      [KEYS.sched]: scheduled,
      [KEYS.incs]: incidents,
      [KEYS.form]: formDef,
    };
    if (counselingPinHash) snap[KEYS.pin] = counselingPinHash;
    if (appPinHash) snap[KEYS.appPin] = appPinHash;

    // On first run after load, just record — don't save
    if (!prevData.current) { prevData.current = snap; return; }

    // Find what changed
    for (const key of Object.keys(snap)) {
      const str = JSON.stringify(snap[key]);
      const prev = JSON.stringify(prevData.current[key]);
      if (str !== prev) {
        doSave(key, snap[key]);
      }
    }
    prevData.current = snap;
  });

  const empRevs = useCallback(
    (id) =>
      reviews
        .filter((r) => r.employeeId === id)
        .sort((a, b) => b.date.localeCompare(a.date)),
    [reviews]
  );
  const empSched = useCallback(
    (id) =>
      scheduled
        .filter((s) => s.employeeId === id && !s.completed)
        .sort((a, b) => a.date.localeCompare(b.date)),
    [scheduled]
  );
  const empIncs = useCallback(
    (id) =>
      incidents
        .filter((i) => i.employeeId === id)
        .sort((a, b) => b.date.localeCompare(a.date)),
    [incidents]
  );
  const allUpcoming = scheduled
    .filter((s) => !s.completed)
    .sort((a, b) => a.date.localeCompare(b.date));

  const navTo = (v, emp = null, rev = null, inc = null) => {
    setView(v);
    if (emp) setSelEmp(emp);
    if (rev) setSelRev(rev);
    if (inc !== null) setSelInc(inc);
    setModal(null);
  };

  // Modal save handlers
  const handleSaveEmployee = (emp, isEdit) => {
    if (isEdit) {
      setEmployees((p) => p.map((e) => (e.id === emp.id ? emp : e)));
      if (selEmp?.id === emp.id) setSelEmp(emp);
    } else {
      setEmployees((p) => [...p, emp]);
    }
    setModal(null);
  };
  const handleSaveSchedule = (sched) => {
    setScheduled((p) => [...p, sched]);
    setModal(null);
  };
  const handleSaveReview = (review, sourceIds, carriedIds, isEdit) => {
    if (isEdit) {
      // Update existing review in place
      setReviews((p) => p.map((r) => (r.id === review.id ? review : r)));
      setModal(null);
      setSelRev(review);
      setView("reviewDetail");
      return;
    }
    setReviews((p) => {
      const updated = p.map((r) =>
        sourceIds.includes(r.id)
          ? { ...r, goals: r.goals.map((g) => (carriedIds.includes(g.id) ? { ...g, status: "carried" } : g)) }
          : r
      );
      return [...updated, review];
    });
    setScheduled((p) =>
      p.map((s) =>
        s.employeeId === review.employeeId && !s.completed && Math.abs(daysUntil(s.date)) <= 14
          ? { ...s, completed: true }
          : s
      )
    );
    setModal(null);
    setSelRev(review);
    setView("reviewDetail");
  };

  // Permanently delete a single review.
  const handleDeleteReview = (revId) => {
    const r = reviews.find(x => x.id === revId);
    if (!r) return;
    const emp = employees.find(e => e.id === r.employeeId);
    const empName = emp ? emp.name : "this employee";
    const dateStr = fmtDate(r.date);
    const confirmMsg =
      `Delete this ${r.type} review of ${empName} dated ${dateStr}?\n\n` +
      `This removes the entire review — all ratings, comments, staff input, and goals attached to it.\n\n` +
      `This cannot be undone. Click OK to confirm.`;
    if (!confirm(confirmMsg)) return;
    setReviews(p => p.filter(x => x.id !== revId));
    // Navigate back to the employee profile if we know it; otherwise to staff
    if (emp) {
      setSelRev(null);
      navTo("employee", emp);
    } else {
      navTo("staff");
    }
  };

  const handleSaveIncident = (inc) => {
    setIncidents((p) => {
      const exists = p.find((x) => x.id === inc.id);
      return exists ? p.map((x) => (x.id === inc.id ? inc : x)) : [...p, inc];
    });
    setModal(null);
    setSelInc(inc);
    setView("incidentDetail");
  };

  const handleTerminate = (terminationData) => {
    setEmployees((p) =>
      p.map((e) =>
        e.id === selEmp.id
          ? { ...e, status: "terminated", terminatedDate: terminationData.date, terminationType: terminationData.type, terminationNotes: terminationData.notes }
          : e
      )
    );
    setModal(null);
    navTo("staff");
  };

  const handleReactivate = (empId) => {
    setEmployees((p) =>
      p.map((e) =>
        e.id === empId
          ? { ...e, status: "active", terminatedDate: "", terminationType: "", terminationNotes: "" }
          : e
      )
    );
  };

  // Permanently delete an employee and ALL associated records (reviews,
  // scheduled reviews, counseling records). Destructive — used mostly for
  // testing or correcting a mistaken add.
  const handleDeletePermanently = (empId) => {
    const emp = employees.find(e => e.id === empId);
    if (!emp) return;
    const reviewCount    = reviews.filter(r => r.employeeId === empId).length;
    const incidentCount  = incidents.filter(i => i.employeeId === empId).length;
    const scheduledCount = scheduled.filter(s => s.employeeId === empId).length;

    const message =
      `Permanently delete ${emp.name}?\n\n` +
      `This will remove:\n` +
      `• Their staff record\n` +
      `• ${reviewCount} review${reviewCount !== 1 ? "s" : ""}\n` +
      `• ${incidentCount} counseling record${incidentCount !== 1 ? "s" : ""}\n` +
      `• ${scheduledCount} scheduled review${scheduledCount !== 1 ? "s" : ""}\n\n` +
      `This cannot be undone. Type DELETE to confirm.`;

    const answer = prompt(message);
    if (answer !== "DELETE") return;

    setEmployees(p => p.filter(e => e.id !== empId));
    setReviews(p => p.filter(r => r.employeeId !== empId));
    setIncidents(p => p.filter(i => i.employeeId !== empId));
    setScheduled(p => p.filter(s => s.employeeId !== empId));
    navTo("staff");
  };

  // ── Form editing helpers ─────────────────────────────────────────────────────
  const updateFormQuestion = (secId, qId, field, val) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: s.questions.map(q => q.id !== qId ? q : { ...q, [field]: val }) }) }));

  const deleteFormQuestion = (secId, qId) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: s.questions.filter(q => q.id !== qId) }) }));

  const addFormQuestion = (secId, type) => {
    const sec = formDef.sections.find(s => s.id === secId);
    const maxNum = Math.max(0, ...formDef.sections.flatMap(s => s.questions.map(q => q.num || 0)));
    const newQ = { id: uid(), num: maxNum + 1, type, selfAssess: false, text: type === "rating" ? "New rating question" : "New notes field:", scaleMin: "Needs significant improvement", scaleMax: "Exceptional", placeholder: "Optional comments…" };
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: [...s.questions, newQ] }) }));
    setEditingQ({ secId, qId: newQ.id });
  };

  const updateFormSection = (secId, field, val) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, [field]: val }) }));

  const deleteFormSection = (secId) =>
    setFormDef(p => ({ ...p, sections: p.sections.filter(s => s.id !== secId) }));

  const addFormSection = () => {
    const newSec = { id: uid(), title: "New section", description: "Reviewer completes this section", color: "#185FA5", bg: "#E6F1FB", questions: [] };
    setFormDef(p => ({ ...p, sections: [...p.sections, newSec] }));
  };

  const updateOverallOption = (idx, val) =>
    setFormDef(p => ({ ...p, overallOptions: p.overallOptions.map((o, i) => i === idx ? val : o) }));

  const deleteOverallOption = (idx) =>
    setFormDef(p => ({ ...p, overallOptions: p.overallOptions.filter((_, i) => i !== idx) }));

  const addOverallOption = () =>
    setFormDef(p => ({ ...p, overallOptions: [...p.overallOptions, "New option"] }));

  // ── Rating scale editors ──
  const updateRatingScale = (n, field, val) =>
    setFormDef(p => ({ ...p, ratingScale: (p.ratingScale || []).map(r => r.n === n ? { ...r, [field]: val } : r) }));

  const updateRatingIntro = (val) =>
    setFormDef(p => ({ ...p, ratingIntro: val }));

  // ── View: Form design ────────────────────────────────────────────────────────
  const renderFormDesign = () => {
    const SECTION_COLORS = ["#0F6E56","#533748","#854F0B","#993C1D","#185FA5","#3C3489","#3B6D11","#A32D2D"];
    const SECTION_BGS   = ["#E1F5EE","#FBEAF0","#FAEEDA","#FAECE7","#E6F1FB","#EEEDFE","#EAF3DE","#FCEBEB"];

    return (
      <div style={{ maxWidth: 820 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
          <h1 style={{ ...styles.pageTitle, margin: 0 }}>Review form design</h1>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {formEditMode && (
              <Btn variant="secondary" onClick={() => setFormDef(DEFAULT_FORM_DEF)} style={{ fontSize: 12 }}>
                Reset to default
              </Btn>
            )}
            <Btn variant={formEditMode ? "primary" : "secondary"} onClick={() => { setFormEditMode(p => !p); setEditingQ(null); }}>
              {formEditMode ? "✓ Done editing" : "Edit form"}
            </Btn>
          </div>
        </div>

        {!formEditMode && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#E6F1FB", border: "0.5px solid #B5D4F4", borderRadius: 8, padding: "9px 14px", marginBottom: 20, fontSize: 13, color: "#185FA5" }}>
            This is the live form used for all new reviews. Click "Edit form" to add, remove, or reword questions and sections.
          </div>
        )}

        {/* Rating scale guide — editable in edit mode */}
        {formDef.ratingScale && (
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: "#5C3D2E" }}>How to rate</div>
              {formEditMode && (
                <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", fontStyle: "italic" }}>Click any field to edit</div>
              )}
            </div>

            {/* Intro line */}
            {formEditMode ? (
              <FTA
                value={formDef.ratingIntro || "Base your scores on consistent behaviors and outcomes, rather than isolated events."}
                onChange={(e) => updateRatingIntro(e.target.value)}
                rows={2}
                placeholder="Intro line above the scale…"
                style={{ marginBottom: 14, fontSize: 13 }}
              />
            ) : (
              <p style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6, marginBottom: 14 }}>
                {formDef.ratingIntro || "Base your scores on consistent behaviors and outcomes, rather than isolated events."}
              </p>
            )}

            <div style={{ display: "grid", gap: formEditMode ? 14 : 7 }}>
              {formDef.ratingScale.map(r => (
                <div key={r.n} style={{ display: "flex", gap: 12, alignItems: "flex-start", fontSize: 12.5, lineHeight: 1.5 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 22, height: 22, borderRadius: "50%", background: "var(--color-background-secondary)", color: "var(--color-text-primary)", fontWeight: 600, fontSize: 12, flexShrink: 0, marginTop: formEditMode ? 6 : 0 }}>{r.n}</span>
                  {formEditMode ? (
                    <div style={{ flex: 1, display: "grid", gap: 6 }}>
                      <FI
                        value={r.label}
                        onChange={(e) => updateRatingScale(r.n, "label", e.target.value)}
                        placeholder="Label (e.g. Meets Expectations)"
                        style={{ fontSize: 13, fontWeight: 600 }}
                      />
                      <FTA
                        value={r.description}
                        onChange={(e) => updateRatingScale(r.n, "description", e.target.value)}
                        rows={2}
                        placeholder="Description shown beside the label…"
                        style={{ fontSize: 13 }}
                      />
                    </div>
                  ) : (
                    <div>
                      <span style={{ fontWeight: 600, color: "var(--color-text-primary)" }}>{r.label}:</span>
                      <span style={{ color: "var(--color-text-secondary)" }}> {r.description}</span>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Sections */}
        {formDef.sections.map((sec, si) => (
          <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 20, overflow: "hidden" }}>
            {/* Section header */}
            <div style={{ padding: "12px 20px", background: sec.bg + "55", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
              {formEditMode ? (
                <>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <input value={sec.title} onChange={e => updateFormSection(sec.id, "title", e.target.value)}
                      style={{ fontSize: 15, fontWeight: 600, color: sec.color, background: "transparent", border: "none", outline: "none", flex: 1, fontFamily: "'DM Sans', sans-serif" }} />
                    <div style={{ display: "flex", gap: 4 }}>
                      {SECTION_COLORS.map((c, ci) => (
                        <div key={c} onClick={() => { updateFormSection(sec.id, "color", c); updateFormSection(sec.id, "bg", SECTION_BGS[ci]); }}
                          style={{ width: 16, height: 16, borderRadius: "50%", background: c, cursor: "pointer", border: sec.color === c ? "2px solid var(--color-text-primary)" : "2px solid transparent" }} />
                      ))}
                    </div>
                    <button onClick={() => { if (confirm("Delete this section?")) deleteFormSection(sec.id); }}
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#A32D2D", padding: "0 4px" }}>🗑</button>
                  </div>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8, fontSize: 12, color: "var(--color-text-secondary)", cursor: "pointer" }}>
                    <input type="checkbox" checked={!!sec.includeInEmployeeCopy}
                      onChange={e => updateFormSection(sec.id, "includeInEmployeeCopy", e.target.checked)}
                      style={{ width: 14, height: 14 }} />
                    Include this section's text answers in the employee copy
                    <span style={{ color: "var(--color-text-tertiary)", fontStyle: "italic", marginLeft: 4 }}>
                      (rated questions always appear; check this for sections like Takeaways where the written reflections should be shared)
                    </span>
                  </label>
                </>
              ) : (
                <div style={{ fontSize: 15, fontWeight: 600, color: sec.color }}>{sec.title}</div>
              )}
            </div>

            {/* Questions */}
            <div style={{ padding: formEditMode ? "12px 20px" : "16px 20px 4px" }}>
              {sec.questions.map((q, qi) => (
                <div key={q.id}>
                  {formEditMode && editingQ?.secId === sec.id && editingQ?.qId === q.id ? (
                    /* Inline edit form */
                    <div style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: 14, marginBottom: 12, border: "0.5px solid var(--color-border-secondary)" }}>
                      <div style={{ marginBottom: 10 }}>
                        <FL mt={0}>Title (short label)</FL>
                        <FI value={q.title || ""} onChange={e => updateFormQuestion(sec.id, q.id, "title", e.target.value)} placeholder="e.g. Workplace Fit" />
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "3fr 1fr", gap: 10, marginBottom: 10 }}>
                        <div>
                          <FL mt={0}>{q.type === "text" ? "Prompt" : "Description"}</FL>
                          <FTA value={q.text} onChange={e => updateFormQuestion(sec.id, q.id, "text", e.target.value)} rows={3} />
                        </div>
                        <div>
                          <FL mt={0}>Type</FL>
                          <FSel value={q.type} onChange={e => updateFormQuestion(sec.id, q.id, "type", e.target.value)}>
                            <option value="rating">Rating (1–5)</option>
                            <option value="text">Text / notes</option>
                          </FSel>
                          <label style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 10, fontSize: 12, cursor: "pointer", color: "var(--color-text-primary)" }}>
                            <input type="checkbox" checked={!!q.selfAssess} onChange={e => updateFormQuestion(sec.id, q.id, "selfAssess", e.target.checked)} />
                            Include in self-assessment
                          </label>
                        </div>
                      </div>
                      {q.type === "text" && (
                        <div style={{ marginBottom: 10 }}>
                          <FL mt={0}>Placeholder text</FL>
                          <FI value={q.placeholder || ""} onChange={e => updateFormQuestion(sec.id, q.id, "placeholder", e.target.value)} placeholder="Optional comments…" />
                        </div>
                      )}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <Btn variant="danger" onClick={() => { if (confirm("Delete this question?")) { deleteFormQuestion(sec.id, q.id); setEditingQ(null); } }} style={{ fontSize: 12, padding: "4px 10px" }}>Delete question</Btn>
                        <Btn onClick={() => setEditingQ(null)} style={{ fontSize: 12, padding: "4px 12px" }}>Done</Btn>
                      </div>
                    </div>
                  ) : formEditMode ? (
                    /* Edit mode row */
                    <div onClick={() => setEditingQ({ secId: sec.id, qId: q.id })}
                      style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "8px 10px", borderRadius: 6, marginBottom: 4, cursor: "pointer", background: "transparent" }}
                      onMouseOver={e => e.currentTarget.style.background = "var(--color-background-secondary)"}
                      onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                      <span style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2, minWidth: 20 }}>{q.num}.</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.5 }}>
                          {q.title ? <><strong>{q.title}</strong>{q.text && <span style={{ color: "var(--color-text-secondary)" }}> — {q.text}</span>}</> : q.text}
                        </div>
                        <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>
                          {q.type === "rating" ? `Rating 1–5 · ${q.scaleMin} → ${q.scaleMax}` : "Text field"}
                          {q.selfAssess && " · ✓ Self-assessment"}
                        </div>
                      </div>
                      <span style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>click to edit →</span>
                    </div>
                  ) : (
                    /* Preview mode */
                    q.type === "rating" ? (
                      <QuestionRating key={q.id} q={q} value={0} readOnly />
                    ) : (
                      <div key={q.id} style={{ marginBottom: 18 }}>
                        {q.title ? (
                          <div style={{ marginBottom: 8 }}>
                            <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", lineHeight: 1.4 }}>
                              <span style={{ color: "var(--color-text-secondary)", marginRight: 6, fontWeight: 400 }}>{q.num}.</span>{q.title}
                            </div>
                            {q.text && (
                              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.6, marginTop: 4, paddingLeft: 22 }}>{q.text}</div>
                            )}
                          </div>
                        ) : (
                          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 6, lineHeight: 1.5 }}>
                            <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
                          </div>
                        )}
                        <div style={{ marginLeft: q.title ? 22 : 0, border: "0.5px solid var(--color-border-tertiary)", borderRadius: 6, padding: "8px 12px", fontSize: 13, color: "var(--color-text-secondary)", fontStyle: "italic", background: "var(--color-background-secondary)" }}>
                          {q.placeholder || "Optional comments…"}
                        </div>
                      </div>
                    )
                  )}
                </div>
              ))}
              {formEditMode && (
                <div style={{ display: "flex", gap: 8, paddingTop: 8, paddingBottom: 8 }}>
                  <Btn variant="secondary" onClick={() => addFormQuestion(sec.id, "rating")} style={{ fontSize: 12, padding: "5px 12px" }}>+ Rating question</Btn>
                  <Btn variant="secondary" onClick={() => addFormQuestion(sec.id, "text")} style={{ fontSize: 12, padding: "5px 12px" }}>+ Text field</Btn>
                </div>
              )}
            </div>

            {/* Staff input band — always present on every section */}
            <div style={{ padding: "14px 20px 16px", background: "#E8DFD0", borderTop: `3px solid ${sec.color}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: sec.color, marginBottom: 2 }}>Staff input</div>
                  <div style={{ fontSize: 12, color: "#5C3D2E" }}>Record observations from anyone on the team — your own notes go here too.</div>
                </div>
                <div style={{ background: "#5C3D2E", color: "#FAF8F5", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontFamily: "'DM Sans', sans-serif", opacity: 0.5 }}>+ Add input</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 12, marginTop: 10, opacity: 0.6 }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 5 }}>Input from</div>
                  <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 6, padding: "8px 10px", fontSize: 13, color: "#5C3D2E", fontStyle: "italic" }}>Select staff member…</div>
                </div>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 5 }}>Observation</div>
                  <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 6, padding: "8px 10px", fontSize: 13, color: "#5C3D2E", fontStyle: "italic", minHeight: 60 }}>What did they observe about this person in this area?</div>
                </div>
              </div>
            </div>
          </div>
        ))}

        {/* Overall rating options */}
        <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 12 }}>18. Overall rating options</div>
          {formDef.overallOptions.map((opt, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              {formEditMode ? (
                <>
                  <input value={opt} onChange={e => updateOverallOption(i, e.target.value)}
                    style={{ flex: 1, padding: "6px 10px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 6, fontSize: 13, fontFamily: "'DM Sans', sans-serif", color: "var(--color-text-primary)", background: "var(--color-background-secondary)" }} />
                  <button onClick={() => deleteOverallOption(i)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#A32D2D" }}>×</button>
                </>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, color: "var(--color-text-primary)" }}>
                  <div style={{ width: 14, height: 14, border: "1.5px solid var(--color-border-secondary)", borderRadius: 3, flexShrink: 0 }} />
                  {opt}
                </div>
              )}
            </div>
          ))}
          {formEditMode && (
            <Btn variant="secondary" onClick={addOverallOption} style={{ fontSize: 12, padding: "5px 12px", marginTop: 8 }}>+ Add option</Btn>
          )}
        </div>

        {formEditMode && (
          <Btn variant="secondary" onClick={addFormSection} style={{ width: "100%", textAlign: "center", padding: 14, fontSize: 13 }}>+ Add section</Btn>
        )}
      </div>
    );
  };

  // ── View: Dashboard ──────────────────────────────────────────────────────────
  const renderDashboard = () => {
    const upcoming = allUpcoming.slice(0, 6);
    const recent = [...reviews].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
    const overdueCount = allUpcoming.filter((s) => daysUntil(s.date) < 0).length;
    const soonCount = allUpcoming.filter((s) => {
      const d = daysUntil(s.date);
      return d >= 0 && d <= 30;
    }).length;
    return (
      <div>
        <h1 style={styles.pageTitle}>Overview</h1>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 24 }}>
          {[
            { label: "Team members", val: employees.length },
            { label: "Total reviews", val: reviews.length },
            { label: "Upcoming (30 days)", val: soonCount, color: soonCount > 0 ? "#D4793A" : undefined },
            { label: "Overdue", val: overdueCount, color: overdueCount > 0 ? "#A32D2D" : undefined },

            <div

                {s.label}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <Card>
            <CardHeader
              title="Upcoming reviews"
              action={
                <button
