<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TED Technical Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --muir:#1B2838; --sequoia:#5C3D2E; --arroyo:#D4793A; --farallon:#2A7A6E;
  --pearl:#FAF8F5; --mojave:#E8DFD0;
  --ink:#1B2838; --muted:#6B6256; --line:#E2D9C9; --white:#fff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--pearl);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'DM Mono',monospace}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:var(--farallon)}

/* layout */
#app{display:flex;min-height:100vh}
#sidebar{width:236px;flex:0 0 236px;background:var(--muir);color:var(--pearl);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
#main{flex:1;min-width:0;padding:34px 44px 80px;max-width:1080px}
.brand{padding:26px 22px 20px}
.brand .name{font-weight:700;font-size:17px;letter-spacing:.2px}
.brand .sub{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:#9AA7B2;margin-top:3px}
nav{padding:8px 12px;display:flex;flex-direction:column;gap:2px}
nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:#C6CFD6;padding:9px 12px;border-radius:7px;font-size:14px;font-weight:500}
nav button:hover{background:rgba(255,255,255,.06);color:#fff}
nav button.active{background:rgba(212,121,58,.16);color:#fff}
nav button .dot{width:7px;height:7px;border-radius:50%;background:var(--arroyo);opacity:0;flex:0 0 7px}
nav button.active .dot{opacity:1}
.side-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#8C99A4}
#saveStatus{display:flex;align-items:center;gap:7px}
#saveStatus .led{width:8px;height:8px;border-radius:50%;background:#5B6A75}
#saveStatus.saving .led{background:var(--arroyo)}
#saveStatus.saved .led{background:var(--farallon)}
#saveStatus.failed .led{background:#C7544A}

/* headers */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
h1{font-size:27px;font-weight:700;margin:0;letter-spacing:-.3px}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sub-line{color:var(--muted);font-size:13.5px}

/* controls */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:9px;background:#fff}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px}
.chip{border:1px solid var(--line);background:#fff;padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:7px}
.chip .cdot{width:9px;height:9px;border-radius:50%}
.chip.active{color:#fff;border-color:transparent}
.btn{border:1px solid var(--line);background:#fff;padding:10px 16px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--ink)}
.btn:hover{background:var(--mojave)}
.btn.primary{background:var(--arroyo);border-color:var(--arroyo);color:#fff}
.btn.primary:hover{background:#c06b30}
.btn.ghost{background:transparent}
.btn.danger{color:#C7544A;border-color:#e6c4bf}
.btn.danger:hover{background:#fbeeec}
.btn.sm{padding:6px 11px;font-size:12.5px}

/* cards */
.cat-group{margin-bottom:30px}
.cat-group h2{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:9px}
.cat-group h2 .cdot{width:11px;height:11px;border-radius:50%}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--line);border-radius:11px;padding:16px 18px;cursor:pointer;transition:transform .08s,box-shadow .12s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(27,40,56,.10)}
.card .ct{font-weight:600;font-size:15.5px;margin-bottom:5px;line-height:1.3}
.card .cs{color:var(--muted);font-size:13px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .cmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;color:var(--muted)}
.badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:5px;font-weight:500}
.badge.Draft{background:#F3EAD8;color:#9A7B33}
.badge.Published{background:#DCEFE9;color:#1F6E5F}
.badge.Archived{background:#EAE6E0;color:#827A6D}
.type-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;color:var(--farallon);background:#DCEFE9;padding:2px 7px;border-radius:5px;vertical-align:middle}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.seg-btn{border:none;background:#fff;padding:9px 16px;font-size:13.5px;font-weight:500;color:var(--muted)}
.seg-btn.on{background:var(--muir);color:#fff}
.seg-btn:not(.on):hover{background:var(--mojave)}
.check-item{display:flex;gap:12px;align-items:flex-start;padding:10px 2px;border-top:1px dashed var(--line);cursor:pointer}
.check-item:first-child{border-top:none}
.check-item input{width:19px;height:19px;margin-top:1px;accent-color:var(--catcolor,var(--farallon));flex:0 0 19px;cursor:pointer}
.check-item.done .ci-label{text-decoration:line-through;color:var(--muted)}
.ci-label{font-size:14.5px;display:block}
.ci-note{font-size:12.5px;color:var(--muted);display:block;margin-top:2px}
.progress{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.progress .bar{flex:1;height:8px;background:var(--mojave);border-radius:5px;overflow:hidden;max-width:280px}
.progress .bar i{display:block;height:100%;background:var(--catcolor,var(--farallon));transition:width .2s}
.progress .pct{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--muted)}

/* detail */
.detail{max-width:760px}
.back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;padding:0;margin-bottom:18px}
.back:hover{color:var(--ink)}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.detail h1{margin-bottom:8px}
.detail-meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-bottom:6px;align-items:center}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.lede{font-size:16px;color:#473d30;margin:14px 0 26px;line-height:1.55}
.block{margin-bottom:28px}
.block-h{font-family:'DM Mono',monospace;font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:0 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.mats{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px}
.mats li{background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:13px}
.safety{background:#FBF1EC;border:1px solid #EBC9B6;border-left:4px solid var(--arroyo);border-radius:9px;padding:14px 16px;font-size:14px;color:#7a4a2a}
.safety .sh{font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--arroyo);margin-bottom:5px;font-family:'DM Mono',monospace}
.section-block{margin-bottom:22px}
.section-title{font-weight:700;font-size:16px;margin:0 0 12px;color:var(--muir)}
.steps{list-style:none;padding:0;margin:0;counter-reset:st}
.step{display:flex;gap:14px;padding:11px 0;border-top:1px dashed var(--line)}
.step:first-child{border-top:none}
.step .num{counter-increment:st;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#fff;background:var(--catcolor,var(--sequoia));width:26px;height:26px;flex:0 0 26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step .num::before{content:counter(st)}
.step .sbody{flex:1;min-width:0}
.step .stitle{font-weight:600;margin-bottom:2px}
.step .sdesc{font-size:14px;color:#3c3527}
.step .snote{margin-top:7px;background:#F3EFE7;border-left:3px solid var(--mojave);border-radius:0 6px 6px 0;padding:7px 11px;font-size:12.5px;color:var(--muted)}
.step .snote b{color:var(--sequoia);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.related{display:flex;flex-wrap:wrap;gap:8px}
.related a{background:#fff;border:1px solid var(--line);border-radius:7px;padding:7px 12px;font-size:13px;text-decoration:none;color:var(--farallon);font-weight:500}
.related a:hover{background:var(--mojave)}

/* forms */
.form{max-width:760px}
.field{margin-bottom:18px}
.field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.field .hint{font-weight:400;color:var(--muted);font-size:12px}
.field input[type=text],.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
.field textarea{resize:vertical;min-height:64px;line-height:1.5}
.row2{display:flex;gap:16px;flex-wrap:wrap}
.row2>.field{flex:1;min-width:200px}
.mat-row,.rel-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.mat-row input{flex:1}
.iconbtn{border:1px solid var(--line);background:#fff;width:34px;height:34px;border-radius:8px;flex:0 0 34px;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:#fbeeec;color:#C7544A;border-color:#e6c4bf}
.sec-edit{border:1px solid var(--line);border-radius:11px;padding:16px;margin-bottom:14px;background:#fff}
.sec-edit-head{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.sec-edit-head input{flex:1;font-weight:600}
.step-edit{border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:10px;background:var(--pearl)}
.step-edit .se-top{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.step-edit .se-top .mono{color:var(--muted);font-size:12px;flex:0 0 auto}
.step-edit .se-top input{flex:1}
.step-edit textarea{width:100%;margin-bottom:8px}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.rel-grid label{display:flex;gap:8px;align-items:center;font-weight:400;font-size:13.5px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer}
.form-foot{display:flex;gap:10px;margin-top:8px;padding-top:18px;border-top:1px solid var(--line);position:sticky;bottom:0;background:linear-gradient(transparent,var(--pearl) 30%);padding-bottom:6px}

/* categories editor */
.cat-edit-row{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:9px}
.cat-edit-row input[type=text]{flex:1;border:1px solid transparent;background:transparent;font-weight:600;padding:6px 8px;border-radius:6px}
.cat-edit-row input[type=text]:focus{border-color:var(--line);background:#fff}
.cat-edit-row input[type=color]{width:38px;height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:2px;cursor:pointer}

/* empty + setup */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty h3{color:var(--ink);font-size:19px;margin:0 0 8px}
.empty p{margin:0 auto 20px;max-width:420px}
.setup-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;padding:24px}
.setup{background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px;max-width:540px;width:100%;box-shadow:0 20px 50px rgba(27,40,56,.12)}
.setup .sub{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--arroyo);font-family:'DM Mono',monospace;margin-bottom:6px}
.setup h1{font-size:25px;margin-bottom:6px}
.setup p{color:var(--muted);margin-top:0;font-size:14px}
.setup ol{color:var(--muted);font-size:13.5px;line-height:1.7;padding-left:18px}
.setup input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:9px;margin:6px 0 14px;font-family:'DM Mono',monospace;font-size:13px}
.setup-msg{font-size:13px;margin-top:12px;min-height:18px}
.setup-msg.err{color:#C7544A}
.setup-msg.ok{color:var(--farallon)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--muir);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;opacity:0;transition:.25s;pointer-events:none;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){
  #app{flex-direction:column}
  #sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center}
  .brand{padding:14px 18px}
  nav{flex-direction:row;flex-wrap:wrap;flex:1}
  .side-foot{border-top:none;margin:0;padding:14px 18px}
  #main{padding:24px 20px 70px}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const STARTER_LIBRARY = {"processes": [{"id": "p-template-receiving", "title": "Template Receiving Process", "category": "intake", "subcategory": "", "status": "Draft", "summary": "Checking templates into inventory when they arrive at the workshop.", "materials": [], "safety": "", "sections": [{"id": "sec5", "title": "", "steps": [{"id": "s1", "title": "", "description": "Check into template inventory.", "notes": ""}, {"id": "s2", "title": "", "description": "Update Todoist that it's received, how many pieces, location.", "notes": ""}, {"id": "s3", "title": "", "description": "Make sure all pieces are labeled with client and project name and numbered based on complete set (1 of 5, 2 of 5...).", "notes": ""}, {"id": "s4", "title": "", "description": "Check all joints for adhesion failure and reglue as needed.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-onsite-measurement", "title": "Onsite Measurement", "category": "intake", "subcategory": "", "status": "Draft", "summary": "Standards and method for measuring a location onsite for a leaded glass project.", "materials": ["Measuring tape", "Pad of paper on a clipboard", "Sharpened pencils", "Combination square", "3x5 cards", "Laptop", "Paper backups"], "safety": "", "sections": [{"id": "sec10", "title": "Professionalism", "steps": [{"id": "s6", "title": "", "description": "Wear a TED shirt and dress respectably. You're representing everything we have done over the past 25 years and everyone else on the team. We always want to make a good impression.", "notes": ""}, {"id": "s7", "title": "", "description": "Be on time.", "notes": ""}, {"id": "s8", "title": "", "description": "Be organized — know what you're measuring beforehand. Have your documents formatted and readily accessible. Be sure your satellite is available offline (File > Make Available Offline). It's a good idea to have paper backups in case there are computer snafus.", "notes": ""}, {"id": "s9", "title": "", "description": "Be efficient: with focus and preparation, you should be able to get in and gather what you need in a minimum amount of time.", "notes": ""}]}, {"id": "sec17", "title": "How to Measure", "steps": [{"id": "s11", "title": "", "description": "Every project is unique. Sometimes the stop can't be removed, so you can't record the EOS. Sometimes the leaded glass will be installed directly against existing glass, so there is no RAB. The most important thing is to record what you see and describe the specifics so this information can be accessed later.", "notes": ""}, {"id": "s12", "title": "", "description": "Apply workshop standards and practices as you gather information. It's essential to make executive judgements while you're onsite. If three windows are about the same size but have minor variances (+/- 1/32\"), go with the average — because most often we're going to make a single panel dimension for all three openings.", "notes": ""}, {"id": "s13", "title": "", "description": "If there are variations that might be visible — say something like 1/8\" to 1/4\" — record that, as we may want to resize a panel to eliminate that variation. No matter the situation, if you're unsure of the solution, just make sure you've got all the information recorded so we can review in the workshop.", "notes": ""}, {"id": "s14", "title": "", "description": "Since the output will be in 1/16\", the input should follow suit. Recording the minute details of dimensional variation requires more time and can cause confusion in the workshop. There's a reason we don't take calipers onsite — too much info. It's better to come up with a solution while onsite and determine if that will work. I will often select a dimension that is the average of the openings. Once I have that, I'll measure each opening to see how that will work.", "notes": ""}, {"id": "s15", "title": "", "description": "Double-check your work. Once I've gathered the dimension for a location, I go through and double-check the dimension by reading what I've written and pulling the tape a second time. Most errors are resolved at this point.", "notes": ""}, {"id": "s16", "title": "", "description": "It's also a good practice to make a short video that records the dimension along with your verbal description of project specifications.", "notes": ""}]}, {"id": "sec19", "title": "Document", "steps": [{"id": "s18", "title": "", "description": "When you return to the workshop, finalize the process by placing the recordings in the appropriate folder, including scans of handwritten notes, images and videos.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-rebar", "title": "Rebar", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Order of operations for fabricating, finishing and attaching rebar to a panel.", "materials": [], "safety": "", "sections": [{"id": "sec28", "title": "Order of Operations", "steps": [{"id": "s20", "title": "Length", "description": "LENGTH: Measure light + light and add 1/4\". Rebar extends 1/8\" onto perimeter material.", "notes": ""}, {"id": "s21", "title": "Top Corners", "description": "TOP CORNERS: Three ways to shape the rebar ends — flat right angles; 1/4\" round off; airplane nose.", "notes": ""}, {"id": "s22", "title": "Pre-Solder", "description": "PRE-SOLDER: Lay the bar on the panel and use a Sharpie to mark where the solder joints are located on the bar. Apply solder at those points.", "notes": ""}, {"id": "s23", "title": "Pre-Patina", "description": "PRE-PATINA: Patina the entire bar in two coats. Apply with Scotchbrite pad. Rinse off.", "notes": ""}, {"id": "s24", "title": "Wax", "description": "WAX: Apply wax to the rebar. Wait for it to dry, then buff off the excess.", "notes": ""}, {"id": "s25", "title": "Attach Bar", "description": "ATTACH BAR: Mask off glass around each point of attachment, then solder rebar to panel.", "notes": ""}, {"id": "s26", "title": "Clean Up", "description": "CLEAN UP: Sprinkle sawdust along the rebar. Rub it in with toothbrush to absorb the flux.", "notes": ""}, {"id": "s27", "title": "Final Touch Up", "description": "FINAL TOUCH UP: Apply patina to solder joints with a cotton swab. Apply wax to solder joints with a cotton swab. Buff.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-restoration", "title": "Restoration", "category": "restoration", "subcategory": "", "status": "Draft", "summary": "Full restoration sequence for a leaded glass panel, from removal through reinstallation.", "materials": [], "safety": "Wear proper PPE (respirator / gloves / hardhat, etc.) during removal and handling to reduce exposure to lead dust. Frequently vacuum work areas with a HEPA vacuum to keep down dust level. Avoid sweeping/brushing. Properly dispose of / recycle old lead and putty.", "sections": [{"id": "sec34", "title": "Removal / Hack Out / Plugs", "steps": [{"id": "s29", "title": "", "description": "Put down drop cloth or 6 mil plastic (OSHA reg.), and vacuum frequently — only use the Festool vac.", "notes": ""}, {"id": "s30", "title": "", "description": "Remove wooden stops.", "notes": ""}, {"id": "s31", "title": "", "description": "For putty bevel: using putty softener tool, 5-in-1 tool, or hackout knife and hammer, chip out the putty bevel.", "notes": ""}, {"id": "s32", "title": "", "description": "If the panel is fixed in the sash with nails around the border, use an old pair of lead dykes or other pry tool to remove.", "notes": ""}, {"id": "s33", "title": "", "description": "Insert lucite or painted plywood plugs into the opening. Use weatherproofing strip or latex glazing caulk as sealant.", "notes": ""}]}, {"id": "sec45", "title": "Rubbings", "steps": [{"id": "s35", "title": "", "description": "Remove rebars and/or copper ties and vacuum panel thoroughly.", "notes": ""}, {"id": "s36", "title": "", "description": "Put distorted or displaced pieces of lead and glass back into place as well as possible.", "notes": ""}, {"id": "s37", "title": "", "description": "Cut white butcher paper or archival vellum a few inches larger than the panel on all sides.", "notes": ""}, {"id": "s38", "title": "", "description": "It is typical to take a rubbing of and rebuild with the interior side up. In the case of heavily jeweled panels, this may vary.", "notes": ""}, {"id": "s39", "title": "", "description": "To secure the paper, hammer glazing nails every 4\"–6\" around the perimeter of the panel into the workbench.", "notes": ""}, {"id": "s40", "title": "", "description": "Use a Dixon lumber crayon carved to a point or Caran d'Ache (archival) to trace edges of lead flanges, including outside edges.", "notes": ""}, {"id": "s41", "title": "", "description": "Mark overall dimensions as well as border lead sizes, notation of any shaving, lead sizes and profiles, and placement of detail.", "notes": ""}, {"id": "s42", "title": "", "description": "Mark condition issues: broken joints, bowing, glass breaks, missing glass, replacements, etc.", "notes": ""}, {"id": "s43", "title": "", "description": "Make a legend of notations and color coding with markers, crayons, etc. (Sakura Pigma pens are archival).", "notes": ""}, {"id": "s44", "title": "", "description": "Place cut sheet plastic on rubbing to put glass pieces on during dismantling.", "notes": ""}]}, {"id": "sec52", "title": "Dismantling", "steps": [{"id": "s46", "title": "", "description": "Where no fragile glass paint is present, dismantle either after misting or underwater to keep down dust.", "notes": ""}, {"id": "s47", "title": "", "description": "Wear respirator to reduce lead dust exposure during handling, or if not dismantling underwater.", "notes": ""}, {"id": "s48", "title": "", "description": "Use old lead dykes to cut old lead, and a flat razor scraper and Scotchbrite pad to clean old putty off.", "notes": ""}, {"id": "s49", "title": "", "description": "It can be helpful to cut all joints on the back side of the panel before beginning dismantle.", "notes": ""}, {"id": "s50", "title": "", "description": "Save even tiny fragments of broken glass and place them in the proper place (for gluing).", "notes": ""}, {"id": "s51", "title": "", "description": "Once dry, tape together glass fragments and number each broken piece; put the number accordingly in place on the sheet plastic.", "notes": ""}]}, {"id": "sec54", "title": "Glass Match / Search", "steps": [{"id": "s53", "title": "", "description": "", "notes": ""}]}, {"id": "sec56", "title": "Glass Cut", "steps": [{"id": "s55", "title": "", "description": "If the original piece of glass cannot be well-taped together to use as a template, use the rubbing as a guide to cut the replacement.", "notes": ""}]}, {"id": "sec58", "title": "Hxtal Epoxy", "steps": [{"id": "s57", "title": "", "description": "See the Hxtal process.", "notes": ""}]}, {"id": "sec60", "title": "Assembly (Relead / Solder)", "steps": [{"id": "s59", "title": "", "description": "", "notes": ""}]}, {"id": "sec62", "title": "Finishing (Putty / Polish / Detail)", "steps": [{"id": "s61", "title": "", "description": "See the Putty, Zinc Patina, and Solder Patina protocols.", "notes": ""}]}, {"id": "sec65", "title": "Rebar / Rehab (if to be reused)", "steps": [{"id": "s63", "title": "", "description": "Rust removal.", "notes": ""}, {"id": "s64", "title": "", "description": "Repaint with Rustoleum.", "notes": ""}]}, {"id": "sec67", "title": "Install", "steps": [{"id": "s66", "title": "", "description": "See the Install protocol.", "notes": ""}]}], "relatedProcesses": ["p-hxtal", "p-putty", "p-zinc-patina", "p-solder-patina", "p-rebar", "p-install"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-hxtal", "title": "Hxtal Preparation Protocol", "category": "restoration", "subcategory": "", "status": "Draft", "summary": "Mixing and applying Hxtal NYL-1 epoxy (3:1) to repair a crack in glass.", "materials": ["Scale with 0.01g accuracy", "Hxtal NYL-1 (A Resin + B Hardener)", "Acetone", "Toothpick", "Cotton balls", "Exacto knife", "Gloves", "Small cup (film canister or prescription bottle)"], "safety": "", "sections": [{"id": "sec73", "title": "Mixing Quantities (3:1 by weight)", "steps": [{"id": "s68", "title": "", "description": "A Resin (3 parts) / B Hardener (1 part) / Total grams: 0.225 / 0.075 / 0.3", "notes": ""}, {"id": "s69", "title": "", "description": "0.375 / 0.125 / 0.5", "notes": ""}, {"id": "s70", "title": "", "description": "0.75 / 0.25 / 1.0", "notes": ""}, {"id": "s71", "title": "", "description": "1.125 / 0.375 / 1.5", "notes": ""}, {"id": "s72", "title": "", "description": "1.5 / 0.5 / 2.0", "notes": ""}]}, {"id": "sec79", "title": "Preparation and Mixing", "steps": [{"id": "s74", "title": "", "description": "Place cup or canister on scale, then TARE.", "notes": ""}, {"id": "s75", "title": "", "description": "Add A resin slowly to the container. Use a toothpick and scoop/twirl like taking honey out of a jar. The resin is thicker when cold.", "notes": ""}, {"id": "s76", "title": "", "description": "Once quantity is reached, TARE for measuring B hardener.", "notes": ""}, {"id": "s77", "title": "", "description": "Add B hardener slowly to the container, drop by drop. You can use a toothpick to control the size of the drop.", "notes": ""}, {"id": "s78", "title": "", "description": "Mix with toothpick thoroughly, ensuring you scrape the sides and bottom of the container. The Hxtal will not set if it isn't mixed thoroughly.", "notes": ""}]}, {"id": "sec82", "title": "Glass Surface Preparation", "steps": [{"id": "s80", "title": "", "description": "Clean surrounding glass surface with acetone. Take a toothpick and wrap a small piece of cotton around one end, creating a swab.", "notes": ""}, {"id": "s81", "title": "", "description": "Once surface is clean, place clear tape on the back side of the crack, burnishing all air bubbles out of the tape.", "notes": ""}]}, {"id": "sec89", "title": "Hxtal Application", "steps": [{"id": "s83", "title": "", "description": "Using a clean toothpick, pick up a drop of Hxtal and place on the non-tape surface at the beginning of the crack. Slowly continue along the crack.", "notes": ""}, {"id": "s84", "title": "", "description": "Apply Hxtal until the full crack is covered, leaving an excess Hxtal bead on the surface.", "notes": ""}, {"id": "s85", "title": "", "description": "Wait 30 minutes for the Hxtal to fall into the crack. You will see the bead flatten.", "notes": ""}, {"id": "s86", "title": "", "description": "Using a clean cotton swab, slowly roll/wipe the remaining Hxtal from the surface. Use a clean swab for each wipe.", "notes": ""}, {"id": "s87", "title": "", "description": "Using a clean cotton swab, carefully apply acetone to the sides of the crack to remove any residue. Acetone will dissolve uncured Hxtal.", "notes": ""}, {"id": "s88", "title": "", "description": "Remove tape after 4 days of curing.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-patina-removal", "title": "Patina Removal from Zinc", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Removing patina from a zinc surface with progressively finer steel wool, then re-waxing.", "materials": [], "safety": "", "sections": [{"id": "sec99", "title": "", "steps": [{"id": "s90", "title": "", "description": "Tape surfaces that are not being removed.", "notes": ""}, {"id": "s91", "title": "", "description": "Use acetone on a tee-shirt rag to remove wax from the surface.", "notes": ""}, {"id": "s92", "title": "", "description": "Confirm the glass will not be scratched before using steel wool.", "notes": ""}, {"id": "s93", "title": "", "description": "Use #1 steel wool to remove patina from the surface. Use basic pressure to abrade the surface until most patina is removed.", "notes": ""}, {"id": "s94", "title": "", "description": "Use #000 steel wool to remove remaining patina and vacuum particles.", "notes": ""}, {"id": "s95", "title": "", "description": "Use #0000 steel wool to detail-clean any remaining patina. This will buff out scratches on the zinc surface.", "notes": ""}, {"id": "s96", "title": "", "description": "Vacuum steel wool particles throughout the process and before changing grits.", "notes": ""}, {"id": "s97", "title": "", "description": "Clean surface with acetone on a tee-shirt rag.", "notes": ""}, {"id": "s98", "title": "", "description": "Wax with a tee-shirt rag and buff with a microfiber cloth.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-plating", "title": "Plating", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Placeholder — process not yet documented.", "materials": [], "safety": "", "sections": [{"id": "sec101", "title": "", "steps": [{"id": "s100", "title": "", "description": "", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-mosaic-honing", "title": "Mosaic Honing", "category": "mosaic", "subcategory": "", "status": "Draft", "summary": "Four-step wet honing of a mosaic surface, from glossy to polished finish.", "materials": [], "safety": "", "sections": [{"id": "sec108", "title": "", "steps": [{"id": "s102", "title": "", "description": "Honing is done in four steps: 100 wet resin disc to remove most of the glossy layer, then 200 wet resin disc, 400 wet resin disc, and a finishing polishing wet/dry disc.", "notes": ""}, {"id": "s103", "title": "", "description": "Before starting, make sure the mosaic is completely free of sand by brushing and rinsing off with water.", "notes": ""}, {"id": "s104", "title": "", "description": "After the first pass with the 100 wet resin disc, use a towel to dry the mosaic, then use a black Inkzall pen to mark all glossy spots.", "notes": ""}, {"id": "s105", "title": "", "description": "After removing all the black Inkzall pen marks with the 200 wet resin disc, dry the mosaic and repeat the process (mark glossy spots, remove with the 400 disc).", "notes": ""}, {"id": "s106", "title": "", "description": "With the final wet-disc pass you should not see any more glossy spots; the piece should be completely honed and smooth.", "notes": ""}, {"id": "s107", "title": "", "description": "The final pass with the polishing wet/dry disc removes any small scratches and gives it the finish.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-mosaic-mounting", "title": "Mosaic Mounting", "category": "mosaic", "subcategory": "", "status": "Draft", "summary": "Mounting a mosaic to backerboard with sand-packed joints and cement or silicone, through to honing prep.", "materials": [], "safety": "Wear a respirator while combing sand into the joints.", "sections": [{"id": "sec122", "title": "", "steps": [{"id": "s109", "title": "", "description": "Note: a fuller version of this process lives in a Google Doc — content to be merged once the format is set.", "notes": "https://docs.google.com/document/d/16s52YCiynOnv6UQQfQXB2AZbROXlh_Mp9dGdNRsEklY/edit?usp=sharing"}, {"id": "s110", "title": "", "description": "Once the glass is set on the contact paper: remove the ledgers used for assembly so the mosaic is alone on the tabletop. Use the stock dam glass we've cut to surround the perimeter — the dams keep the sand from running out of the joints.", "notes": ""}, {"id": "s111", "title": "", "description": "Cover the entire surface with tile tape. Use the roll that ensures the fewest joints and least waste. For larger projects, two people should apply the tape to minimize creases. Cut out and patch any creased areas. The taped surface needs to be as flat as possible; don't stretch the tape as it's applied (this leads to shrinkage).", "notes": ""}, {"id": "s112", "title": "", "description": "Trim the tile tape right up to the edge of the dam.", "notes": ""}, {"id": "s113", "title": "", "description": "Cut the contact paper around the perimeter so the under-platform will remove cleanly.", "notes": ""}, {"id": "s114", "title": "", "description": "Flip the mosaic and remove the contact paper. For large pieces, all flipping is done with the sandwich process where lightweight plywood supports the mosaic. Make sure all pieces are set flat against the table surface.", "notes": ""}, {"id": "s115", "title": "", "description": "Set a ledger to ensure the long face is straight AND to have a surface against which to register the siliconed backerboard.", "notes": ""}, {"id": "s116", "title": "", "description": "Make sure the backerboard is accurately cut and oriented so when it's covered in silicone there is no question which side is set against the ledger.", "notes": ""}, {"id": "s117", "title": "", "description": "Carefully clean the back of the mosaic to remove any film from production or the contact paper. The fine powder from the sand will coat this and inhibit the bond.", "notes": ""}, {"id": "s118", "title": "", "description": "Assume the mosaic is now out of square from moving. Nudge it back to square and secure with 1/8\" low-profile stops micro-pinned into place. For large projects use a material about equal to the overall thickness of the assembly.", "notes": ""}, {"id": "s119", "title": "", "description": "When the mosaic is cut, we assemble it on the tabletop with the back of the glass against the contact paper, then tile-tape it in that arrangement. When flipped, assume the glass is all flat on the now-up side. Apply pressure to each piece to realign it with the tabletop so the visible face is as flat as possible.", "notes": ""}, {"id": "s120", "title": "", "description": "While wearing a respirator, carefully comb sand into the joints. Remove excess with a soft bristle brush. Transfer clean sand back into the container.", "notes": ""}, {"id": "s121", "title": "", "description": "At the same time, one person butters the backerboard and one butters the mosaic back. Time this so it's done together — the surfaces must be joined as soon as possible to avoid curing of either face.", "notes": ""}]}, {"id": "sec127", "title": "When Using Cement", "steps": [{"id": "s123", "title": "", "description": "If the glass is at all translucent, the backerboard cement should be troweled flat: apply a bead on the leading edge of the trowel and use that amount to 'tool' the cement rather than the trowel itself. Strive to have the same amount on your leading edge when done as when you started.", "notes": ""}, {"id": "s124", "title": "", "description": "If the glass is opaque, it's OK to leave standing grooves.", "notes": ""}, {"id": "s125", "title": "", "description": "If the mosaic uses large grout joints (greater than 1/16\"), do not back-butter the glass — cement will fill the grooves and waste time to wire-brush out after it sets.", "notes": ""}, {"id": "s126", "title": "", "description": "All glass types (translucent and opaque) should be back-buttered when using silicone.", "notes": ""}]}, {"id": "sec135", "title": "Join, Set, and Hone Prep", "steps": [{"id": "s128", "title": "", "description": "Join both surfaces and apply pressure to the backerboard through a broad piece of wood to distribute pressure evenly. Bare hands push inconsistently, and each inconsistency translates to the overall thickness — for a honed mosaic this greatly increases polishing time.", "notes": ""}, {"id": "s129", "title": "", "description": "If a large mosaic is applied onto multiple pieces of backerboard and cut apart after mounting, use a wide piece of wood to bridge the underlying backerboard when pushing down. This keeps the edges level for final installation.", "notes": ""}, {"id": "s130", "title": "", "description": "Carefully flip the mosaic to avoid uneven pressure that would deform the surface. Allow to set 4–6 hours to overnight depending on temperature. To test, carefully lift the tape on an insignificant corner.", "notes": ""}, {"id": "s131", "title": "", "description": "Once set for 48 hours, remove the tape and dump the sand onto a paper sheet so it can be collected and poured back into the carton.", "notes": ""}, {"id": "s132", "title": "", "description": "For honed work, thoroughly brush and vacuum the sanded joints to remove grains that could dislodge during honing and mar the surface.", "notes": ""}, {"id": "s133", "title": "", "description": "Any high points of cement need to be removed prior to honing.", "notes": ""}, {"id": "s134", "title": "", "description": "Honing is done in three steps: 200 wet resin disc, 400 wet resin disc, and finished with a 400 wet/dry disc with water.", "notes": ""}]}], "relatedProcesses": ["p-mosaic-honing"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-fireplace-frame", "title": "Mosaic Fireplace Frame", "category": "mosaic", "subcategory": "", "status": "Draft", "summary": "Fabricating a brass firebox frame and applying a patina finish.", "materials": [], "safety": "Be sure to completely turn off the fuel after soldering.", "sections": [{"id": "sec146", "title": "Making a Brass Firebox Frame", "steps": [{"id": "s136", "title": "", "description": "Using either 3/4\" or 1\" angle.", "notes": ""}, {"id": "s137", "title": "", "description": "Cutting the metal with the chop saw requires two things: a fully supported back wall to cut against, and the metal must be clamped.", "notes": ""}, {"id": "s138", "title": "", "description": "Use the non-ferrous metal blade.", "notes": ""}, {"id": "s139", "title": "", "description": "The success of this process is determined by the accuracy of your marking device. Don't use pencils — only use the marking tool.", "notes": ""}, {"id": "s140", "title": "", "description": "Once cut, the joints need to be cleaned thoroughly.", "notes": ""}, {"id": "s141", "title": "", "description": "The sections need to be arranged so they can be heated from all angles and secured so they won't move. Pay careful attention to alignment.", "notes": ""}, {"id": "s142", "title": "", "description": "Heat the overall area, not just the joint.", "notes": ""}, {"id": "s143", "title": "", "description": "Once there is a moderate amount of heat, apply the solder/flux mixture along the joint.", "notes": ""}, {"id": "s144", "title": "", "description": "Bring the metal up to temperature until the solder flows throughout the joint.", "notes": ""}, {"id": "s145", "title": "", "description": "Be sure to completely turn off the fuel.", "notes": ""}]}, {"id": "sec155", "title": "Brass Fireplace Frame Patina Process", "steps": [{"id": "s147", "title": "", "description": "It's critical to get all sides that will be seen: face, inside face, and outer 1/8\" edges.", "notes": ""}, {"id": "s148", "title": "", "description": "Remove oxidation with Scotch-Brite red.", "notes": ""}, {"id": "s149", "title": "", "description": "Remove any deep scratches with the Festool sander (220 grit).", "notes": ""}, {"id": "s150", "title": "", "description": "Use Scotch-Brite grey (ultra fine) to complete sanding.", "notes": ""}, {"id": "s151", "title": "", "description": "Apply Jax brand black-for-brass patina.", "notes": ""}, {"id": "s152", "title": "", "description": "Wash off with hose when slightly darker than the desired finish.", "notes": ""}, {"id": "s153", "title": "", "description": "Let dry.", "notes": ""}, {"id": "s154", "title": "", "description": "Apply wax.", "notes": ""}]}], "relatedProcesses": ["p-back-filling"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-mirroring", "title": "Mirroring", "category": "mirroring", "subcategory": "", "status": "Draft", "summary": "Silvering glass to make a mirror: cleaning, application, painting, and water treatment.", "materials": ["Bon Ami", "Distilled water", "Primer / sensitizer", "Two-part silvering solution", "Cerium oxide", "Felt polishing pad", "Black mirror paint", "Foil backing", "Treatment clay powder"], "safety": "Wear gloves and a respirator. Wear a mask for fumes when painting the mirrored surface.", "sections": [{"id": "sec161", "title": "Cleaning", "steps": [{"id": "s156", "title": "", "description": "Use Bon Ami to make a paste on the glass surface and clean all sides and edges.", "notes": ""}, {"id": "s157", "title": "", "description": "Allow to dry and buff with a clean paper towel. Use hot water to eliminate haze and dry with a fresh paper towel.", "notes": ""}, {"id": "s158", "title": "", "description": "Repeat until all water sheets on the glass rather than beading. Listen for the squeak of the paper towel.", "notes": ""}, {"id": "s159", "title": "", "description": "For a perfect mirror you want the glass immaculate. For an antique mirror you don't need to clean as thoroughly.", "notes": ""}, {"id": "s160", "title": "", "description": "The final step should be the spray and wipe-down with the aerosol glass cleaner.", "notes": ""}]}, {"id": "sec170", "title": "Glass Preparation and Cleaning (tank method)", "steps": [{"id": "s162", "title": "", "description": "Attach glass to stretcher by screwing blocks down. ALWAYS keep bottom blocks attached.", "notes": ""}, {"id": "s163", "title": "", "description": "Move to tank. Open clean water valve (trash can). Close dirty water valve (bin).", "notes": ""}, {"id": "s164", "title": "", "description": "Wet glass with tap water.", "notes": ""}, {"id": "s165", "title": "", "description": "Dissolve powder cleaner with hot water in a container (quantities TBD).", "notes": ""}, {"id": "s166", "title": "", "description": "Pour powder-cleaner water on glass and use a sponge to gently clean the surface. Prop glass on frame and rinse with tempered tap water.", "notes": ""}, {"id": "s167", "title": "", "description": "Lay glass flat. Sprinkle with cerium oxide and add tap water to create a milky consistency. Firmly polish the glass with a felt pad and the cerium oxide mixture.", "notes": ""}, {"id": "s168", "title": "", "description": "Prop glass on frame and rinse with tap water. Clean water from the surface using a squeegee. Ensure all cerium oxide is removed.", "notes": ""}, {"id": "s169", "title": "", "description": "Final rinse with distilled water. Drain tank. Close clean water valve when the tank finishes draining; open dirty water valve.", "notes": ""}]}, {"id": "sec181", "title": "Application", "steps": [{"id": "s171", "title": "", "description": "Lay glass flat. Spray with distilled water, covering thoroughly.", "notes": ""}, {"id": "s172", "title": "", "description": "Spray sensitizer over the entire surface, covering thoroughly. Wait 30 seconds.", "notes": ""}, {"id": "s173", "title": "", "description": "Prop up on frame and rinse off all sensitizer with distilled water. Lay flat.", "notes": ""}, {"id": "s174", "title": "", "description": "Spray silver with the double sprayer, using some movement to create an uneven pattern. As the mirror develops, add more where needed. Remain flat and rinse with tap water to stop chemical development.", "notes": ""}, {"id": "s175", "title": "", "description": "Prop up on frame and rinse again with tap water. Final rinse with distilled water — three rinses total.", "notes": ""}, {"id": "s176", "title": "", "description": "Move glass on stretcher outside to dry in the sun.", "notes": ""}, {"id": "s177", "title": "", "description": "Clear mirror basin with tap water, draining fully into dirty water bins. Drain dirty water into 5-gallon buckets for treatment.", "notes": ""}, {"id": "s178", "title": "", "description": "When the surface is fully dry, bring inside and remove from stretcher.", "notes": ""}, {"id": "s179", "title": "", "description": "Paint the mirrored surface with black paint, coating with a thick, even layer. Wear a mask for fumes.", "notes": ""}, {"id": "s180", "title": "", "description": "Once approved by client, cut to size. Apply foil backing to the painted side.", "notes": ""}]}, {"id": "sec183", "title": "Water Treatment Process", "steps": [{"id": "s182", "title": "", "description": "Add 3 oz (1 container) of treatment clay powder into a 5-gallon bucket, stir, and let sit overnight.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-back-filling", "title": "Back Filling with Mortar in a Firebox", "category": "mosaic", "subcategory": "", "status": "Draft", "summary": "Transitioning from firebox masonry to backerboard with thinset, mortar, and grout — for aesthetics and to seal the space.", "materials": [], "safety": "", "sections": [{"id": "sec192", "title": "", "steps": [{"id": "s184", "title": "", "description": "Wire-brush the brick surface to remove any loose material, getting to a solid surface for bonding.", "notes": ""}, {"id": "s185", "title": "", "description": "Clean with a sponge if necessary, then dry with a rag.", "notes": ""}, {"id": "s186", "title": "", "description": "Mix up a slurry of thinset liquid enough to brush on. This gives the mortar mix something to bond to.", "notes": ""}, {"id": "s187", "title": "", "description": "Tape off a target line so the fill is targeted rather than random. The placement of the line may be selected for aesthetics.", "notes": ""}, {"id": "s188", "title": "", "description": "Mix the mortar so it can go onto the thinset as soon as possible — ideally while the thinset is still wet.", "notes": ""}, {"id": "s189", "title": "", "description": "If there is a large gap, consider using hardware cloth and concrete screws to create an armature for the mortar.", "notes": ""}, {"id": "s190", "title": "", "description": "Let the mortar firm up a bit before the mortar lines can be struck. It should be solid enough that it holds a line.", "notes": ""}, {"id": "s191", "title": "", "description": "Mix up a slurry of black sanded grout and apply with a paintbrush. At this point it's a good idea to remove the tape.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-putty", "title": "Putty Protocol", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Puttying a leaded panel with GlassPro putty, through rotary polish and labeling. Apply before zinc frame patina.", "materials": ["GlassPro Stained Glass Putty", "Putty application tool", "Metal embosser", "Natural bristle brush", "Sawdust", "Vacuum", "Horseshoe nails or build bars", "Rotary brush", "Horse brush", "Clean rags"], "safety": "", "sections": [{"id": "sec203", "title": "Procedure (apply putty before Zinc frame patina)", "steps": [{"id": "s193", "title": "", "description": "Mix GlassPro Stained Glass Putty in the bucket to distribute the oils before applying.", "notes": ""}, {"id": "s194", "title": "", "description": "Start on the exterior side of the panel. Apply putty by hand or with a tool to all sides of the lead came, looking from multiple directions to make sure there are no holes.", "notes": ""}, {"id": "s195", "title": "", "description": "Roll the excess putty ball on the surface to pick up as much excess as you can. Remove excess with the metal embosser, taking care not to drag putty out from underneath the flange. Flip to the interior, apply putty, and pick again.", "notes": ""}, {"id": "s196", "title": "", "description": "Hand-brush the panel with the natural bristle brush and a liberal amount of sawdust to pull excess oils off the surface. The surface should be free of excess putty at this point.", "notes": ""}, {"id": "s197", "title": "", "description": "Vacuum the sawdust from the panel. Flip to the exterior and repeat the sawdust brushing.", "notes": ""}, {"id": "s198", "title": "", "description": "Secure the panel to the work surface with horseshoe nails or build bars. Rotary the surface until the lead is black and shiny.", "notes": ""}, {"id": "s199", "title": "", "description": "Flip the panel and repeat the rotary step on the interior. Vacuum and clean up excess sawdust, and reset the putty table.", "notes": ""}, {"id": "s200", "title": "", "description": "Label the panel with job name and project number. Let it sit in the tray 3–5 days to dry. Label the front of the tray with the date the panel needs to be polished by.", "notes": ""}, {"id": "s201", "title": "", "description": "Final-clean the panel: use the rotary brush to darken the lead and pick any leaching putty with the metal embosser. Check for holidays in the putty surface and fill where needed. Final-polish the lead with the horse brush and clean the glass with a clean rag.", "notes": ""}, {"id": "s202", "title": "", "description": "Return the panel to the tray with a clean label, and update the project board with the panel status.", "notes": ""}]}, {"id": "sec208", "title": "Background — Putty 101 (historical reference)", "steps": [{"id": "s204", "title": "", "description": "Kept for reference. Current shop practice uses off-the-shelf GlassPro putty (above); this section is the older make-your-own background.", "notes": ""}, {"id": "s205", "title": "", "description": "Putty is two basic ingredients: whiting and linseed oil. People add powders (whiting, plaster, cement), liquids (raw or boiled linseed oil), thinners (mineral spirits, turpentine, etc.) and driers (white/red lead — now illegal in the US, or Japan drier).", "notes": ""}, {"id": "s206", "title": "", "description": "Whiting should be used alone — plaster absorbs moisture and portland cement bonds to the glass, making future restoration very hard. Thinners and driers shorten putty life; for longevity the putty needs to stay elastic as long as possible. Problems show up over 25+ years, not in the first few.", "notes": ""}, {"id": "s207", "title": "", "description": "Vic Rothman's recipe (for reference): whiting 3 parts 25-micron + 1 part 3-micron, ~5% talc; 49.5% boiled + 49.5% raw linseed oil, 1% tall oil; black cement color to taste. For a single job, increase boiled linseed oil to 75%. Our older in-house version used ceramics-supplier whiting and lamp black, without the microns, talc, raw linseed, or tall oil.", "notes": ""}]}], "relatedProcesses": ["p-zinc-patina", "p-solder-patina"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-zinc-patina", "title": "Patina Protocol — Zinc", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Patinating zinc came with Birchwood Casey Super Blue after the panel is puttied, then neutralizing, waxing, and final clean.", "materials": ["Acetone (ideally in a dispenser)", "Maroon 3M Scotch-Brite 7447 pad (a green scrub pad also works)", "Birchwood Casey Super Blue", "Cotton balls / sponge cut into cubes", "Q-tips", "Soapy water (basic dish soap, not concentrated)", "Small plastic containers", "Sponges", "Nitrile gloves", "Paste wax (Minwax or similar)", "Clean rags", "Microfiber towel", "Soft, clean work surface (foam paper or old towel)"], "safety": "Wear gloves throughout the patina and waxing process. Chemical patina is acid — it must be neutralized (see Neutralizing) or it will keep corroding the metal over time.", "sections": [{"id": "sec212", "title": "Surface Preparation (apply after the panel has been puttied — work on the back first)", "steps": [{"id": "s209", "title": "", "description": "Acetone the zinc came to remove residual oil. Be careful not to remove the oil patina on the lead.", "notes": ""}, {"id": "s210", "title": "", "description": "Use a small piece of maroon 3M pad to abrade the zinc came and joints. Once both sides of the pad are used, discard it — don't clean with fouled pads. Avoid scratching the glass.", "notes": ""}, {"id": "s211", "title": "", "description": "Acetone the zinc again to remove remaining oil and small particles.", "notes": ""}]}, {"id": "sec215", "title": "Solution Preparation", "steps": [{"id": "s213", "title": "", "description": "Decant only the amount of patina you'll need for the project into a clean, small container.", "notes": "IMPORTANT: never pour decanted patina back into the original bottle — it can contaminate the whole batch."}, {"id": "s214", "title": "", "description": "Mix a separate small container of water and a little dish soap (not so concentrated it leaves residue).", "notes": ""}]}, {"id": "sec219", "title": "Application", "steps": [{"id": "s216", "title": "", "description": "Apply the patina to the came. We use sponges cut into cubes: dip one face of the cube just enough to moisten it (squeeze out if too full), then slowly pull the wet face across the clean metal until it stops turning black. Rotate to a fresh face, re-dip, and continue. A Q-tip works for more controlled application.", "notes": "Don't squeeze extra solution onto the project — just enough to coat the metal. Get both the outside and inside edge of the came."}, {"id": "s217", "title": "", "description": "Where areas aren't as dark as you'd like, apply a second time. Repeat until the zinc is even and black.", "notes": ""}, {"id": "s218", "title": "", "description": "For copper foil work, apply this process to all the metal — be methodical on the zinc came; you can loosen up on the soldered areas since they patinate easily.", "notes": ""}]}, {"id": "sec221", "title": "Drying", "steps": [{"id": "s220", "title": "", "description": "Allow the surface to dry completely before proceeding. If the patina wipes off, it hasn't dried sufficiently.", "notes": ""}]}, {"id": "sec224", "title": "Neutralizing", "steps": [{"id": "s222", "title": "", "description": "Neutralize the acid so it stops corroding the metal: use a fresh sponge and a light application of the soapy water over the patinated area. Avoid over-application.", "notes": ""}, {"id": "s223", "title": "", "description": "Allow the surface to dry completely.", "notes": ""}]}, {"id": "sec226", "title": "Repeat for the Opposite Side", "steps": [{"id": "s225", "title": "", "description": "Repeat Surface Preparation through Neutralizing on the front.", "notes": ""}]}, {"id": "sec229", "title": "Waxing", "steps": [{"id": "s227", "title": "", "description": "Once the panel is completely dry, apply paste wax with a small rag — just enough to coat the chemically patinated metal. Be careful not to get wax on the glass or the oil-patinated lead; carelessness here complicates the final clean.", "notes": ""}, {"id": "s228", "title": "", "description": "After about 10 minutes, buff out the wax with a soft clean rag. Repeat on the other side.", "notes": "Do not use the rotary brush to buff the waxed zinc."}]}, {"id": "sec233", "title": "Final Clean", "steps": [{"id": "s230", "title": "", "description": "Use a clean microfiber towel to remove wax build-up and haze from the glass.", "notes": ""}, {"id": "s231", "title": "", "description": "Clean excess putty, wax, and residue from the glass-metal intersections with a sharpened dowel and a soft natural bristle brush.", "notes": ""}, {"id": "s232", "title": "", "description": "You can use the rotary brush to even out the oil and chemical patinas.", "notes": ""}]}], "relatedProcesses": ["p-putty", "p-solder-patina"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-solder-patina", "title": "Patina Protocol — Solder", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Patinating decorative solder with Novacan, for solder-only panels and solder-with-lead-came panels.", "materials": ["Acetone", "Novacan Patina (for solder)", "Cotton balls", "Sponge", "Soapy water", "Paste wax", "Clean rags"], "safety": "", "sections": [{"id": "sec243", "title": "Decorative Solder Only — no lead came (apply to panel before putty)", "steps": [{"id": "s234", "title": "", "description": "Acetone the solder to remove all flux and oil residue.", "notes": ""}, {"id": "s235", "title": "", "description": "Apply Novacan (for solder) with a cotton ball, using a clean area for every application. When the cotton turns brown, switch to a new one. Make long, smooth passes.", "notes": ""}, {"id": "s236", "title": "", "description": "Wipe the patinated surface with a lightly damp sponge dipped in soapy water.", "notes": ""}, {"id": "s237", "title": "", "description": "Apply a 2nd coat of patina if necessary, and repeat the cleaning.", "notes": ""}, {"id": "s238", "title": "", "description": "Apply the first coat of paste wax, using a minimal amount.", "notes": ""}, {"id": "s239", "title": "", "description": "Buff the wax off with a clean rag. DO NOT use the rotary brush.", "notes": ""}, {"id": "s240", "title": "", "description": "Repeat wax-and-buff for a total of 2 wax applications.", "notes": ""}, {"id": "s241", "title": "", "description": "Follow the Putty Protocol for the frame, keeping putty off the solder surface.", "notes": ""}, {"id": "s242", "title": "", "description": "Follow the Zinc Patina Protocol for patination of the frame.", "notes": ""}]}, {"id": "sec250", "title": "Decorative Solder w/ Lead Came (apply to panel before putty)", "steps": [{"id": "s244", "title": "", "description": "Acetone the solder to remove all flux and oil residue.", "notes": ""}, {"id": "s245", "title": "", "description": "Apply Novacan (for solder) with a cotton ball, using a clean area for every application. When the cotton turns brown, switch to a new one. Make long, smooth passes.", "notes": ""}, {"id": "s246", "title": "", "description": "Wipe the patinated surface with a lightly damp sponge dipped in soapy water.", "notes": ""}, {"id": "s247", "title": "", "description": "Apply a 2nd coat of patina if necessary, and repeat the cleaning.", "notes": ""}, {"id": "s248", "title": "", "description": "Follow the Putty Protocol for the field lead and frame.", "notes": ""}, {"id": "s249", "title": "", "description": "Follow the Zinc Patina Protocol for patination of the frame.", "notes": ""}]}], "relatedProcesses": ["p-putty", "p-zinc-patina"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-install", "title": "Installation Instructions", "category": "installation", "subcategory": "", "status": "Draft", "summary": "Installing a leaded panel into an opening with shims, optional sealant, and removable stops.", "materials": ["Rubber gloves", "Nails (for tacking)", "Wooden coffee stirrers (shims)", "Elastomeric sealant — DAP Dynaflex 230 (black or dark bronze)", "Utility knife", "23-gauge pins / SENCO micropinner", "Stops"], "safety": "MOST IMPORTANT: glass must be installed so that it can be serviced. Keep sealant cuttable and stops removable.", "sections": [{"id": "sec259", "title": "Procedure", "steps": [{"id": "s251", "title": "", "description": "Rubber gloves are a good idea to minimize fingerprints.", "notes": ""}, {"id": "s252", "title": "", "description": "Place each panel in the opening and loosely tack in place with a few nails.", "notes": ""}, {"id": "s253", "title": "", "description": "Shim the piece so the reveal is consistent all the way around. TED uses wooden coffee stirrers for this.", "notes": ""}, {"id": "s254", "title": "", "description": "If you feel you must use sealant: run a thin bead of elastomeric sealant around the perimeter of the opening. TED uses DAP Dynaflex 230 in black or dark bronze — easy to clean up and easy to cut through if the window ever needs service (available at decent hardware stores). Double-sided adhesive weatherstripping is OK too.", "notes": ""}, {"id": "s255", "title": "", "description": "Replace the window onto the shims at the foot of the opening and gently push so the sealant squeezes out the other side. Tack in place with nails.", "notes": ""}, {"id": "s256", "title": "", "description": "Place the side shims, again watching the consistency of the reveal.", "notes": ""}, {"id": "s257", "title": "", "description": "Starting at the top, place the first stop and work around the window, removing nails and placing stops. We shoot 23-gauge pins (nothing to fill afterward) with a SENCO micropinner; heavier gauge is OK but don't split the stops. Go light — 3–5 per long side — so stops can be removed easily.", "notes": "If mitred stops are a little tight in the corners, do NOT tap them into place — remove and resize away from the glass. We made that mistake once."}, {"id": "s258", "title": "", "description": "Once the sealant is no longer tacky, run a sharp utility knife gently around the perimeter. The squeezed-out sealant separates cleanly from the wood and glass.", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-igu-leaded", "title": "IGU with Leaded Glass", "category": "installation", "subcategory": "", "status": "Draft", "summary": "Placeholder — installation of an insulated glass unit with leaded glass. Not yet documented.", "materials": [], "safety": "", "sections": [{"id": "sec261", "title": "", "steps": [{"id": "s260", "title": "", "description": "", "notes": ""}]}], "relatedProcesses": [], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-glass-cutting", "title": "Glass Cutting", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Scoring and breaking glass to shape: cutter use and maintenance, breaking methods, planning, and grinding.", "materials": ["Glass cutter (Toyo pencil or pistol grip; Silbershnitt for fine work)", "Cutting oil", "Grozers (Fan Out brand)", "Running pliers (Silbershnitt or 8\" Fletcher)", "Light table", "Glass grinder (shaft for detail, belt for flat edges)"], "safety": "Through practice, develop controlled handling. Score and snap is the core principle — create a weakness on one side, then apply pressure from the opposite side to break along the score.", "sections": [{"id": "sec264", "title": "Cutter Maintenance", "steps": [{"id": "s262", "title": "", "description": "Keep the reservoir filled with cutting oil.", "notes": ""}, {"id": "s263", "title": "", "description": "If the space above the wheel clogs, clear it with a pin to restore oil flow. If the wheel leaves no oil track on paper, it's likely clogged; if you can't clear it, keep a jar of oil nearby for dipping.", "notes": ""}]}, {"id": "sec271", "title": "Using the Cutter", "steps": [{"id": "s265", "title": "", "description": "Hold the cutter as close to perpendicular as is comfortable so pressure is even. Think of the set screw on the tip as a headlight pointing forward.", "notes": ""}, {"id": "s266", "title": "", "description": "Push or pull is personal preference — pushing keeps your hand below your eye for better sighting and leverage. What matters is uniformity of pressure and speed, and accuracy of the cut.", "notes": ""}, {"id": "s267", "title": "", "description": "Start the cut within the first ¼\" of the glass edge.", "notes": ""}, {"id": "s268", "title": "", "description": "Apply consistent pressure throughout. If you stop, don't let up on the pressure. Inconsistencies in the surface will catch the cutter; with experience you'll pass them without effort.", "notes": ""}, {"id": "s269", "title": "", "description": "Aim for a clean score you can feel with a fingernail — a fine V. Under-scored is almost invisible; over-scored looks like crushed glass and sounds like a louder crackle. Ease off if you hear that.", "notes": ""}, {"id": "s270", "title": "", "description": "The cap on the other end of the cutter is both the reservoir cap and a peen for tapping and running cuts.", "notes": ""}]}, {"id": "sec275", "title": "Observations", "steps": [{"id": "s272", "title": "", "description": "Different glasses need slightly different pressure — mouth-blown antique vs. opalescent, and manufacturer to manufacturer. Dense white opalescent and ring-mottled glasses need a little more finesse.", "notes": ""}, {"id": "s273", "title": "", "description": "Glass cuts more agreeably when warm; on cold days, let the workspace warm up before cutting full sheets if you can.", "notes": ""}, {"id": "s274", "title": "", "description": "If you don't know how a glass will cut, cut off a corner and make practice cuts first.", "notes": ""}]}, {"id": "sec280", "title": "Breaking the Glass", "steps": [{"id": "s276", "title": "", "description": "Tapping: tap the underside of a score to create a fracture, then tap down the length to connect fractures and run the break. For straight cuts, use the edge of the workbench to focus force along the score.", "notes": ""}, {"id": "s277", "title": "", "description": "Grozers: held flat-side up, curved-side underneath. Three functions — grabbing (pivot end under the score to run a break), nipping (removing small scored bits), and grozing (shaping or knocking off high points on the edge).", "notes": ""}, {"id": "s278", "title": "", "description": "Worn grozers blunt at the tip and frustrate accuracy — replace them. Quality tools instantly improve a beginner's accuracy.", "notes": ""}, {"id": "s279", "title": "", "description": "Running pliers: run a scored break cleanly. Toss any metal nipping jaws — that's what grozers are for.", "notes": ""}]}, {"id": "sec285", "title": "Planning the Cut", "steps": [{"id": "s281", "title": "", "description": "Plan cuts to maximize yield and aesthetic effect.", "notes": ""}, {"id": "s282", "title": "", "description": "Be aware of grain direction, especially where pronounced; there's no right or wrong, but apply your plan consistently across the piece.", "notes": ""}, {"id": "s283", "title": "", "description": "With uniform glass, space pieces tightly for yield. When using the character of the glass with the design, consider how accessing that area affects what's left for the rest of the project.", "notes": ""}, {"id": "s284", "title": "", "description": "If confident, cut as close to the line as possible. If unsure, cut a little big and groze or grind to shape. Order cuts by ease of cutting.", "notes": ""}]}, {"id": "sec289", "title": "Marking & Line Awareness", "steps": [{"id": "s286", "title": "", "description": "Check printed designs for accuracy — some printers are off (over 48\", a print can be off by ⅛\"). Measure the print.", "notes": ""}, {"id": "s287", "title": "", "description": "If the glass is transparent enough, score directly on the drawing rather than marking then setting aside — accurate marking and accurate scoring are the same skill, and doing it in one step greatly increases productivity. This is why we use light tables.", "notes": ""}, {"id": "s288", "title": "", "description": "The most effective marking tool is the glass you've already cut: if a piece hangs up in the channel, trace the outer edge of the came to find where; if it won't fit its neighbors, trace the adjacent pieces onto it.", "notes": ""}]}, {"id": "sec292", "title": "Light Tables", "steps": [{"id": "s290", "title": "", "description": "Light tables let you see the drawing through glass that isn't transparent enough to work on directly on the bench. Choose a size suited to your scale of work.", "notes": ""}, {"id": "s291", "title": "", "description": "To build one: ¼\" plate glass on top, a white plexiglass diffusing layer the same size below, in a rabbeted frame 3\"–4\" deep for optimal diffusion. We use 48\" LED lights (incandescent makes too much heat). More light is better — don't bother with dimmable/color-temp features.", "notes": ""}]}, {"id": "sec295", "title": "Grinding", "steps": [{"id": "s293", "title": "", "description": "Shaft grinder: most common, for detail work with small rotary diamond bits, a water reservoir, work surface, and optional face guard.", "notes": ""}, {"id": "s294", "title": "", "description": "Belt grinder (e.g. Covington): especially useful for grinding flat edges.", "notes": ""}]}], "relatedProcesses": ["p-glazing-assembly"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-glazing-assembly", "title": "Glazing / Panel Assembly", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Leading up a panel: bench setup, came selection, glazing for structure, fit, and assembly tools.", "materials": ["Drawing / cartoon", "Predrilled wood strips", "Lead or zinc came", "Horseshoe nails", "Came scrap (nail buffer)", "Lead vise", "Lead dykes", "Fid (plastic and wood)", "Custom jigs (as needed)"], "safety": "Use gloves while leading. Wash hands frequently and change out of work clothes and shoes before entering living spaces.", "sections": [{"id": "sec298", "title": "Setup", "steps": [{"id": "s296", "title": "", "description": "Attach the drawing directly to the workbench — or, if very large, to a plywood panel so it can be repositioned. Fasten predrilled wood strips into a 90° frame to build the panel into.", "notes": ""}, {"id": "s297", "title": "", "description": "It can help to keep two copies of the design — one to place cut glass on, one to build on — though if the glass is numbered/organized you don't need the extra copy.", "notes": ""}]}, {"id": "sec301", "title": "Perimeter Came Selection", "steps": [{"id": "s299", "title": "", "description": "For windows you'll install with a perimeter up to ~72\" all the way around, build into lead came.", "notes": ""}, {"id": "s300", "title": "", "description": "For larger windows, and those you won't install yourself, opt for zinc came — the added stiffness stabilizes the window in less-experienced hands. Once installed, the sash or frame provides the final stability.", "notes": ""}]}, {"id": "sec305", "title": "Glazing (Leading)", "steps": [{"id": "s302", "title": "", "description": "Glaze with an understanding of the window's vulnerabilities: where will it flex, will it get reinforcing bars, and how can the leading pattern create maximum stabilization?", "notes": ""}, {"id": "s303", "title": "", "description": "Place lead lines to draw attention away from any challenging leadwork. Decide which lines are most important aesthetically and place came so those align properly.", "notes": ""}, {"id": "s304", "title": "", "description": "Where stability and aesthetics conflict, generally favor stability and finesse the rest so aesthetics aren't compromised.", "notes": ""}]}, {"id": "sec310", "title": "Fit", "steps": [{"id": "s306", "title": "", "description": "Glass should fit snugly into the came — this makes the window stronger and less prone to leakage. To seat glass snugly, place a piece of wood at the glass edge and tap it in with a small hammer; the heart of the came conforms to the glass edge for a secure fit.", "notes": ""}, {"id": "s307", "title": "", "description": "If a piece won't fit, there's likely a flange issue you can't see: trace where the came edge follows the glass, remove the glass, and find where the line is inconsistent with the flange depth. Then cut/groze/grind to fit.", "notes": ""}, {"id": "s308", "title": "", "description": "If a piece is too small: shim it or use came liner so it fits snugly; or leave it slightly loose and rely on cement (keep loose pieces to a minimum and align the came when soldering); or recut the glass.", "notes": ""}, {"id": "s309", "title": "", "description": "For designs where line variation won't affect the look, minor inconsistency is OK as long as the overage won't cause problems for neighboring pieces.", "notes": ""}]}, {"id": "sec317", "title": "Tools & Techniques", "steps": [{"id": "s311", "title": "", "description": "Horseshoe nails stabilize the assembly (use a came scrap as a buffer against the glass). Flat parallel to the glass: sinks into the wood and holds the glass. Flat perpendicular: the wedge nudges glass into place as tapped. The nail end levers out easily by hand.", "notes": ""}, {"id": "s312", "title": "", "description": "Lead vise: stretch lead after pulling it from the box — straightens it, makes it slightly stiffer and narrower.", "notes": ""}, {"id": "s313", "title": "", "description": "Lead dykes: keep sharp for clean cuts. For straight cuts, hold the flat face perpendicular and square to the came. For long sharp angles, cut the top flange to the angle and match the bottom flange to it.", "notes": ""}, {"id": "s314", "title": "", "description": "Fid: plastic fids spread open wide-face cames and flatten bent flanges; wood fids (from dowels, chopsticks, square stock) handle and tap small glass pieces into place.", "notes": ""}, {"id": "s315", "title": "", "description": "Came heart height: cames come in low and high heart. If glass is too thick to fit, slightly bevel the glass on the grinder, keeping the bevel within the flange depth so the ground edge isn't visible.", "notes": ""}, {"id": "s316", "title": "", "description": "Jigs: custom jigs speed production on windows with many same-size pieces.", "notes": ""}]}], "relatedProcesses": ["p-glass-cutting", "p-soldering", "p-rebar"], "author": "Imported from Technical Manual", "createdAt": "2026-06-10T00:00:00Z", "lastEditedBy": "Imported from Technical Manual", "lastEditedAt": "2026-06-10T00:00:00Z"}, {"id": "p-soldering", "title": "Soldering", "category": "fabrication", "subcategory": "", "status": "Draft", "summary": "Soldering came joints: when to solder, clean-and-flux requirements, and iron and tip care.", "materials": ["60/40 solder", "Flux (Nokorode paste; Classic 100 for low smoke)", "Soldering iron (Weller 100, or Hakko/Hexacon)", "Rheostat / temperature controller", "Brass or stainless brush", "Masking tape", "Acetone", "Damp sponge", "Sal Ammoniac block", "Respirator + fan/fume extractor"], "safety": "Use a respirator and a fan or fume extractor while soldering. Re-tin tips outside — it generates heavy smoke.", "sections": [{"id": "sec320", "title": "When to Solder", "steps": [{"id": "s318", "title": "", "description": "Generally solder all at once after the window is fully glazed, so it can be selectively deconstructed if you need to fix something during glazing.", "notes": ""}, {"id": "s319", "title": "", "description": "For complicated builds with many small pieces, selectively solder while building so the leadwork stays together and doesn't spontaneously disassemble.", "notes": ""}]}, {"id": "sec325", "title": "Clean & Flux", "steps": [{"id": "s321", "title": "", "description": "Solder only flows where there's heat and clean, fluxed metal. Solder bonds at the surface, soaking into the metal — this only happens when the metal is very clean.", "notes": ""}, {"id": "s322", "title": "", "description": "Acetone zinc came to remove residual manufacturing oil.", "notes": ""}, {"id": "s323", "title": "", "description": "With a clean, lightly-used brass or stainless brush, softly buff the zinc came intersections to remove oxidation. Avoid steel wool — it sheds fibers that foul joints. Lead came usually doesn't need brushing unless oxidized.", "notes": ""}, {"id": "s324", "title": "", "description": "Apply flux carefully so solder only flows where you want it. For complicated junctions, use masking tape to stem the flow and make neat joints.", "notes": ""}]}, {"id": "sec328", "title": "Iron Temperature", "steps": [{"id": "s326", "title": "", "description": "Most irons run hotter than lead's melting point. Each touch of solder to the tip slightly lowers the iron's temperature; with experience you find a balance between heat transfer and the iron's reheat ability.", "notes": ""}, {"id": "s327", "title": "", "description": "A rheostat / temperature controller helps you dial in a comfortable temperature. As you get faster, you may want to raise the temperature accordingly.", "notes": ""}]}, {"id": "sec332", "title": "Tip Care", "steps": [{"id": "s329", "title": "", "description": "The tip must stay clean and tinned to hold molten solder.", "notes": ""}, {"id": "s330", "title": "", "description": "Never use anything abrasive on the tip — once the coating is gone and the copper core is exposed, that area is useless. Only use a slightly damp, clean sponge to remove oxidation and carbon from the hot tip.", "notes": ""}, {"id": "s331", "title": "", "description": "If the coating is intact but a sponge won't clean it, use a Sal Ammoniac block:
